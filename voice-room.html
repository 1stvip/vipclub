<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎙️ غرفة صوتية - VipChat</title>
    <link rel="shortcut icon" href="images/videoslogo/vip.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <!-- PeerJS للصوت بين الأجهزة -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            overflow-x: hidden;
        }

        header {
            background: rgba(255,255,255,0.05);
            padding: 0.6rem 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 50px;
        }

        .logo { font-size: 1.1rem; font-weight: bold; color: #ffd700; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .logo i { font-size: 1.2rem; }

        .room-info { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 0.75rem; }
        .room-info .room-name { font-weight: 600; color: #fff; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .room-info .room-id { color: #888; font-family: monospace; background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 6px; font-size: 0.65rem; }
        .room-info .room-owner { color: #ffd700; font-size: 0.7rem; }
        .btn-leave { padding: 4px 12px; background: #ef4444; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.7rem; transition: 0.3s; }
        .btn-leave:hover { background: #dc2626; }

        main {
            flex: 1;
            padding: 10px 3% 5px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .seats-area { width: 100%; }
        .seats-area h2 {
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: #ffd700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .seats-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 15px;
            background: rgba(255,255,255,0.02);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.05);
            width: 100%;
            min-height: 200px;
        }

        .seats-row {
            display: flex;
            justify-content: center;
            gap: 14px;
            width: 100%;
        }
        .seats-row.row-1 { max-width: 160px; }
        .seats-row.row-2 { max-width: 340px; }
        .seats-row.row-3 { max-width: 520px; }
        .seats-row.row-4 { max-width: 700px; }

        .seat {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 14px 10px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            max-width: 130px;
            cursor: pointer;
        }
        .seat:hover { transform: translateY(-3px); }

        .seat.owner-seat {
            background: linear-gradient(145deg, rgba(255, 215, 0, 0.15), rgba(255, 215, 0, 0.05));
            border: 2px solid #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
            min-height: 140px;
            max-width: 150px;
        }
        .seat.owner-seat .seat-avatar { border-color: #ffd700 !important; background: linear-gradient(135deg, #ffd700, #f59e0b) !important; color: #1a1a2e !important; }
        .seat.owner-seat .seat-crown { position: absolute; top: -16px; font-size: 1.8rem; animation: crown-glow 2s ease-in-out infinite; filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5)); }
        @keyframes crown-glow { 0%, 100% { transform: scale(1) rotate(-5deg); } 50% { transform: scale(1.1) rotate(5deg); } }
        .seat.owner-seat .seat-username { color: #ffd700 !important; font-size: 0.85rem; }
        .seat.owner-seat .seat-badge-owner { background: linear-gradient(135deg, #ffd700, #f59e0b); color: #1a1a2e; padding: 2px 12px; border-radius: 12px; font-size: 0.55rem; font-weight: bold; margin-top: 3px; }

        .seat.empty { border: 2px dashed rgba(255,255,255,0.12); cursor: pointer; background: rgba(255,255,255,0.02); }
        .seat.empty:hover { border-color: #ffd700; background: rgba(255,215,0,0.05); }
        .seat.empty .seat-avatar { border-color: rgba(255,255,255,0.08); background: rgba(255,255,255,0.02); }

        .seat.occupied { border-color: rgba(16, 185, 129, 0.3); background: rgba(16, 185, 129, 0.05); }
        .seat.occupied .seat-avatar {
            width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; font-weight: bold; margin-bottom: 6px; border: 2px solid #10b981;
        }
        .seat .seat-avatar {
            width: 55px; height: 55px; border-radius: 50%; background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center; font-size: 1.6rem; color: #666;
            margin-bottom: 6px; border: 2px dashed rgba(255,255,255,0.08); transition: all 0.3s ease;
        }
        .seat .seat-number { font-size: 0.55rem; color: #555; margin-top: 3px; }
        .seat .seat-username { font-size: 0.75rem; font-weight: 600; margin-top: 3px; color: #ccc; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .seat .seat-username.owner-name { color: #ffd700; }

        .seat .seat-indicators { display: flex; gap: 6px; margin-top: 4px; justify-content: center; }
        .seat .seat-indicators .indicator { font-size: 0.6rem; }
        .seat .seat-indicators .indicator.mic-on { color: #10b981; }
        .seat .seat-indicators .indicator.mic-off { color: #ef4444; }
        .seat .seat-indicators .indicator.speaker-on { color: #3b82f6; }
        .seat .seat-indicators .indicator.speaker-off { color: #6b7280; }

        .seat .sound-waves {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .seat .sound-waves .wave {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            opacity: 0;
        }
        .seat .sound-waves .wave:nth-child(1) { width: 55%; height: 55%; border: 2px solid rgba(59, 130, 246, 0.5); animation: water-wave 2s ease-in-out infinite; animation-delay: 0s; }
        .seat .sound-waves .wave:nth-child(2) { width: 75%; height: 75%; border: 2px solid rgba(59, 130, 246, 0.35); animation: water-wave 2s ease-in-out infinite; animation-delay: 0.4s; }
        .seat .sound-waves .wave:nth-child(3) { width: 95%; height: 95%; border: 2px solid rgba(59, 130, 246, 0.2); animation: water-wave 2s ease-in-out infinite; animation-delay: 0.8s; }
        .seat .sound-waves .wave:nth-child(4) { width: 115%; height: 115%; border: 2px solid rgba(59, 130, 246, 0.12); animation: water-wave 2s ease-in-out infinite; animation-delay: 1.2s; }

        @keyframes water-wave {
            0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0.6; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        .seat.speaking {
            border-color: rgba(59, 130, 246, 0.5) !important;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.15);
        }
        .seat.speaking .seat-avatar {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .seat .seat-actions {
            display: flex;
            gap: 4px;
            margin-top: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .seat .seat-actions button {
            padding: 3px 8px;
            border: none;
            border-radius: 5px;
            font-size: 0.5rem;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }
        .seat .seat-actions .btn-kick { background: #ef4444; color: white; }
        .seat .seat-actions .btn-kick:hover { background: #dc2626; }
        .seat .seat-actions .btn-mute { background: #f59e0b; color: white; }
        .seat .seat-actions .btn-mute:hover { background: #d97706; }
        .seat .seat-actions .btn-ban { background: #7c3aed; color: white; }
        .seat .seat-actions .btn-ban:hover { background: #6d28d9; }

        .chat-area {
            width: 50%;
            margin: 5px auto 0;
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            height: 220px;
            position: relative;
        }

        .chat-header {
            padding: 6px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .chat-header h3 { font-size: 0.75rem; color: #ffd700; display: flex; align-items: center; gap: 5px; }
        .chat-header .online-count { font-size: 0.6rem; color: #888; }

        .chat-messages {
            flex: 1;
            padding: 8px 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-height: 0;
            scroll-behavior: smooth;
        }
        
        .chat-messages .message.system { 
            background: rgba(255,215,0,0.06); 
            color: #ffd700; 
            text-align: center; 
            width: 100%; 
            font-size: 0.6rem; 
            border: 1px solid rgba(255,215,0,0.05);
            border-radius: 12px;
            padding: 2px 10px;
            margin: 2px auto;
            max-width: 70%;
            opacity: 0.8;
        }
        .chat-messages .message.system.join { background: rgba(16, 185, 129, 0.06); color: #10b981; border-color: rgba(16, 185, 129, 0.06); }
        .chat-messages .message.system.leave { background: rgba(239, 68, 68, 0.04); color: #ef4444; border-color: rgba(239, 68, 68, 0.05); }
        
        .chat-messages .message.own { background: rgba(102, 126, 234, 0.15); align-self: flex-end; border: 1px solid rgba(102, 126, 234, 0.08); border-radius: 12px 12px 4px 12px; direction: rtl; text-align: right; max-width: 80%; padding: 4px 10px; }
        .chat-messages .message.other { background: rgba(255,255,255,0.04); align-self: flex-start; border: 1px solid rgba(255,255,255,0.04); border-radius: 12px 12px 12px 4px; direction: ltr; text-align: left; max-width: 80%; padding: 4px 10px; }
        
        .chat-messages .message .msg-sender { font-size: 0.45rem; color: #888; margin-bottom: 1px; }
        .chat-messages .message .msg-sender.owner { color: #ffd700; }
        .chat-messages .message .msg-text { font-size: 0.75rem; word-wrap: break-word; }
        .chat-messages .message .msg-time { font-size: 0.4rem; color: #666; margin-top: 1px; }
        .chat-messages .message .msg-badge { font-size: 0.4rem; background: #ffd700; color: #1a1a2e; padding: 1px 6px; border-radius: 8px; margin-left: 4px; }

        .scroll-down-btn {
            position: absolute;
            bottom: 65px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(102, 126, 234, 0.3);
            border: 2px solid rgba(102, 126, 234, 0.2);
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.3s;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            backdrop-filter: blur(10px);
        }
        .scroll-down-btn:hover {
            background: rgba(102, 126, 234, 0.5);
            transform: translateX(-50%) scale(1.1);
        }
        .scroll-down-btn.visible {
            display: flex;
            animation: fadeInBtn 0.3s ease;
        }
        @keyframes fadeInBtn {
            from { opacity: 0; transform: translateX(-50%) scale(0.8); }
            to { opacity: 1; transform: translateX(-50%) scale(1); }
        }

        .chat-input-area {
            padding: 5px 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            gap: 5px;
            align-items: center;
            flex-shrink: 0;
            position: relative;
        }
        .chat-input-area .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 0 8px;
        }
        .chat-input-area .input-wrapper input {
            flex: 1;
            padding: 5px 8px;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 0.75rem;
        }
        .chat-input-area .input-wrapper input::placeholder { color: #666; font-size: 0.65rem; }
        .chat-input-area .send-btn {
            padding: 5px 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
            font-size: 0.7rem;
            white-space: nowrap;
        }
        .chat-input-area .send-btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3); }

        .audio-controls {
            position: fixed;
            bottom: 80px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 999;
        }
        .audio-btn {
            width: 42px; height: 42px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04); color: white; font-size: 1.1rem; cursor: pointer;
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); position: relative;
        }
        .audio-btn:hover { transform: scale(1.08); }
        .audio-btn.mic-active { border-color: #10b981; background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .audio-btn.mic-inactive { border-color: #ef4444; background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .audio-btn.speaker-active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .audio-btn.speaker-inactive { border-color: #6b7280; background: rgba(107, 114, 128, 0.15); color: #6b7280; }

        .audio-btn .tooltip {
            position: absolute; right: 50px; background: rgba(0,0,0,0.85); color: white;
            padding: 4px 10px; border-radius: 6px; font-size: 0.6rem; white-space: nowrap;
            opacity: 0; transition: 0.3s; pointer-events: none;
        }
        .audio-btn:hover .tooltip { opacity: 1; }

        .btn-leave-seat {
            width: 42px; height: 42px; border-radius: 50%; border: 2px solid rgba(255,215,0,0.25);
            background: rgba(255,215,0,0.08); color: #ffd700; font-size: 1.1rem; cursor: pointer;
            transition: all 0.3s ease; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); position: relative;
        }
        .btn-leave-seat:hover { transform: scale(1.08); border-color: #ffd700; background: rgba(255,215,0,0.15); }
        .btn-leave-seat .tooltip {
            position: absolute; right: 50px; background: rgba(0,0,0,0.85); color: white;
            padding: 4px 10px; border-radius: 6px; font-size: 0.6rem; white-space: nowrap;
            opacity: 0; transition: 0.3s; pointer-events: none;
        }
        .btn-leave-seat:hover .tooltip { opacity: 1; }

        .mic-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); padding: 20px; }
        .mic-overlay .mic-box { background: #1a1a2e; padding: 30px; border-radius: 20px; text-align: center; max-width: 400px; width: 100%; border: 1px solid rgba(255,255,255,0.08); animation: modalFadeIn 0.5s ease; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .mic-overlay .mic-box .mic-icon { font-size: 3rem; color: #ffd700; margin-bottom: 15px; display: block; animation: pulse-icon 2s infinite; }
        @keyframes pulse-icon { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        .mic-overlay .mic-box h2 { color: #fff; margin-bottom: 8px; font-size: 1.2rem; }
        .mic-overlay .mic-box p { color: #999; margin-bottom: 15px; line-height: 1.6; font-size: 0.85rem; }
        .mic-overlay .mic-box .mic-status { color: #888; font-size: 0.8rem; margin: 8px 0; padding: 6px; border-radius: 8px; background: rgba(255,255,255,0.03); }
        .mic-overlay .mic-box .btn-allow { padding: 12px 30px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 8px; width: 100%; }
        .mic-overlay .mic-box .btn-allow:hover { transform: scale(1.02); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3); }
        .mic-overlay .mic-box .btn-allow:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .mic-overlay .mic-box .btn-skip { margin-top: 8px; background: transparent; color: #666; border: none; cursor: pointer; font-size: 0.8rem; transition: 0.3s; width: 100%; }
        .mic-overlay .mic-box .btn-skip:hover { color: #999; }

        .connection-status {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.7rem;
            z-index: 1000;
            display: none;
            backdrop-filter: blur(10px);
            text-align: center;
            max-width: 90%;
        }
        .connection-status.connected {
            display: block;
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
        }
        .connection-status.disconnected {
            display: block;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }
        .connection-status.connecting {
            display: block;
            background: rgba(251, 191, 36, 0.2);
            border: 1px solid rgba(251, 191, 36, 0.3);
            color: #fbbf24;
        }

        @media (max-width: 768px) {
            .seats-row { gap: 8px; }
            .seat { max-width: 95px; min-height: 85px; padding: 10px 6px; }
            .seat .seat-avatar { width: 42px; height: 42px; font-size: 1.1rem; }
            .chat-area { width: 75%; height: 180px; }
            .audio-controls { bottom: 75px; right: 12px; gap: 6px; }
            .audio-btn { width: 38px; height: 38px; font-size: 1rem; }
        }

        @media (max-width: 480px) {
            header { padding: 0.4rem 3%; min-height: 44px; }
            .logo { font-size: 0.85rem; }
            .seats-container { padding: 10px; gap: 8px; }
            .seat { max-width: 75px; min-height: 70px; padding: 8px 4px; border-radius: 12px; }
            .seat .seat-avatar { width: 34px; height: 34px; font-size: 0.9rem; }
            .chat-area { width: 90%; height: 150px; }
            .audio-controls { bottom: 65px; right: 10px; gap: 5px; }
            .audio-btn { width: 34px; height: 34px; font-size: 0.85rem; }
            .btn-leave-seat { width: 34px; height: 34px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="window.location.href='chat.html'">
            <i class="fas fa-crown"></i> VipChat
        </div>
        <div class="room-info">
            <span class="room-name" id="roomNameDisplay">غرفة صوتية</span>
            <span class="room-id" id="roomIdDisplay">🔑 ---</span>
            <span class="room-owner" id="roomOwnerDisplay">👑 المالك: ---</span>
            <span style="color: #888; font-size: 0.65rem;">👥 <span id="memberCount">0</span></span>
            <button class="btn-leave" onclick="leaveRoom()"><i class="fas fa-sign-out-alt"></i> مغادرة</button>
        </div>
    </header>

    <div class="connection-status" id="connectionStatus">🔄 جاري الاتصال...</div>

    <div class="mic-overlay" id="micOverlay">
        <div class="mic-box">
            <span class="mic-icon"><i class="fas fa-microphone-alt"></i></span>
            <h2>🎙️ طلب أذن المايك والصوت</h2>
            <p>للانضمام إلى الغرفة الصوتية، نحتاج إلى أذن استخدام الميكروفون والصوت.</p>
            <div class="mic-status" id="micStatus"><i class="fas fa-info-circle"></i> اضغط على الزر أدناه للسماح</div>
            <button class="btn-allow" id="micAllowBtn" onclick="requestMicPermission()"><i class="fas fa-check"></i> السماح بالميكروفون</button>
            <br><button class="btn-skip" onclick="skipMic()">تخطي (دخول بدون صوت)</button>
        </div>
    </div>

    <main>
        <div class="seats-area">
            <h2><i class="fas fa-chair"></i> المقاعد <span id="seatsCount" style="font-size: 0.75rem; color: #888;">(0/10)</span></h2>
            <div class="seats-container" id="seatsContainer"></div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="chat-header">
                <h3><i class="fas fa-comment-dots"></i> الشات</h3>
                <span class="online-count" id="chatOnlineCount">0 متصل</span>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            
            <button class="scroll-down-btn" id="scrollDownBtn" onclick="scrollToBottom()" title="الذهاب لأحدث الرسائل">
                <i class="fas fa-arrow-down"></i>
            </button>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="chatInput" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter') sendChatMessage()">
                </div>
                <button class="send-btn" onclick="sendChatMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>

    <div class="audio-controls">
        <button class="audio-btn mic-active" id="micBtn" onclick="toggleMic()">
            <i class="fas fa-microphone"></i>
            <span class="tooltip">الميكروفون</span>
        </button>
        <button class="audio-btn speaker-active" id="speakerBtn" onclick="toggleSpeaker()">
            <i class="fas fa-volume-up"></i>
            <span class="tooltip">السماعة</span>
        </button>
        <button class="btn-leave-seat" id="leaveSeatBtn" onclick="leaveSeat()">
            <i class="fas fa-sign-out-alt"></i>
            <span class="tooltip">مغادرة المقعد</span>
        </button>
    </div>

    <script>
        // ============================================================
        // 🔥 FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAVSzkDLqi1G-hpfEPqvBMmuyYRfEuaTKk",
            authDomain: "vipclub-1d04a.firebaseapp.com",
            databaseURL: "https://vipclub-1d04a-default-rtdb.firebaseio.com",
            projectId: "vipclub-1d04a",
            storageBucket: "vipclub-1d04a.firebasestorage.app",
            messagingSenderId: "120667552740",
            appId: "1:120667552740:web:02085765fd43eb0080e5f1"
        };

        let database;
        let currentUser = null;
        let roomId = null;
        let roomData = null;
        let isOwner = false;
        let mySeatIndex = -1;
        let isMicMuted = false;
        let mediaStream = null;
        let chatListener = null;
        let roomListener = null;
        let seatsListener = null;
        let roomInitialized = false;
        let audioContext = null;
        let isSpeakerActive = true;

        // ============================================================
        // 🎵 PEERJS
        // ============================================================
        let peer = null;
        let myPeerId = null;
        let peerConnections = {};
        let peerStreams = {};

        // ============================================================
        // 🎯 GET ROOM ID FROM URL
        // ============================================================
        function getRoomIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('room');
        }

        // ============================================================
        // 📋 SEATS LAYOUT
        // ============================================================
        const SEATS_LAYOUT = [
            { row: 0, seats: 1 },
            { row: 1, seats: 2 },
            { row: 2, seats: 3 },
            { row: 3, seats: 4 }
        ];

        // ============================================================
        // 👤 GET CURRENT USER
        // ============================================================
        function getCurrentUser() {
            try {
                const user = JSON.parse(localStorage.getItem('currentUser'));
                if (user) return user;
            } catch (e) {}
            const guestUser = {
                numericId: 'USER_' + Math.floor(Math.random() * 1000000),
                username: 'مستخدم_' + Math.floor(Math.random() * 1000),
                nickname: 'مستخدم',
                isGuest: true
            };
            localStorage.setItem('currentUser', JSON.stringify(guestUser));
            return guestUser;
        }

        // ============================================================
        // 🎤 MIC PERMISSION
        // ============================================================
        async function requestMicPermission() {
            const statusDiv = document.getElementById('micStatus');
            const btn = document.getElementById('micAllowBtn');
            btn.disabled = true;
            statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري طلب الإذن...';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }, 
                    video: false 
                });
                mediaStream = stream;
                statusDiv.innerHTML = '<i class="fas fa-check-circle" style="color: #10b981;"></i> ✅ تم الحصول على إذن الميكروفون بنجاح!';
                statusDiv.style.color = '#10b981';
                btn.innerHTML = '<i class="fas fa-check"></i> تم السماح ✅';
                btn.style.background = '#10b981';
                setTimeout(() => {
                    document.getElementById('micOverlay').style.display = 'none';
                    initRoom();
                }, 1000);
            } catch (error) {
                console.error('Mic permission error:', error);
                let errorMessage = '❌ لا يمكن الوصول إلى الميكروفون.';
                if (error.name === 'NotAllowedError') errorMessage = '❌ تم رفض إذن الميكروفون. يرجى السماح يدوياً من إعدادات المتصفح.';
                else if (error.name === 'NotFoundError') errorMessage = '❌ لا يوجد ميكروفون متصل بالجهاز.';
                else if (error.name === 'NotReadableError') errorMessage = '❌ لا يمكن الوصول إلى الميكروفون. قد يكون مستخدماً من تطبيق آخر.';
                statusDiv.innerHTML = `<i class="fas fa-exclamation-triangle" style="color: #ef4444;"></i> ${errorMessage}`;
                statusDiv.style.color = '#ef4444';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-redo"></i> إعادة المحاولة';
                showToast(errorMessage, 'error');
            }
        }

        function skipMic() {
            document.getElementById('micOverlay').style.display = 'none';
            showToast('ℹ️ دخلت بدون ميكروفون (وضع الاستماع فقط)', 'info');
            initRoom();
        }

        // ============================================================
        // 🚀 INITIALIZE FIREBASE
        // ============================================================
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            database = firebase.database();
            console.log('✅ Firebase connected');
        } catch (error) {
            console.error('❌ Firebase error:', error);
        }

        // ============================================================
        // 🔊 AUDIO CONTROLS
        // ============================================================
        function toggleMic() {
            if (!mediaStream) return;
            isMicMuted = !isMicMuted;
            const btn = document.getElementById('micBtn');
            if (isMicMuted) {
                mediaStream.getAudioTracks().forEach(track => track.enabled = false);
                btn.className = 'audio-btn mic-inactive';
                btn.innerHTML = '<i class="fas fa-microphone-slash"></i><span class="tooltip">الميكروفون مكتوم</span>';
                showToast('🔇 تم كتم الميكروفون', 'warning');
            } else {
                mediaStream.getAudioTracks().forEach(track => track.enabled = true);
                btn.className = 'audio-btn mic-active';
                btn.innerHTML = '<i class="fas fa-microphone"></i><span class="tooltip">الميكروفون نشط</span>';
                showToast('🔊 تم تفعيل الميكروفون', 'success');
            }
            if (roomId && mySeatIndex !== -1) {
                database.ref('rooms/' + roomId + '/seats/' + mySeatIndex + '/muted').set(isMicMuted);
            }
        }

        function toggleSpeaker() {
            isSpeakerActive = !isSpeakerActive;
            const btn = document.getElementById('speakerBtn');
            
            if (!isSpeakerActive) {
                btn.className = 'audio-btn speaker-inactive';
                btn.innerHTML = '<i class="fas fa-volume-mute"></i><span class="tooltip">السماعة مكتومة</span>';
                showToast('🔇 تم كتم السماعة', 'warning');
                if (audioContext) {
                    audioContext.close();
                    audioContext = null;
                }
            } else {
                btn.className = 'audio-btn speaker-active';
                btn.innerHTML = '<i class="fas fa-volume-up"></i><span class="tooltip">السماعة نشطة</span>';
                showToast('🔊 تم تفعيل السماعة', 'success');
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
            }
            if (roomId && mySeatIndex !== -1) {
                database.ref('rooms/' + roomId + '/seats/' + mySeatIndex + '/speakerMuted').set(!isSpeakerActive);
            }
        }

        // ============================================================
        // 🔍 CHECK IF USER IS BANNED
        // ============================================================
        async function isUserBanned(userId) {
            if (!database || !roomId) return false;
            try {
                if (isOwner) return false;
                const snapshot = await database.ref('rooms/' + roomId + '/banned_users/' + userId).once('value');
                return snapshot.exists();
            } catch (error) {
                console.error('Error checking ban status:', error);
                return false;
            }
        }

        // ============================================================
        // 🚀 INIT ROOM
        // ============================================================
        function initRoom() {
            if (roomInitialized) return;
            roomInitialized = true;

            roomId = getRoomIdFromURL();
            if (!roomId) {
                showToast('❌ لم يتم العثور على معرف الغرفة', 'error');
                setTimeout(() => window.location.href = 'chat.html', 2000);
                return;
            }
            currentUser = getCurrentUser();
            document.getElementById('roomIdDisplay').textContent = '🔑 ' + roomId;
            
            renderSeatsPyramid({});
            
            loadRoomDataAndCheckBan();
        }

        // ============================================================
        // 📋 LOAD ROOM DATA AND CHECK BAN
        // ============================================================
        async function loadRoomDataAndCheckBan() {
            if (!database) return;
            try {
                const snapshot = await database.ref('rooms/' + roomId).once('value');
                if (!snapshot.exists()) {
                    showToast('❌ الغرفة غير موجودة', 'error');
                    setTimeout(() => window.location.href = 'chat.html', 2000);
                    return;
                }
                roomData = snapshot.val();
                document.getElementById('roomNameDisplay').textContent = roomData.name || 'غرفة صوتية';
                
                isOwner = roomData.creatorId == currentUser.numericId;
                
                const creatorName = roomData.creatorName || 'غير معروف';
                document.getElementById('roomOwnerDisplay').textContent = '👑 المالك: ' + creatorName;
                
                console.log('📊 معلومات المستخدم:', {
                    'المستخدم الحالي': currentUser,
                    'معرف المالك في الغرفة': roomData.creatorId,
                    'معرف المستخدم': currentUser.numericId,
                    'isOwner': isOwner
                });
                
                if (isOwner) {
                    showToast('👑 مرحباً بك كمالك الغرفة!', 'success');
                } else {
                    const banned = await isUserBanned(currentUser.numericId);
                    if (banned) {
                        showToast('🚫 لقد تم حظرك من هذه الغرفة', 'error');
                        setTimeout(() => {
                            window.location.href = 'chat.html';
                        }, 2000);
                        return;
                    }
                    showToast(`👋 مرحباً بك في غرفة ${roomData.name}`, 'info');
                }
                
                addChatMessage('system', `🏠 مرحباً بك في غرفة "${roomData.name}"`, null, null, '');
                addChatMessage('system', `👑 مالك الغرفة: ${creatorName}`, null, null, '');
                addChatMessage('system', `🔑 معرف الغرفة: ${roomId}`, null, null, '');
                
                loadSeats();
                
                listenRoomUpdates();
                listenChat();
                listenSeats();
                setupChatScrollMonitoring();

                initPeerJS();
                
            } catch (error) {
                console.error('Error loading room:', error);
            }
        }

        // ============================================================
        // 🎵 PEERJS
        // ============================================================
        function initPeerJS() {
            if (!mediaStream) {
                setTimeout(initPeerJS, 1000);
                return;
            }

            const peerId = currentUser.numericId;
            peer = new Peer(peerId, {
                debug: 2,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' },
                        { urls: 'stun:stun3.l.google.com:19302' },
                        { urls: 'stun:stun4.l.google.com:19302' }
                    ]
                }
            });

            myPeerId = peerId;

            peer.on('open', (id) => {
                console.log('✅ PeerJS متصل مع المعرف:', id);
                myPeerId = id;
                updateConnectionStatus('connected');
                if (mySeatIndex !== -1) {
                    database.ref('rooms/' + roomId + '/seats/' + mySeatIndex + '/peerId').set(id);
                }
                connectToExistingPeers();
            });

            peer.on('call', (call) => {
                console.log('📞 مكالمة واردة من:', call.peer);
                try {
                    call.answer(mediaStream);
                    call.on('stream', (remoteStream) => {
                        console.log('🎵 استقبال تدفق صوت من:', call.peer);
                        peerStreams[call.peer] = remoteStream;
                        if (isSpeakerActive) {
                            playRemoteAudio(remoteStream, call.peer);
                        }
                    });
                    call.on('close', () => {
                        console.log('🔇 انقطاع المكالمة مع:', call.peer);
                        delete peerStreams[call.peer];
                        removeRemoteAudio(call.peer);
                    });
                    peerConnections[call.peer] = call;
                } catch (e) {
                    console.error('❌ خطأ في استقبال المكالمة:', e);
                }
            });

            peer.on('error', (err) => {
                console.error('❌ خطأ في PeerJS:', err);
                updateConnectionStatus('disconnected');
            });

            listenForPeerConnections();
        }

        function listenForPeerConnections() {
            if (!database || !roomId) return;

            database.ref('rooms/' + roomId + '/seats').on('child_added', (snapshot) => {
                const seatData = snapshot.val();
                if (seatData && seatData.userId && seatData.userId !== currentUser.numericId && seatData.peerId) {
                    setTimeout(() => {
                        connectToPeer(seatData.peerId);
                    }, 1000);
                }
            });
        }

        function connectToExistingPeers() {
            if (!database || !roomId) return;
            database.ref('rooms/' + roomId + '/seats').once('value', (snapshot) => {
                const seats = snapshot.val() || {};
                Object.keys(seats).forEach(key => {
                    const seat = seats[key];
                    if (seat && seat.userId && seat.userId !== currentUser.numericId && seat.peerId) {
                        setTimeout(() => {
                            connectToPeer(seat.peerId);
                        }, 500);
                    }
                });
            });
        }

        function connectToPeer(peerId) {
            if (!peer || !mediaStream) return;
            if (peerId === myPeerId) return;
            if (peerConnections[peerId]) return;

            try {
                const call = peer.call(peerId, mediaStream);
                if (!call) return;

                call.on('stream', (remoteStream) => {
                    console.log('🎵 استقبال تدفق صوت من:', peerId);
                    peerStreams[peerId] = remoteStream;
                    if (isSpeakerActive) {
                        playRemoteAudio(remoteStream, peerId);
                    }
                    updateConnectionStatus('connected');
                });

                call.on('close', () => {
                    console.log('🔇 انقطاع المكالمة مع:', peerId);
                    delete peerStreams[peerId];
                    removeRemoteAudio(peerId);
                    delete peerConnections[peerId];
                });

                peerConnections[peerId] = call;
            } catch (error) {
                console.error('❌ خطأ في الاتصال بـ', peerId, error);
            }
        }

        function playRemoteAudio(stream, peerId) {
            if (!isSpeakerActive) return;
            
            try {
                removeRemoteAudio(peerId);
                
                const audioElement = document.createElement('audio');
                audioElement.id = 'audio-' + peerId;
                audioElement.srcObject = stream;
                audioElement.autoplay = true;
                audioElement.style.display = 'none';
                document.body.appendChild(audioElement);
                
                audioElement.play().catch(e => console.log('Audio play error:', e));
            } catch (e) {
                console.log('Error playing remote audio:', e);
            }
        }

        function removeRemoteAudio(peerId) {
            const audioEl = document.getElementById('audio-' + peerId);
            if (audioEl) {
                audioEl.remove();
            }
        }

        function updateConnectionStatus(status) {
            const el = document.getElementById('connectionStatus');
            el.className = 'connection-status ' + status;
            if (status === 'connected') {
                el.innerHTML = '✅ متصل بالصوت';
                setTimeout(() => {
                    el.className = 'connection-status';
                }, 3000);
            } else if (status === 'disconnected') {
                el.innerHTML = '❌ انقطاع الاتصال';
            } else if (status === 'connecting') {
                el.innerHTML = '🔄 جاري الاتصال';
            }
        }

        // ============================================================
        // 💺 LOAD SEATS
        // ============================================================
        async function loadSeats() {
            if (!database || !roomId) return;
            try {
                const snapshot = await database.ref('rooms/' + roomId + '/seats').once('value');
                const seats = snapshot.val() || {};
                renderSeatsPyramid(seats);
            } catch (error) {
                console.error('Error loading seats:', error);
                renderSeatsPyramid({});
            }
        }

        // ============================================================
        // 👂 LISTEN ROOM UPDATES
        // ============================================================
        function listenRoomUpdates() {
            if (!database) return;
            roomListener = database.ref('rooms/' + roomId).on('value', (snapshot) => {
                if (snapshot.exists()) {
                    roomData = snapshot.val();
                    document.getElementById('memberCount').textContent = roomData.members || 0;
                }
            });
        }

        // ============================================================
        // 💺 SEATS MANAGEMENT - مبسط ومضمون
        // ============================================================
        function listenSeats() {
            if (!database) return;
            seatsListener = database.ref('rooms/' + roomId + '/seats').on('value', (snapshot) => {
                const seats = snapshot.val() || {};
                console.log('🔄 تحديث المقاعد:', seats);
                renderSeatsPyramid(seats);
            });
        }

        function renderSeatsPyramid(seats) {
            const container = document.getElementById('seatsContainer');
            let html = '';
            let occupied = 0;
            let globalIndex = 0;

            // تحديث mySeatIndex بناءً على البيانات الحالية
            let foundMySeat = false;
            for (const key in seats) {
                if (seats[key].userId == currentUser.numericId) {
                    mySeatIndex = parseInt(key);
                    foundMySeat = true;
                    document.getElementById('leaveSeatBtn').style.display = 'flex';
                    break;
                }
            }
            if (!foundMySeat) {
                mySeatIndex = -1;
                document.getElementById('leaveSeatBtn').style.display = 'none';
            }

            SEATS_LAYOUT.forEach((rowData, rowIndex) => {
                const rowClass = `row-${rowIndex + 1}`;
                html += `<div class="seats-row ${rowClass}">`;
                
                for (let i = 0; i < rowData.seats; i++) {
                    const seat = seats[globalIndex] || null;
                    const isOccupied = seat !== null;
                    
                    if (isOccupied) occupied++;

                    const isMySeat = seat && seat.userId == currentUser.numericId;
                    const isSeatOwner = seat && seat.isOwner === true;
                    const isOwnerSeat = globalIndex === 0;
                    const isSpeaking = seat && seat.speaking === true;

                    let displayName = seat ? seat.username : 'مقعد فارغ';
                    let avatarLetter = seat ? seat.username.charAt(0).toUpperCase() : '+';
                    let seatClass = 'seat';
                    
                    if (isOwnerSeat && isOccupied) {
                        seatClass += ' owner-seat';
                    } else if (isOccupied) {
                        seatClass += ' occupied';
                    } else {
                        seatClass += ' empty';
                    }

                    if (isSpeaking && isOccupied) seatClass += ' speaking';

                    const userColor = seat && seat.color ? seat.color : '#667eea';
                    const isMuted = seat && seat.muted === true;
                    const isSpeakerOff = seat && seat.speakerMuted === true;

                    let clickHandler = '';
                    if (isOccupied) {
                        clickHandler = `onclick="openProfilePopup('${globalIndex}')"`;
                    } else if (globalIndex === 0 && !isOwner) {
                        clickHandler = '';
                    } else {
                        clickHandler = `onclick="joinSeat(${globalIndex})"`;
                    }

                    html += `
                        <div class="${seatClass}" ${clickHandler}>
                            ${isOccupied ? `
                                ${isSeatOwner ? `<div class="seat-crown">👑</div>` : ''}
                                ${isSpeaking ? `
                                    <div class="sound-waves">
                                        <div class="wave"></div>
                                        <div class="wave"></div>
                                        <div class="wave"></div>
                                        <div class="wave"></div>
                                    </div>
                                ` : ''}
                                <div class="seat-avatar" style="background: ${userColor} !important; border-color: ${isSeatOwner ? '#ffd700' : isMuted ? '#ef4444' : isSpeaking ? '#3b82f6' : '#10b981'} !important; ${isSpeaking ? 'box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);' : ''}">
                                    ${avatarLetter}
                                </div>
                                <div class="seat-username ${isSeatOwner ? 'owner-name' : ''}">${displayName}</div>
                                ${isSeatOwner ? `<div class="seat-badge-owner">👑 المالك</div>` : ''}
                                <div class="seat-indicators">
                                    <span class="indicator ${isMuted ? 'mic-off' : 'mic-on'}" title="${isMuted ? 'الميكروفون مكتوم' : 'الميكروفون نشط'}">
                                        <i class="fas fa-microphone${isMuted ? '-slash' : ''}"></i>
                                    </span>
                                    <span class="indicator ${isSpeakerOff ? 'speaker-off' : 'speaker-on'}" title="${isSpeakerOff ? 'السماعة مكتومة' : 'السماعة نشطة'}">
                                        <i class="fas fa-volume-${isSpeakerOff ? 'mute' : 'up'}"></i>
                                    </span>
                                    ${isSpeaking ? `<span class="indicator" style="color:#3b82f6; animation: pulse-icon 0.8s infinite;" title="يتحدث الآن"><i class="fas fa-wave-square"></i></span>` : ''}
                                </div>
                                <div class="seat-number">مقعد ${globalIndex + 1}</div>
                                ${isOwner && !isSeatOwner && isOccupied ? `
                                    <div class="seat-actions" onclick="event.stopPropagation();">
                                        <button class="btn-kick" onclick="event.stopPropagation();kickUser(${globalIndex})">✖ طرد</button>
                                        <button class="btn-mute" onclick="event.stopPropagation();muteUser(${globalIndex})">🔇 كتم</button>
                                        <button class="btn-ban" onclick="event.stopPropagation();banUser(${globalIndex})">🚫 حظر</button>
                                    </div>
                                ` : ''}
                            ` : `
                                ${globalIndex === 0 ? `
                                    <div class="seat-crown">👑</div>
                                    <div class="seat-avatar" style="border-color: #ffd700 !important;">
                                        <i class="fas fa-crown" style="color: #ffd700;"></i>
                                    </div>
                                    <div style="color: #ffd700; font-size: 0.7rem; font-weight: bold;">مقعد المالك</div>
                                    ${isOwner ? `<div style="font-size:0.55rem;color:#888;margin-top:2px;">اضغط للجلوس</div>` : `<div style="font-size:0.55rem;color:#555;margin-top:2px;">خاص بالمالك</div>`}
                                ` : `
                                    <div class="seat-avatar"><i class="fas fa-plus" style="color: #666;"></i></div>
                                    <div style="color: #666; font-size: 0.6rem;">مقعد فارغ</div>
                                `}
                                <div class="seat-number">مقعد ${globalIndex + 1}</div>
                            `}
                        </div>
                    `;
                    globalIndex++;
                }
                html += `</div>`;
            });

            container.innerHTML = html;
            document.getElementById('seatsCount').textContent = `(${occupied}/${globalIndex})`;
            document.getElementById('chatOnlineCount').textContent = occupied + ' متصل';
        }

        // ============================================================
        // 👤 PROFILE POPUP
        // ============================================================
        function openProfilePopup(seatIndex) {
            database.ref('rooms/' + roomId + '/seats/' + seatIndex).once('value').then((snapshot) => {
                const seat = snapshot.val();
                if (!seat) return;
                alert(`👤 الملف الشخصي\n\nاسم المستخدم: ${seat.username}\nالمعرف: ${seat.userId}\n${seat.isOwner ? '👑 مالك الغرفة' : '👤 عضو'}\n${seat.muted ? '🔇 ميكروفون مكتوم' : '🎤 ميكروفون نشط'}`);
            }).catch(err => {
                console.error('Error loading profile:', err);
            });
        }

        // ============================================================
        // 🪑 JOIN SEAT - مبسط ومضمون
        // ============================================================
        async function joinSeat(seatIndex) {
            if (!database || !roomId) return;

            try {
                console.log('🪑 محاولة الجلوس على مقعد:', seatIndex);
                
                if (!currentUser || !currentUser.numericId) {
                    showToast('⚠️ يرجى تسجيل الدخول أولاً', 'warning');
                    return;
                }

                if (!isOwner) {
                    const banned = await isUserBanned(currentUser.numericId);
                    if (banned) {
                        showToast('🚫 لقد تم حظرك من هذه الغرفة', 'error');
                        setTimeout(() => window.location.href = 'chat.html', 1500);
                        return;
                    }
                }

                // 1. جلب المقاعد الحالية
                const seatsSnapshot = await database.ref('rooms/' + roomId + '/seats').once('value');
                const seats = seatsSnapshot.val() || {};
                
                // 2. إذا كان المستخدم في مقعد آخر، قم بإزالته
                for (const key in seats) {
                    if (seats[key].userId == currentUser.numericId) {
                        console.log('🔄 إزالة المستخدم من مقعد:', key);
                        await database.ref('rooms/' + roomId + '/seats/' + key).remove();
                    }
                }

                // 3. التحقق من أن المقعد غير مشغول
                const seatCheck = await database.ref('rooms/' + roomId + '/seats/' + seatIndex).once('value');
                if (seatCheck.exists()) {
                    showToast('⚠️ هذا المقعد مشغول', 'warning');
                    return;
                }

                // 4. التحقق من مقعد المالك
                if (seatIndex === 0 && !isOwner) {
                    showToast('⚠️ هذا المقعد خاص بمالك الغرفة فقط', 'warning');
                    return;
                }

                // 5. إنشاء بيانات المقعد
                const colors = ['#667eea', '#f093fb', '#4facfe', '#43e97b', '#fa709a', '#f6d365', '#a18cd1', '#fbc2eb', '#a6c1ee', '#fddb92'];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];

                const seatData = {
                    userId: currentUser.numericId,
                    username: currentUser.nickname || currentUser.username || 'مستخدم',
                    isOwner: isOwner && seatIndex === 0,
                    muted: false,
                    speakerMuted: false,
                    color: randomColor,
                    speaking: false,
                    seatNumber: seatIndex,
                    joinedAt: new Date().toISOString(),
                    peerId: myPeerId || currentUser.numericId
                };

                console.log('📝 حفظ بيانات المقعد:', seatData);

                // 6. حفظ المقعد
                await database.ref('rooms/' + roomId + '/seats/' + seatIndex).set(seatData);

                // 7. تحديث عدد الأعضاء
                const updatedSeats = await database.ref('rooms/' + roomId + '/seats').once('value');
                const updatedSeatsData = updatedSeats.val() || {};
                const membersCount = Object.keys(updatedSeatsData).length;
                await database.ref('rooms/' + roomId + '/members').set(membersCount);

                // 8. تحديث المتغيرات المحلية
                mySeatIndex = seatIndex;
                document.getElementById('leaveSeatBtn').style.display = 'flex';

                // 9. إعادة تحميل المقاعد
                renderSeatsPyramid(updatedSeatsData);

                // 10. إرسال رسالة في الشات
                if (seatIndex === 0 && isOwner) {
                    showToast(`👑 جلست على مقعد المالك`, 'success');
                    addChatMessage('system', `👑 **${currentUser.nickname || currentUser.username}** جلس على مقعد المالك`, null, null, 'join');
                } else {
                    showToast(`✅ جلست على مقعد ${seatIndex + 1}`, 'success');
                    addChatMessage('system', `👋 **${currentUser.nickname || currentUser.username}** انضم للغرفة`, null, null, 'join');
                }

            } catch (error) {
                console.error('❌ خطأ في الجلوس:', error);
                showToast('❌ حدث خطأ في الجلوس على المقعد', 'error');
            }
        }

        // ============================================================
        // 🚪 LEAVE SEAT
        // ============================================================
        async function leaveSeat() {
            if (mySeatIndex === -1) {
                showToast('⚠️ أنت لست جالساً على أي مقعد', 'warning');
                return;
            }

            try {
                console.log('🚪 مغادرة المقعد:', mySeatIndex);
                
                const seatSnapshot = await database.ref('rooms/' + roomId + '/seats/' + mySeatIndex).once('value');
                const seat = seatSnapshot.val();
                const username = seat ? seat.username : 'مستخدم';
                
                await database.ref('rooms/' + roomId + '/seats/' + mySeatIndex).remove();
                
                const seatsSnapshot = await database.ref('rooms/' + roomId + '/seats').once('value');
                const seats = seatsSnapshot.val() || {};
                const membersCount = Object.keys(seats).length;
                await database.ref('rooms/' + roomId + '/members').set(membersCount);
                
                mySeatIndex = -1;
                document.getElementById('leaveSeatBtn').style.display = 'none';
                
                renderSeatsPyramid(seats);
                
                showToast('✅ تم مغادرة المقعد', 'success');
                addChatMessage('system', `🚪 **${username}** غادر المقعد`, null, null, 'leave');

            } catch (error) {
                console.error('❌ خطأ في المغادرة:', error);
                showToast('❌ حدث خطأ في مغادرة المقعد', 'error');
            }
        }

        // ============================================================
        // 👑 ADMIN ACTIONS
        // ============================================================
        async function kickUser(seatIndex) {
            if (!isOwner) return;
            if (!confirm(`هل تريد طرد المستخدم من مقعد ${seatIndex + 1}؟`)) return;

            try {
                const seatSnapshot = await database.ref('rooms/' + roomId + '/seats/' + seatIndex).once('value');
                const seat = seatSnapshot.val();
                if (!seat) return;

                await database.ref('rooms/' + roomId + '/seats/' + seatIndex).remove();
                addChatMessage('system', `🚫 **${seat.username}** تم طرده من الغرفة`, null, null, 'leave');

                const seatsSnapshot = await database.ref('rooms/' + roomId + '/seats').once('value');
                const seats = seatsSnapshot.val() || {};
                const membersCount = Object.keys(seats).length;
                await database.ref('rooms/' + roomId + '/members').set(membersCount);
                renderSeatsPyramid(seats);

                showToast('✅ تم طرد المستخدم', 'success');

            } catch (error) {
                console.error('Error kicking user:', error);
                showToast('❌ حدث خطأ في طرد المستخدم', 'error');
            }
        }

        async function banUser(seatIndex) {
            if (!isOwner) return;
            if (!confirm(`هل تريد حظر المستخدم من مقعد ${seatIndex + 1} نهائياً؟`)) return;

            try {
                const seatSnapshot = await database.ref('rooms/' + roomId + '/seats/' + seatIndex).once('value');
                const seat = seatSnapshot.val();
                if (!seat || seat.isOwner) return;

                await database.ref('rooms/' + roomId + '/banned_users/' + seat.userId).set({
                    username: seat.username,
                    bannedAt: new Date().toISOString(),
                    bannedBy: currentUser.numericId
                });

                await database.ref('rooms/' + roomId + '/seats/' + seatIndex).remove();
                addChatMessage('system', `🚫 **${seat.username}** تم حظره من الغرفة نهائياً`, null, null, 'leave');

                const seatsSnapshot = await database.ref('rooms/' + roomId + '/seats').once('value');
                const seats = seatsSnapshot.val() || {};
                const membersCount = Object.keys(seats).length;
                await database.ref('rooms/' + roomId + '/members').set(membersCount);
                renderSeatsPyramid(seats);

                showToast('✅ تم حظر المستخدم نهائياً', 'success');

            } catch (error) {
                console.error('Error banning user:', error);
                showToast('❌ حدث خطأ في حظر المستخدم', 'error');
            }
        }

        async function muteUser(seatIndex) {
            if (!isOwner) return;

            try {
                const seatSnapshot = await database.ref('rooms/' + roomId + '/seats/' + seatIndex).once('value');
                const seat = seatSnapshot.val();
                if (!seat) return;

                const newMuteState = !seat.muted;
                await database.ref('rooms/' + roomId + '/seats/' + seatIndex + '/muted').set(newMuteState);
                
                showToast(newMuteState ? '🔇 تم كتم الميكروفون' : '🔊 تم فك الكتم', 'success');
                addChatMessage('system', `${newMuteState ? '🔇 تم كتم' : '🔊 تم فك كتم'} **${seat.username}**`, null, null, '');

            } catch (error) {
                console.error('Error muting user:', error);
                showToast('❌ حدث خطأ في كتم المستخدم', 'error');
            }
        }

        // ============================================================
        // 💬 CHAT SYSTEM
        // ============================================================
        function listenChat() {
            if (!database) return;
            chatListener = database.ref('rooms/' + roomId + '/chat').limitToLast(50).on('child_added', (snapshot) => {
                const msg = snapshot.val();
                if (msg) {
                    displayMessage(msg);
                    setTimeout(() => {
                        scrollToBottom();
                    }, 50);
                }
            });
        }

        function displayMessage(msg) {
            const container = document.getElementById('chatMessages');
            const existing = container.querySelector(`[data-msg-id="${msg.id}"]`);
            if (existing) return;

            const div = document.createElement('div');
            let className = 'message';
            
            if (msg.type === 'system') {
                className += ' system';
                if (msg.subType === 'join') className += ' join';
                else if (msg.subType === 'leave') className += ' leave';
                div.className = className;
                div.setAttribute('data-msg-id', msg.id || Date.now());
                div.innerHTML = `<div class="msg-text">${msg.text}</div>`;
                container.appendChild(div);
                return;
            }
            
            if (msg.userId == currentUser.numericId) {
                className += ' own';
            } else {
                className += ' other';
            }
            
            div.className = className;
            div.setAttribute('data-msg-id', msg.id || Date.now());

            const isMsgOwner = msg.isOwner || false;
            div.innerHTML = `
                <div class="msg-sender ${isMsgOwner ? 'owner' : ''}">
                    ${isMsgOwner ? '<span class="msg-badge">👑 مالك</span>' : ''}
                    ${msg.username || 'مستخدم'}
                </div>
                <div class="msg-text">${msg.text}</div>
                <div class="msg-time">${msg.time || ''}</div>
            `;

            container.appendChild(div);
        }

        function addChatMessage(type, text, username = null, userId = null, subType = '') {
            const msg = {
                id: Date.now(),
                type: type,
                text: text,
                time: new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }),
                userId: userId || 'system',
                username: username || 'النظام',
                isOwner: isOwner,
                subType: subType
            };

            if (database && roomId) {
                database.ref('rooms/' + roomId + '/chat').push(msg).catch(err => {
                    console.error('Error sending chat message:', err);
                });
            }

            displayMessage(msg);
        }

        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            const user = currentUser;
            addChatMessage('user', text, user.nickname || user.username || 'مستخدم', user.numericId);
            input.value = '';
            input.focus();
            
            setTimeout(() => {
                scrollToBottom();
            }, 50);
        }

        // ============================================================
        // 📜 CHAT SCROLL
        // ============================================================
        function isUserAtBottom() {
            const container = document.getElementById('chatMessages');
            const threshold = 30;
            return container.scrollHeight - container.scrollTop - container.clientHeight < threshold;
        }

        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
            document.getElementById('scrollDownBtn').classList.remove('visible');
        }

        function checkScrollPosition() {
            const btn = document.getElementById('scrollDownBtn');
            if (!isUserAtBottom()) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        }

        function setupChatScrollMonitoring() {
            const container = document.getElementById('chatMessages');
            
            container.addEventListener('scroll', function() {
                if (isUserAtBottom()) {
                    document.getElementById('scrollDownBtn').classList.remove('visible');
                } else {
                    document.getElementById('scrollDownBtn').classList.add('visible');
                }
            });
        }

        // ============================================================
        // 🚪 LEAVE ROOM
        // ============================================================
        async function leaveRoom() {
            try {
                if (mySeatIndex !== -1) {
                    await database.ref('rooms/' + roomId + '/seats/' + mySeatIndex).remove();
                }
                if (roomListener) database.ref('rooms/' + roomId).off();
                if (chatListener) database.ref('rooms/' + roomId + '/chat').off();
                if (seatsListener) database.ref('rooms/' + roomId + '/seats').off();
                if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
                if (audioContext) audioContext.close();
                if (peer) peer.destroy();
                window.location.href = 'chat.html';
            } catch (error) {
                console.error('Error leaving room:', error);
                window.location.href = 'chat.html';
            }
        }

        // ============================================================
        // 🍞 TOAST
        // ============================================================
        function showToast(message, type = 'info') {
            const colors = {
                success: '#10b981',
                error: '#ef4444',
                warning: '#f59e0b',
                info: '#3b82f6'
            };
            
            const oldToast = document.querySelector('.toast-message');
            if (oldToast) oldToast.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.style.cssText = `
                position: fixed; top: 60px; right: 15px; padding: 6px 14px; border-radius: 8px;
                color: white; font-weight: 600; z-index: 10000; box-shadow: 0 8px 25px rgba(0,0,0,0.3);
                animation: slideDown 0.3s ease-out; max-width: 280px;
                background: ${colors[type] || colors.info}; direction: rtl; font-size: 0.75rem;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(30px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // ============================================================
        // 🚀 INIT
        // ============================================================
        window.onload = function() {
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                database = firebase.database();
                console.log('✅ Firebase connected');
            } catch (error) {
                console.error('❌ Firebase error:', error);
            }
            
            const roomIdFromURL = getRoomIdFromURL();
            if (!roomIdFromURL) {
                showToast('❌ لم يتم العثور على معرف الغرفة', 'error');
                setTimeout(() => window.location.href = 'chat.html', 2000);
                return;
            }
            document.getElementById('micOverlay').style.display = 'flex';
            console.log('🎙️ جاهز لطلب إذن الميكروفون');
        };

        // ============================================================
        // 🧹 CLEANUP
        // ============================================================
        window.addEventListener('beforeunload', function() {
            if (roomId && mySeatIndex !== -1) {
                database.ref('rooms/' + roomId + '/seats/' + mySeatIndex).remove();
            }
            if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
            if (audioContext) audioContext.close();
            if (roomListener) database.ref('rooms/' + roomId).off();
            if (chatListener) database.ref('rooms/' + roomId + '/chat').off();
            if (seatsListener) database.ref('rooms/' + roomId + '/seats').off();
            if (peer) peer.destroy();
        });
    </script>
</body>
</html>
