<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="images//videoslogo/vip.png">
    <title>إدارة مبيعات البطاقات - VipClub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- 🔥 إضافة Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #0f172a;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--dark);
        }

        .admin-container { max-width: 1100px; margin: 0 auto; }

        .header-panel {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header-top h2 { margin: 0; font-size: 1.6rem; display: flex; align-items: center; gap: 12px; color: var(--primary); }

        .filter-tabs {
            display: flex;
            gap: 10px;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 12px;
        }
        .tab-btn {
            flex: 1;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            background: transparent;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .controls-row { display: flex; gap: 15px; flex-wrap: wrap; }
        
        .search-wrapper { flex: 1; position: relative; min-width: 300px; }
        .search-wrapper i { position: absolute; right: 15px; top: 14px; color: #94a3b8; }
        .search-wrapper input {
            width: 100%; padding: 12px 45px 12px 15px;
            border-radius: 12px; border: 1.5px solid #e2e8f0;
            box-sizing: border-box; transition: 0.3s; font-size: 1rem;
        }
        .search-wrapper input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(99,102,241,0.1); }

        .btn-refresh {
            background: var(--primary); color: white; border: none; padding: 12px 25px;
            border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px;
            font-weight: 600; transition: 0.3s;
        }
        .btn-refresh:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99,102,241,0.3); }

        .order-card {
            background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #eef2f6;
            animation: slideIn 0.4s ease-out;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        /* تأثير التحديث الفوري للطلبات */
        .order-card.updating {
            animation: pulseUpdate 0.8s ease-in-out;
            border-left: 5px solid var(--primary);
        }
        
        .order-card.accepted {
            animation: slideOutLeft 0.5s ease-out forwards;
            background: linear-gradient(135deg, #f0fff4 0%, #e6fffa 100%);
            border-left: 5px solid var(--success);
        }
        
        .order-card.rejected {
            animation: slideOutRight 0.5s ease-out forwards;
            background: linear-gradient(135deg, #fff5f5 0%, #fff1f1 100%);
            border-left: 5px solid var(--danger);
        }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideOutLeft { to { transform: translateX(-100%); opacity: 0; } }
        @keyframes slideOutRight { to { transform: translateX(100%); opacity: 0; } }
        @keyframes pulseUpdate { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.98); } }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px; }
        .user-badge { background: #f0f4ff; color: #4338ca; padding: 6px 14px; border-radius: 10px; font-size: 0.9rem; font-weight: 700; }
        .trx-id { font-family: 'Courier New', monospace; color: #64748b; font-size: 0.95rem; background: #f8fafc; padding: 4px 10px; border-radius: 6px; }

        .card-body { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .product-name { font-size: 1.25rem; font-weight: 800; color: #1e293b; margin: 0; }
        .price-tag { font-size: 1.3rem; color: var(--success); font-weight: 900; }

        .action-panel {
            background: #f8fafc; padding: 20px; border-radius: 15px;
            display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
        }
        .code-input {
            flex: 1; min-width: 250px; padding: 12px 15px;
            border: 2px solid #cbd5e1; border-radius: 10px;
            font-weight: bold; text-align: center; font-size: 1rem;
        }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { border: none; padding: 12px 22px; border-radius: 10px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-approve { background: var(--success); color: white; }
        .btn-reject { background: var(--danger); color: white; }
        .btn-delete { background: #64748b; color: white; }
        .btn-restore { background: var(--warning); color: white; }

        .empty-state { text-align: center; padding: 80px 20px; color: #cbd5e1; }
        .fa-spin { animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* رسائل التنبيه */
        .firebase-alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .firebase-success {
            background: #10b981;
            color: white;
            border-left: 5px solid #059669;
        }
        
        .firebase-error {
            background: #ef4444;
            color: white;
            border-left: 5px solid #dc2626;
        }
        
        .firebase-warning {
            background: #f59e0b;
            color: white;
            border-left: 5px solid #d97706;
        }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* شريط التحميل للعمليات */
        .processing-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            z-index: 10;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .processing-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .processing-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<!-- رسائل Firebase -->
<div id="firebaseAlert" class="firebase-alert" style="display: none;"></div>

<div class="admin-container">
    <div class="header-panel">
        <div class="header-top">
            <h2><i class="fas fa-cart-arrow-down"></i> مراجعة طلبات الشراء</h2>
            <div id="counterBadge" style="background: var(--warning); color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: bold;">
                <span id="loadingText">جاري الاتصال...</span>
                <span id="ordersCount" style="display:none;">0</span>
            </div>
        </div>

        <div class="filter-tabs">
            <button class="tab-btn active" onclick="changeTab('قيد المراجعة', this)">قيد المراجعة</button>
            <button class="tab-btn" onclick="changeTab('تم القبول', this)">المقبولة</button>
            <button class="tab-btn" onclick="changeTab('تم الرفض', this)">المرفوضة</button>
        </div>
        
        <div class="controls-row">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="orderSearch" placeholder="بحث باسم العميل، ID، رقم الطلب..." oninput="searchOrders()">
            </div>
            <button class="btn-refresh" onclick="triggerRefresh()">
                <i class="fas fa-sync-alt" id="syncIcon"></i> تحديث الطلبات
            </button>
        </div>
    </div>

    <div id="ordersWrapper">
        <div class="empty-state">
            <div class="spinner" style="width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
            <p>جاري الاتصال بقاعدة البيانات...</p>
            <p style="font-size: 0.9rem; color: #94a3b8; margin-top: 10px;" id="connectionInfo">جارٍ الاتصال بـ Firebase...</p>
        </div>
    </div>
</div>

<script>
// 🔥 تكوين Firebase - مشروع stvipclub الجديد
const firebaseConfig = {
    apiKey: "AIzaSyAX0jz_yOGagteO5R5ZHji1ZG44fk--Zvs",
    authDomain: "stvipclub.firebaseapp.com",
    databaseURL: "https://stvipclub-default-rtdb.europe-west1.firebasedatabase.app/",
    projectId: "stvipclub",
    storageBucket: "stvipclub.firebasestorage.app",
    messagingSenderId: "526607326044",
    appId: "1:526607326044:web:6af53db123ae02c7193f99",
    measurementId: "G-QZQMQCH9N9"
};

// المتغيرات العامة
let database;
let currentStatus = 'قيد المراجعة';
let allOrders = [];
let allUsers = [];

// عرض رسالة
function showAlert(message, type) {
    const alertDiv = document.getElementById('firebaseAlert');
    alertDiv.textContent = message;
    alertDiv.className = `firebase-alert firebase-${type}`;
    alertDiv.style.display = 'flex';
    
    setTimeout(() => {
        alertDiv.style.display = 'none';
    }, 3000);
}

// عرض/إخفاء شريط التحميل على الطلب
function showProcessing(orderKey, show) {
    const element = document.getElementById(`row-${orderKey}`);
    if (!element) return;
    
    // إنشاء أو الحصول على شريط التحميل
    let overlay = element.querySelector('.processing-overlay');
    if (!overlay) {
        overlay = document.createElement('div');
        overlay.className = 'processing-overlay';
        overlay.innerHTML = `
            <div class="processing-spinner"></div>
            <div style="font-weight: bold; color: var(--primary);">جاري المعالجة...</div>
        `;
        element.appendChild(overlay);
        element.style.position = 'relative';
    }
    
    if (show) {
        overlay.classList.add('active');
        element.classList.add('updating');
    } else {
        overlay.classList.remove('active');
        element.classList.remove('updating');
    }
}

// تهيئة Firebase - محسنة للتأكد من عدم وجود نسخة قديمة
async function initializeFirebase() {
    try {
        // حذف أي نسخة قديمة من Firebase
        if (firebase.apps.length > 0) {
            console.log('🔄 جاري حذف Firebase القديم...');
            await firebase.app().delete();
        }
        
        // تهيئة Firebase من جديد بالمشروع الصحيح
        firebase.initializeApp(firebaseConfig);
        database = firebase.database();
        
        document.getElementById('connectionInfo').innerHTML = '✅ متصل بـ Firebase (مشروع stvipclub)';
        document.getElementById('loadingText').textContent = 'جاري التحميل...';
        
        // اختبار الاتصال بكتابة بسيطة
        await database.ref('connection_test').set({
            timestamp: new Date().toISOString(),
            message: 'اتصال ناجح من صفحة إدارة البطاقات'
        });
        
        console.log('✅ Firebase متصل بالمشروع الجديد:', firebaseConfig.projectId);
        showAlert('✅ تم الاتصال بقاعدة البيانات الجديدة بنجاح', 'success');
        
        // تحميل البيانات
        await loadAllData();
        
    } catch (error) {
        console.error('Firebase init error:', error);
        document.getElementById('connectionInfo').innerHTML = '❌ خطأ في الاتصال: ' + error.message;
        showAlert('❌ خطأ في الاتصال بقاعدة البيانات: ' + error.message, 'error');
        
        // عرض رسالة خطأ للمستخدم
        document.getElementById('ordersWrapper').innerHTML = `
            <div class="empty-state">
                <i class="fas fa-exclamation-triangle" style="font-size:4rem; color:#ef4444;"></i>
                <p style="color:#ef4444; font-weight:bold;">حدث خطأ في الاتصال بقاعدة البيانات</p>
                <p style="font-size:0.9rem; color:#64748b;">${error.message}</p>
                <button class="btn btn-primary" onclick="initializeFirebase()" style="margin-top:20px; padding:12px 30px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer;">
                    🔄 إعادة المحاولة
                </button>
            </div>
        `;
    }
}

// تحميل كل البيانات
async function loadAllData() {
    try {
        if (!database) return;
        
        // جلب الطلبات من Firebase
        const ordersSnapshot = await database.ref('orders').once('value');
        allOrders = [];
        
        if (ordersSnapshot.exists()) {
            const ordersData = ordersSnapshot.val();
            for (const key in ordersData) {
                allOrders.push({
                    ...ordersData[key],
                    firebaseKey: key
                });
            }
            console.log(`📦 تم تحميل ${allOrders.length} طلب`);
        } else {
            console.log('📦 لا توجد طلبات في قاعدة البيانات');
        }
        
        // جلب المستخدمين من Firebase
        const usersSnapshot = await database.ref('users').once('value');
        allUsers = [];
        
        if (usersSnapshot.exists()) {
            const usersData = usersSnapshot.val();
            for (const key in usersData) {
                allUsers.push({
                    ...usersData[key],
                    firebaseKey: key
                });
            }
            console.log(`👥 تم تحميل ${allUsers.length} مستخدم`);
        }
        
        // عرض البيانات
        fetchAndRender();
        
    } catch (error) {
        console.error('Load data error:', error);
        showAlert('❌ خطأ في تحميل البيانات: ' + error.message, 'error');
    }
}

// تغيير التبويب
function changeTab(status, btn) {
    currentStatus = status;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    fetchAndRender();
}

// تحديث البيانات
function triggerRefresh() {
    const icon = document.getElementById('syncIcon');
    icon.classList.add('fa-spin');
    
    loadAllData().then(() => {
        setTimeout(() => {
            icon.classList.remove('fa-spin');
            showAlert('✅ تم تحديث البيانات', 'success');
        }, 500);
    }).catch(() => {
        icon.classList.remove('fa-spin');
    });
}

// البحث في الطلبات
function searchOrders() {
    fetchAndRender();
}

// عرض الطلبات
function fetchAndRender() {
    const wrapper = document.getElementById('ordersWrapper');
    const searchInput = document.getElementById('orderSearch').value.toLowerCase();
    
    // فلترة الطلبات حسب الحالة والنوع
    let purchaseOrders = allOrders.filter(o => 
        o.status === currentStatus && 
        o.type === 'purchase'
    );
    
    if (searchInput) {
        purchaseOrders = purchaseOrders.filter(o => 
            (o.orderId && o.orderId.toLowerCase().includes(searchInput)) || 
            (o.username && o.username.toLowerCase().includes(searchInput)) ||
            (o.nickname && o.nickname.toLowerCase().includes(searchInput)) ||
            (o.userId && o.userId.toString().includes(searchInput)) ||
            (o.product && o.product.toLowerCase().includes(searchInput))
        );
    }
    
    // تحديث العداد
    document.getElementById('ordersCount').textContent = purchaseOrders.length;
    document.getElementById('ordersCount').style.display = 'inline';
    document.getElementById('loadingText').style.display = 'none';
    
    if (purchaseOrders.length === 0) {
        wrapper.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-clipboard-check" style="font-size:4rem; color:#cbd5e1;"></i>
                <p>لا توجد طلبات في هذا القسم</p>
                <p style="font-size:0.9rem; color:#94a3b8;">${searchInput ? 'حاول بتغيير كلمات البحث' : 'الطلبات الجديدة ستظهر هنا تلقائياً'}</p>
            </div>
        `;
        return;
    }
    
    // ترتيب الطلبات من الأحدث للأقدم
    purchaseOrders.sort((a, b) => {
        const timeA = a.timestamp || (a.createdAt ? new Date(a.createdAt).getTime() : 0);
        const timeB = b.timestamp || (b.createdAt ? new Date(b.createdAt).getTime() : 0);
        return timeB - timeA;
    });
    
    wrapper.innerHTML = '';
    
    purchaseOrders.forEach(order => {
        const displayName = order.nickname || order.username || `مستخدم ${order.userId}`;
        
        // تنسيق السعر
        let displayPrice = order.price;
        if (!displayPrice.includes('USD') && !displayPrice.includes('ج.م')) {
            displayPrice += ' ج.م';
        }
        
        let actionButtons = '';
        
        if (currentStatus === 'قيد المراجعة') {
            actionButtons = `
                <input type="text" class="code-input" id="input-${order.firebaseKey}" placeholder="ألصق كود البطاقة هنا...">
                <div class="btn-group">
                    <button class="btn btn-approve" onclick="handleAction('${order.firebaseKey}', 'accept')">
                        <i class="fas fa-check"></i> قبول وإرسال الكود
                    </button>
                    <button class="btn btn-reject" onclick="handleAction('${order.firebaseKey}', 'reject')">
                        <i class="fas fa-ban"></i> رفض وإرجاع الرصيد
                    </button>
                    <button class="btn btn-delete" onclick="handleAction('${order.firebaseKey}', 'delete')">
                        <i class="fas fa-trash"></i> حذف
                    </button>
                </div>
            `;
        } else {
            actionButtons = `
                <div style="flex:1; color:#64748b; font-size:0.9rem">
                    <i class="fas fa-info-circle"></i> حالة الطلب: ${order.status}
                </div>
                <div class="btn-group">
                    <button class="btn btn-restore" onclick="handleAction('${order.firebaseKey}', 'restore')">
                        <i class="fas fa-undo"></i> استعادة للانتظار
                    </button>
                    <button class="btn btn-delete" onclick="handleAction('${order.firebaseKey}', 'delete')">
                        <i class="fas fa-trash"></i> حذف نهائي
                    </button>
                </div>
            `;
        }
        
        // التاريخ
        let dateDisplay = '---';
        if (order.createdAt) {
            try {
                dateDisplay = new Date(order.createdAt).toLocaleString('ar-EG');
            } catch (e) {
                dateDisplay = order.createdAt;
            }
        }
        
        wrapper.innerHTML += `
            <div class="order-card" id="row-${order.firebaseKey}">
                <div class="card-header">
                    <span class="user-badge">${displayName} (ID: ${order.userId})</span>
                    <span class="trx-id">${order.orderId}</span>
                </div>
                <div class="card-body">
                    <h3 class="product-name">${order.product}</h3>
                    <div class="price-tag">${displayPrice}</div>
                </div>
                <div class="action-panel">
                    ${actionButtons}
                </div>
                <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #f1f5f9; font-size: 0.85rem; color: #64748b; display: flex; justify-content: space-between;">
                    <span><i class="far fa-clock"></i> ${dateDisplay}</span>
                    <span><i class="fas fa-database"></i> Firebase ID: ${order.firebaseKey.substring(0, 8)}...</span>
                </div>
            </div>`;
    });
}

// معالجة الإجراءات
async function handleAction(orderKey, actionType) {
    try {
        const order = allOrders.find(o => o.firebaseKey === orderKey);
        if (!order) {
            showAlert('❌ لم يتم العثور على الطلب', 'error');
            return;
        }
        
        // عرض شريط التحميل
        showProcessing(orderKey, true);
        
        if (actionType === 'accept') {
            await handleAccept(orderKey, order);
        } else if (actionType === 'reject') {
            await handleReject(orderKey, order);
        } else if (actionType === 'restore') {
            await handleRestore(orderKey);
        } else if (actionType === 'delete') {
            await handleDelete(orderKey);
        }
        
    } catch (error) {
        console.error('Action error:', error);
        showAlert('❌ حدث خطأ أثناء المعالجة', 'error');
        showProcessing(orderKey, false);
    }
}

// دالة محسنة للبحث عن المستخدم
async function findUserById(userId) {
    const userIdStr = userId.toString();
    
    // البحث في المستخدمين المحفوظين محلياً أولاً
    let user = allUsers.find(u => 
        (u.id && u.id.toString() === userIdStr) ||
        (u.userId && u.userId.toString() === userIdStr) ||
        (u.numericId && u.numericId.toString() === userIdStr) ||
        (u.username && u.username.toString() === userIdStr) ||
        (u.nickname && u.nickname === userIdStr)
    );
    
    if (user) {
        return { success: true, userData: user, userKey: user.firebaseKey };
    }
    
    // إذا لم يتم العثور محلياً، ابحث في Firebase
    try {
        const usersSnapshot = await database.ref('users').once('value');
        if (!usersSnapshot.exists()) {
            return { success: false, message: "لا يوجد مستخدمين في قاعدة البيانات" };
        }
        
        const usersData = usersSnapshot.val();
        
        for (const key in usersData) {
            const u = usersData[key];
            
            const matchFound = 
                (u.id && u.id.toString() === userIdStr) ||
                (u.userId && u.userId.toString() === userIdStr) ||
                (u.numericId && u.numericId.toString() === userIdStr) ||
                (u.username && u.username.toString() === userIdStr) ||
                (u.nickname && u.nickname === userIdStr);
            
            if (matchFound) {
                // تحديث القائمة المحلية
                allUsers.push({
                    ...u,
                    firebaseKey: key
                });
                
                return { 
                    success: true, 
                    userKey: key, 
                    userData: u 
                };
            }
        }
        
        return { 
            success: false, 
            message: `لم يتم العثور على المستخدم بالمعرف: ${userId}` 
        };
        
    } catch (error) {
        console.error('Error finding user:', error);
        return { 
            success: false, 
            message: `خطأ في البحث عن المستخدم: ${error.message}` 
        };
    }
}

// قبول الطلب وإرسال الكود - نسخة محسنة للسرعة
async function handleAccept(orderKey, order) {
    const codeInput = document.getElementById(`input-${orderKey}`);
    const codeValue = codeInput.value.trim();
    
    if (!codeValue) {
        showAlert('⚠️ يجب إدخال الكود أولاً!', 'warning');
        codeInput.focus();
        showProcessing(orderKey, false);
        return;
    }
    
    try {
        // 1. تحديث حالة الطلب أولاً (الأهم للسرعة)
        const orderUpdatePromise = database.ref('orders/' + orderKey).update({
            status: 'تم القبول',
            code: codeValue,
            approvedAt: new Date().toISOString(),
            approvedBy: 'admin',
            updatedAt: new Date().toISOString()
        });
        
        // 2. البحث عن المستخدم بشكل متوازي
        const userResultPromise = findUserById(order.userId);
        
        // انتظار كلا العملين
        await Promise.all([orderUpdatePromise, userResultPromise]);
        
        const userResult = await userResultPromise;
        
        if (!userResult.success) {
            showAlert(`⚠️ ${userResult.message}`, 'warning');
            showProcessing(orderKey, false);
            return;
        }
        
        const { userKey, userData } = userResult;
        const userRef = database.ref('users/' + userKey);
        
        // 3. إضافة البطاقة لمحفظة المستخدم
        const newCard = {
            code: codeValue,
            product: order.product,
            price: order.price,
            purchaseDate: new Date().toISOString(),
            orderId: order.orderId,
            status: 'active',
            addedAt: new Date().toISOString()
        };
        
        // إضافة البطاقة (بدون جلب البطاقات القديمة لزيادة السرعة)
        const cardsUpdatePromise = userRef.child('purchasedCards').transaction(currentCards => {
            if (!currentCards) return [newCard];
            if (Array.isArray(currentCards)) {
                return [...currentCards, newCard];
            } else {
                // إذا كانت كائن، نحوله لمصفوفة
                const cardsArray = Object.values(currentCards);
                return [...cardsArray, newCard];
            }
        });
        
        // 4. إضافة الإشعار
        const notification = {
            id: Date.now(),
            text: `✅ تم قبول طلبك لـ "${order.product}"! الكود: ${codeValue} (متاح في المحفظة)`,
            type: 'purchase_approved',
            read: false,
            date: new Date().toLocaleString('ar-EG'),
            createdAt: new Date().toISOString()
        };
        
        const notificationPromise = userRef.child('notifications').transaction(currentNotifs => {
            if (!currentNotifs) return [notification];
            if (Array.isArray(currentNotifs)) {
                return [notification, ...currentNotifs];
            } else {
                const notifsArray = Object.values(currentNotifs);
                return [notification, ...notifsArray];
            }
        });
        
        // تنفيذ العمليات المتوازية
        await Promise.all([cardsUpdatePromise, notificationPromise]);
        
        // 5. تأثير بصري سريع
        const element = document.getElementById(`row-${orderKey}`);
        if (element) {
            element.classList.add('accepted');
        }
        
        // 6. مسح حقل الإدخال
        codeInput.value = '';
        
        // 7. رسالة النجاح
        showAlert(`✅ تم قبول الطلب وإرسال الكود للمستخدم ${userData.nickname || userData.username || order.userId}`, 'success');
        
        // 8. إخفاء شريط التحميل
        showProcessing(orderKey, false);
        
        // 9. إزالة العنصر من الواجهة بعد انتهاء الرسوم المتحركة
        setTimeout(() => {
            // تحديث القائمة المحلية بدلاً من إعادة تحميل كامل
            const index = allOrders.findIndex(o => o.firebaseKey === orderKey);
            if (index !== -1) {
                allOrders[index].status = 'تم القبول';
                fetchAndRender();
            }
        }, 500);
        
    } catch (error) {
        console.error('Accept error details:', error);
        showAlert('❌ خطأ في إرسال الكود: ' + error.message, 'error');
        showProcessing(orderKey, false);
    }
}

// رفض الطلب وإرجاع الرصيد - نسخة محسنة للسرعة
async function handleReject(orderKey, order) {
    const reason = prompt("سبب الرفض (سيظهر للمستخدم):");
    if (reason === null) {
        showProcessing(orderKey, false);
        return;
    }
    
    if (!reason.trim()) {
        showAlert('⚠️ يجب إدخال سبب الرفض', 'warning');
        showProcessing(orderKey, false);
        return;
    }
    
    try {
        // استخراج قيمة المبلغ
        const priceText = order.price || '0';
        let priceValue, currency;
        
        if (priceText.includes('USD')) {
            priceValue = parseFloat(priceText.replace(/[^\d.]/g, '')) || 0;
            currency = "USD";
        } else {
            priceValue = parseFloat(priceText.replace(/[^\d.]/g, '')) || 0;
            currency = "ج.م";
        }
        
        // 1. تحديث حالة الطلب
        const orderUpdatePromise = database.ref('orders/' + orderKey).update({
            status: 'تم الرفض',
            rejectReason: reason,
            refundAmount: priceValue,
            refundCurrency: currency,
            rejectedAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
        });
        
        // 2. البحث عن المستخدم
        const userResultPromise = findUserById(order.userId);
        
        await Promise.all([orderUpdatePromise, userResultPromise]);
        const userResult = await userResultPromise;
        
        if (!userResult.success) {
            showAlert(`⚠️ ${userResult.message}`, 'warning');
            showProcessing(orderKey, false);
            return;
        }
        
        const { userKey, userData } = userResult;
        const userRef = database.ref('users/' + userKey);
        
        // 3. إرجاع الرصيد
        let balanceUpdatePromise;
        if (currency === "USD") {
            balanceUpdatePromise = userRef.child('balanceUSD').transaction(currentBalance => {
                const current = parseFloat(currentBalance) || 0;
                return (current + priceValue).toFixed(2);
            });
        } else {
            balanceUpdatePromise = userRef.child('balanceEGP').transaction(currentBalance => {
                const current = parseFloat(currentBalance) || 0;
                return (current + priceValue).toFixed(2);
            });
        }
        
        // 4. إضافة الإشعار
        const notification = {
            id: Date.now(),
            text: `❌ تم رفض طلبك لـ "${order.product}". السبب: ${reason}. تم إرجاع ${priceValue} ${currency} لرصيدك.`,
            type: 'purchase_rejected',
            read: false,
            date: new Date().toLocaleString('ar-EG'),
            createdAt: new Date().toISOString()
        };
        
        const notificationPromise = userRef.child('notifications').transaction(currentNotifs => {
            if (!currentNotifs) return [notification];
            if (Array.isArray(currentNotifs)) {
                return [notification, ...currentNotifs];
            } else {
                const notifsArray = Object.values(currentNotifs);
                return [notification, ...notifsArray];
            }
        });
        
        // تنفيذ جميع العمليات المتوازية
        await Promise.all([balanceUpdatePromise, notificationPromise]);
        
        // 5. تأثير بصري سريع
        const element = document.getElementById(`row-${orderKey}`);
        if (element) {
            element.classList.add('rejected');
        }
        
        // 6. رسالة النجاح
        showAlert(`✅ تم رفض الطلب وإعادة ${priceValue} ${currency} للمستخدم`, 'success');
        
        // 7. إخفاء شريط التحميل
        showProcessing(orderKey, false);
        
        // 8. إزالة العنصر من الواجهة بعد انتهاء الرسوم المتحركة
        setTimeout(() => {
            // تحديث القائمة المحلية
            const index = allOrders.findIndex(o => o.firebaseKey === orderKey);
            if (index !== -1) {
                allOrders[index].status = 'تم الرفض';
                fetchAndRender();
            }
        }, 500);
        
    } catch (error) {
        console.error('Reject error:', error);
        showAlert('❌ خطأ في رفض الطلب: ' + error.message, 'error');
        showProcessing(orderKey, false);
    }
}

// استعادة الطلب للانتظار
async function handleRestore(orderKey) {
    if (!confirm("هل تريد إعادة الطلب لقائمة 'قيد المراجعة'؟")) {
        showProcessing(orderKey, false);
        return;
    }
    
    try {
        await database.ref('orders/' + orderKey).update({
            status: 'قيد المراجعة',
            code: null,
            approvedAt: null,
            rejectReason: null,
            refundAmount: null,
            updatedAt: new Date().toISOString()
        });
        
        // تحديث القائمة المحلية
        const index = allOrders.findIndex(o => o.firebaseKey === orderKey);
        if (index !== -1) {
            allOrders[index].status = 'قيد المراجعة';
            allOrders[index].code = null;
        }
        
        showAlert('✅ تم استعادة الطلب بنجاح', 'success');
        showProcessing(orderKey, false);
        
        // إعادة التصيير الفوري
        fetchAndRender();
        
    } catch (error) {
        console.error('Restore error:', error);
        showAlert('❌ خطأ في استعادة الطلب', 'error');
        showProcessing(orderKey, false);
    }
}

// حذف الطلب نهائياً
async function handleDelete(orderKey) {
    if (!confirm("⚠️ هل أنت متأكد من حذف هذا الطلب نهائياً؟ لا يمكن التراجع عن هذا الإجراء.")) {
        showProcessing(orderKey, false);
        return;
    }
    
    try {
        await database.ref('orders/' + orderKey).remove();
        
        // إزالة من القائمة المحلية
        allOrders = allOrders.filter(o => o.firebaseKey !== orderKey);
        
        // تأثير بصري للحذف
        const element = document.getElementById(`row-${orderKey}`);
        if (element) {
            element.style.transform = 'scale(0.9)';
            element.style.opacity = '0';
        }
        
        showAlert('✅ تم حذف الطلب نهائياً', 'success');
        showProcessing(orderKey, false);
        
        // تحديث الواجهة
        setTimeout(() => {
            fetchAndRender();
        }, 300);
        
    } catch (error) {
        console.error('Delete error:', error);
        showAlert('❌ خطأ في حذف الطلب', 'error');
        showProcessing(orderKey, false);
    }
}
