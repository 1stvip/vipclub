        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);

            overflow-x: hidden;
        }

        /* شريط التنقل */
        .navbar {
            background: rgba(15, 23, 42, 0.95);

            padding: 0.6rem 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 8px;

        }

        .logo {
            font-size: 1.2rem;

        .logo i { font-size: 1.3rem; }

        }

            font-size: 1.2rem;

            height: 40px;

        /* الهيدر */

            text-align: center;
            padding: 40px 20px 20px;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.2), transparent 70%);

            width: 120px;

        .vip-4 { background: #3b82f6; color: white; }
        .vip-5 { background: #ef4444; color: white; }

        .balance-cards {

        }

        }

            font-size: 1.3rem;

            margin: 30px 0 15px;
            padding-right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 0 20px;
            max-width: 1200px;
            margin: 0 auto;

        .achievement-card {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
            text-align: center;
        }

        .achievement-card:hover {
            transform: translateY(-5px);
            border-color: #8b5cf6;
        }

        .achievement-card .ach-icon {
            font-size: 2.5rem;

        }

            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 5px;
        }

        .achievement-card .ach-date {

            border-color: rgba(139, 92, 246, 0.3);
            background: rgba(139, 92, 246, 0.05);
        }

        .achievement-card.locked {
            opacity: 0.5;
        }

        .achievement-card.locked .ach-icon {
            filter: grayscale(1);
        }

        /* الأطارات والدخلات */
        .cosmetics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            padding: 0 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .cosmetic-item {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 15px;

            border: 1px solid rgba(255,255,255,0.05);

            background: rgba(255,215,0,0.05);

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 14px;
            z-index: 10000;
            animation: slideUp 0.4s ease;
            max-width: 380px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 12px;

        .toast-success { background: rgba(16, 185, 129, 0.95); color: white; }
        .toast-error { background: rgba(239, 68, 68, 0.95); color: white; }
        .toast-warning { background: rgba(245, 158, 11, 0.95); color: white; }
        .toast-info { background: rgba(59, 130, 246, 0.95); color: white; }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #94a3b8;
        }

        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;

            .profile-name { font-size: 1.3rem; }
            .balance-cards { grid-template-columns: 1fr 1fr; }
            .achievements-grid { grid-template-columns: 1fr; }

</head>

            { id: 'title_vip2', name: 'ملك الغابة', icon: '🦁', type: 'لقب', requiredVip: 2 },
            { id: 'title_vip3', name: 'سيد المحيط', icon: '🌊', type: 'لقب', requiredVip: 3 },
            { id: 'title_vip4', name: 'حارس الغابة', icon: '🌲', type: 'لقب', requiredVip: 4 },
            { id: 'title_vip5', name: 'رائد الفضاء', icon: '🚀', type: 'لقب', requiredVip: 5 },
            { id: 'title_legend', name: 'أسطورة', icon: '👑', type: 'لقب', requiredVip: 5 }
        ]
    };

    // ===== تهيئة Firebase =====
    function initializeFirebase() {
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            database = firebase.database();
            auth = firebase.auth();
            console.log('✅ Firebase initialized');

            auth.onAuthStateChanged((user) => {
                if (user) {
                    loadProfile();
                } else {
                    window.location.href = 'Login2.html';
                }
            });
        } catch (error) {
            console.error('❌ Firebase error:', error);
        }
    }

    // ===== جلب بيانات المستخدم =====
    function getCurrentUserFromStorage() {
        try {
            return JSON.parse(localStorage.getItem('currentUser'));
        } catch {
            return null;
        }
    }

    async function loadProfile() {
        try {
            const localUser = getCurrentUserFromStorage();
            if (!localUser) {
                window.location.href = 'Login2.html';
                return;
            }

            currentUser = localUser;

            if (database) {
                const userRef = database.ref('users').orderByChild('numericId').equalTo(localUser.numericId);
                const snapshot = await userRef.once('value');
                if (snapshot.exists()) {
                    const users = snapshot.val();
                    const userId = Object.keys(users)[0];
                    const userData = users[userId];
                    currentUser = { ...localUser, ...userData, firebaseKey: userId };
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                }
            }

            renderProfile();

        } catch (error) {
            console.error('Error loading profile:', error);
            showToast('❌ حدث خطأ في تحميل الملف الشخصي', 'error');
        }
    }

    // ===== عرض الملف الشخصي =====
    function renderProfile() {
        if (!currentUser) return;

        const vipLevel = currentUser.vipLevel || 0;
        const vipInfo = VIP_DATA[vipLevel] || null;
        const vipClass = vipInfo ? vipInfo.class : 'vip-none';
        const vipName = vipInfo ? vipInfo.name : 'لا يوجد VIP';
        const vipIcon = vipInfo ? vipInfo.icon : '👤';

        // حساب الإنجازات
        const achievements = calculateAchievements(currentUser);
        const unlockedAchievements = achievements.filter(a => a.unlocked);
        const lockedAchievements = achievements.filter(a => !a.unlocked);

        // حساب المقتنيات المتاحة
        const availableCosmetics = getAvailableCosmetics(currentUser);

        const html = `
            <!-- الهيدر -->

                <div class="profile-avatar" style="background: linear-gradient(135deg, ${vipInfo ? vipInfo.color : '#334155'}, #ffd700);">
                    ${vipIcon}
                </div>
                <div class="profile-name">${currentUser.nickname || currentUser.username || 'مستخدم'}</div>
                <div class="profile-id">🆔 ${formatNumericId(currentUser.numericId)}</div>
                <div class="profile-vip ${vipClass}">${vipIcon} ${vipName}</div>
            </div>

            <!-- الرصيد -->
            <div class="balance-cards">
                <div class="balance-card">
                    <div class="label">🇪🇬 رصيد الجنيه المصري</div>
                    <div class="amount egp">${currentUser.balanceEGP || 0} ج.م</div>
                </div>
                <div class="balance-card">
                    <div class="label">🇺🇸 رصيد الدولار</div>
                    <div class="amount usd">${currentUser.balanceUSD || 0} $</div>
                </div>
                <div class="balance-card">
                    <div class="label">💰 إجمالي الإنفاق</div>
                    <div class="amount" style="color: #ffd700;">${currentUser.totalSpent || 0} ج.م</div>
                </div>
            </div>

            <!-- الإنجازات -->
            <div class="section-title">
                <i class="fas fa-trophy"></i> الإنجازات
                <span style="font-size: 0.8rem; color: #94a3b8; font-weight: normal;">
                    (${unlockedAchievements.length}/${achievements.length})
                </span>
            </div>
            <div class="achievements-grid">
                ${achievements.map(a => `
                    <div class="achievement-card ${a.unlocked ? 'unlocked' : 'locked'}">
                        <div class="ach-icon">${a.icon}</div>
                        <div class="ach-name">${a.name}</div>
                        <div class="ach-desc">${a.desc}</div>
                        ${a.unlocked ? `<div class="ach-date">✅ تم الفتح في ${a.date}</div>` : '<div class="ach-date">🔒 غير مفتوح</div>'}
                    </div>
                `).join('')}
            </div>

            <!-- الأطارات -->
            <div class="section-title">
                <i class="fas fa-image"></i> الأطارات المتاحة
            </div>

                    <div class="cosmetic-item ${f.active ? 'active' : ''}">
                        <div class="cos-icon">${f.icon}</div>
                        <div class="cos-name">${f.name}</div>
                        <div class="cos-type">${f.type}</div>
                        ${f.active ? '<div style="color: #ffd700; font-size: 0.7rem;">✅ مفعل</div>' : ''}
                    </div>
                `).join('')}
            </div>

            <!-- الدخلات -->
            <div class="section-title">
                <i class="fas fa-door-open"></i> الدخلات المتاحة
            </div>
            <div class="cosmetics-grid">
                ${availableCosmetics.entrances.map(e => `
                    <div class="cosmetic-item ${e.active ? 'active' : ''}">
                        <div class="cos-icon">${e.icon}</div>
                        <div class="cos-name">${e.name}</div>
                        <div class="cos-type">${e.type}</div>
                        ${e.active ? '<div style="color: #ffd700; font-size: 0.7rem;">✅ مفعل</div>' : ''}

                ${availableCosmetics.titles.map(t => `

                `).join('')}
            </div>

        document.getElementById('profileContent').innerHTML = html;

    // ===== حساب الإنجازات =====
    function calculateAchievements(user) {
        const vipLevel = user.vipLevel || 0;
        const totalSpent = user.totalSpent || 0;
        const achievements = [];

        for (const key in ACHIEVEMENTS) {
            const ach = ACHIEVEMENTS[key];
            let unlocked = false;
            let date = '';

            // التحقق من الإنجازات
            if (key === 'first_purchase') {
                unlocked = user.purchasedCards && user.purchasedCards.length > 0;
            } else if (key.startsWith('vip_')) {
                const requiredVip = parseInt(key.split('_')[1]);
                unlocked = vipLevel >= requiredVip;
            } else if (key === 'spend_1000') {
                unlocked = totalSpent >= 1000;
            } else if (key === 'spend_5000') {
                unlocked = totalSpent >= 5000;
            } else if (key === 'spend_10000') {
                unlocked = totalSpent >= 10000;
            }

            if (unlocked && user.achievements && user.achievements[key]) {
                date = user.achievements[key];
            }

            achievements.push({
                ...ach,
                unlocked: unlocked,
                date: date || 'اليوم'
            });
        }

        return achievements;
    }

    // ===== الحصول على المقتنيات المتاحة =====
    function getAvailableCosmetics(user) {
        const vipLevel = user.vipLevel || 0;
        const allCosmetics = {
            frames: [],
            entrances: [],
            titles: []
        };

        // الأطارات
        COSMETICS.frames.forEach(f => {
            const available = !f.requiredVip || vipLevel >= f.requiredVip;
            allCosmetics.frames.push({
                ...f,
                available: available,
                active: f.id === (user.activeFrame || 'frame_default') && available
            });
        });

        // الدخلات
        COSMETICS.entrances.forEach(e => {
            const available = !e.requiredVip || vipLevel >= e.requiredVip;
            allCosmetics.entrances.push({
                ...e,
                available: available,
                active: e.id === (user.activeEntrance || 'entrance_default') && available
            });
        });

        // الألقاب
        COSMETICS.titles.forEach(t => {
            const available = !t.requiredVip || vipLevel >= t.requiredVip;
            allCosmetics.titles.push({
                ...t,
                available: available,
                active: t.id === (user.activeTitle || 'title_default') && available
            });
        });

        return allCosmetics;
    }

    // ===== تنسيق المعرف =====
    function formatNumericId(id) {
        if (!id) return "000000";
        const numId = parseInt(id);
        if (isNaN(numId)) return "000000";
        return numId.toString().padStart(6, '0');
    }

    // ===== توست =====
    function showToast(message, type = 'info') {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();

        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
        toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span> ${message}`;
        document.body.appendChild(toast);

        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(20px)';
            toast.style.transition = 'all 0.3s ease';
            setTimeout(() => toast.remove(), 300);
        }, 4000);
    }

    // ===== تسجيل الخروج =====
    function logout() {
        localStorage.removeItem('currentUser');
        window.location.href = 'Login2.html';
    }

    // ===== التهيئة =====
    window.onload = function() {
        initializeFirebase();
    };
</script>
