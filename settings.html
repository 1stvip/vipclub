<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <style>
        :root { 
            --primary: #6366f1; 
            --success: #10b981;
            --danger: #ef4444; 
            --dark: #1e293b;

        .btn {

        #customAlert {

            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .balance-value {
            font-weight: bold;
            font-size: 1.3rem;
        }
    </style>
</head>

<script>
// 🔥 إعدادات Firebase - مشروع stvipclub الجديد
const firebaseConfig = {
    apiKey: "AIzaSyAX0jz_yOGagteO5R5ZHji1ZG44fk--Zvs",
    authDomain: "stvipclub.firebaseapp.com",
    databaseURL: "https://stvipclub-default-rtdb.europe-west1.firebasedatabase.app/",
    projectId: "stvipclub",
    storageBucket: "stvipclub.firebasestorage.app",
    messagingSenderId: "526607326044",
    appId: "1:526607326044:web:6af53db123ae02c7193f99",
    measurementId: "G-QZQMQCH9N9"
};

// تهيئة Firebase
let database;
let currentUser = null;
let userFirebaseKey = null;

// تهيئة Firebase - محسنة للتأكد من عدم وجود نسخة قديمة
async function initializeFirebase() {
    try {
        // حذف أي نسخة قديمة من Firebase
        if (firebase.apps.length > 0) {
            console.log('🔄 جاري حذف Firebase القديم...');
            await firebase.app().delete();
        }
        
        // تهيئة Firebase من جديد بالمشروع الصحيح
        firebase.initializeApp(firebaseConfig);
        database = firebase.database();
        
        console.log("✅ Firebase initialized in settings with project:", firebaseConfig.projectId);
        
        // اختبار الاتصال بكتابة بسيطة
        await database.ref('connection_test').set({
            timestamp: new Date().toISOString(),
            message: 'اتصال ناجح من صفحة الإعدادات'
        });
        
        // تحميل بيانات المستخدم
        await loadUserData();
        
    } catch (error) {
        console.error("❌ Firebase error:", error);
        showMsg("خطأ في الاتصال بقاعدة البيانات", "error");
    }
}

// دالة لعرض الرسائل
function showMsg(text, type) {
    let alertBox = document.getElementById('customAlert');
    alertBox.innerText = text;
    alertBox.style.background = type === 'success' ? 'var(--success)' : 'var(--danger)';
    alertBox.style.display = 'block';
    setTimeout(() => { alertBox.style.display = 'none'; }, 3000);
}

// تحميل بيانات المستخدم من Firebase - مصححة
async function loadUserData() {
    try {
        // جلب المستخدم من localStorage (يجب أن يكون مسجلاً من صفحة الدخول)
        const sessionUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!sessionUser) {
            window.location.replace('Login.html');
            return;
        }

        // 🔧 التصحيح: نستخدم numericId مباشرة من sessionUser
        const numericId = sessionUser.numericId || sessionUser.id;
        
        if (!numericId) {
            showMsg("بيانات الجلسة غير صالحة، يرجى تسجيل الدخول مرة أخرى", "error");
            setTimeout(() => window.location.replace('Login.html'), 2000);
            return;
        }

        console.log("🔍 جارٍ البحث عن مستخدم برقم ID:", numericId);
        
        // البحث عن المستخدم في Firebase باستخدام numericId
        const snapshot = await database.ref('users').orderByChild('numericId').equalTo(parseInt(numericId)).once('value');
        
        if (!snapshot.exists()) {
            console.warn("⚠️ لم يتم العثور على المستخدم باستخدام numericId:", numericId);
            
            // محاولة البحث باستخدام firebaseKey إذا كان موجوداً
            if (sessionUser.firebaseKey) {
                console.log("🔄 جاري المحاولة باستخدام firebaseKey:", sessionUser.firebaseKey);
                const userSnapshot = await database.ref('users/' + sessionUser.firebaseKey).once('value');
                if (userSnapshot.exists()) {
                    currentUser = userSnapshot.val();
                    userFirebaseKey = sessionUser.firebaseKey;
                    console.log("✅ تم العثور على المستخدم باستخدام firebaseKey");
                } else {
                    showMsg("لم يتم العثور على حسابك في قاعدة البيانات", "error");
                    setTimeout(() => window.location.replace('Login.html'), 3000);
                    return;
                }
            } else {
                showMsg("لم يتم العثور على حسابك في قاعدة البيانات", "error");
                setTimeout(() => window.location.replace('Login.html'), 3000);
                return;
            }
        } else {
            // المستخدم موجود بالبحث التقليدي
            const usersData = snapshot.val();
            
            // الحصول على بيانات المستخدم والمفتاح
            for (const key in usersData) {
                currentUser = usersData[key];
                userFirebaseKey = key;
                break;
            }

            if (!currentUser) {
                showMsg("بيانات المستخدم غير موجودة", "error");
                return;
            }
        }

        // 🔧 تأكد من أن currentUser تم تعيينه
        if (!currentUser) {
            showMsg("فشل تحميل بيانات المستخدم", "error");
            return;
        }
        
        // تعبئة البيانات في الحقول
        document.getElementById('user_id').value = currentUser.numericId || numericId || "غير متوفر";
        document.getElementById('username').value = currentUser.username || sessionUser.username || "غير معروف";
        document.getElementById('edit_nickname').value = currentUser.nickname || currentUser.username || "";
        document.getElementById('edit_email').value = currentUser.email || "";
        document.getElementById('edit_email2').value = currentUser.email2 || "";
        document.getElementById('edit_phone').value = currentUser.phone || "";
        document.getElementById('edit_phone2').value = currentUser.phone2 || "";
        document.getElementById('edit_gender').value = currentUser.gender || "";
        document.getElementById('edit_age').value = currentUser.age || "";
        document.getElementById('edit_country').value = currentUser.country || "";
        document.getElementById('edit_bio').value = currentUser.bio || "";
        
        // 🔧 معالجة الأرصدة بشكل آمن
        const balanceEGP = parseFloat(currentUser.balanceEGP) || 0;
        const balanceUSD = parseFloat(currentUser.balanceUSD) || 0;
        document.getElementById('balanceEGP').textContent = balanceEGP.toFixed(2);
        document.getElementById('balanceUSD').textContent = balanceUSD.toFixed(2);

        // عرض تاريخ إنشاء الحساب
        if(currentUser.createdAt) {
            const date = new Date(currentUser.createdAt);
            document.getElementById('display_join_date').innerText = date.toLocaleDateString('ar-EG', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        } else {
            document.getElementById('display_join_date').innerText = "تاريخ غير مسجل";
        }

        // فحص صلاحية تغيير الاسم (90 يوم)
        if (currentUser.lastNicknameChange) {
            let daysPassed = (Date.now() - new Date(currentUser.lastNicknameChange).getTime()) / (1000 * 60 * 60 * 24);
            if (daysPassed < 90) {
                document.getElementById('edit_nickname').disabled = true;
                document.getElementById('nickname_hint').innerText = `باقي ${Math.ceil(90 - daysPassed)} يوم لتغيير الاسم.`;
            } else {
                document.getElementById('nickname_hint').innerText = "يمكنك تغيير اسمك الآن.";
                document.getElementById('nickname_hint').style.color = "var(--success)";
            }
        }

        // 🔧 تحديث بيانات المستخدم في localStorage لتكون متوافقة
        const updatedSessionUser = {
            id: currentUser.numericId, // 🔴 مهم: نحفظ numericId في id
            numericId: currentUser.numericId,
            username: currentUser.username,
            nickname: currentUser.nickname,
            email: currentUser.email,
            phone: currentUser.phone,
            firebaseKey: userFirebaseKey,
            balanceEGP: currentUser.balanceEGP || 0,
            balanceUSD: currentUser.balanceUSD || 0,
            isBanned: currentUser.isBanned || false,
            createdAt: currentUser.createdAt || new Date().toISOString()
        };
        
        localStorage.setItem('currentUser', JSON.stringify(updatedSessionUser));

        // تفعيل تحديثات الأرصدة في الوقت الحقيقي
        listenForBalanceUpdates();

    } catch (error) {
        console.error("❌ Error loading user data:", error);
        showMsg("خطأ في تحميل البيانات: " + error.message, "error");
        
        // 🔧 إعادة التوجيه إلى صفحة الدخول في حالة وجود خطأ
        setTimeout(() => {
            window.location.replace('Login.html');
        }, 3000);
    }
}

// حفظ التعديلات في Firebase
async function saveSettings() {
    if (!currentUser || !userFirebaseKey) {
        showMsg("لم يتم تحميل بيانات المستخدم", "error");
        return;
    }

    const newNickname = document.getElementById('edit_nickname').value.trim();
    const newEmail = document.getElementById('edit_email').value.trim();
    const newPhone = document.getElementById('edit_phone').value.trim();

    if (!newNickname || !newEmail || !newPhone) {
        showMsg("الحقول الأساسية مطلوبة", "error");
        return;
    }

    try {
        // التحقق من تكرار الاسم المستعار
        if (newNickname.toLowerCase() !== (currentUser.nickname || currentUser.username || "").toLowerCase()) {
            const nicknameSnapshot = await database.ref('users').orderByChild('nickname').equalTo(newNickname).once('value');
            if (nicknameSnapshot.exists()) {
                // التحقق أن الاسم ليس لنفس المستخدم
                let isSameUser = false;
                nicknameSnapshot.forEach((childSnapshot) => {
                    if (childSnapshot.key !== userFirebaseKey) {
                        isSameUser = true;
                    }
                });
                if (isSameUser) {
                    showMsg("هذا الاسم المستعار مستخدم بالفعل!", "error");
                    return;
                }
            }
        }

        // التحقق من تكرار البريد الإلكتروني
        if (newEmail !== currentUser.email) {
            const emailSnapshot = await database.ref('users').orderByChild('email').equalTo(newEmail).once('value');
            if (emailSnapshot.exists()) {
                let isSameUser = false;
                emailSnapshot.forEach((childSnapshot) => {
                    if (childSnapshot.key !== userFirebaseKey) {
                        isSameUser = true;
                    }
                });
                if (isSameUser) {
                    showMsg("هذا البريد الإلكتروني مسجل لحساب آخر!", "error");
                    return;
                }
            }
        }

        // التحقق من تكرار رقم الهاتف
        if (newPhone !== currentUser.phone) {
            const phoneSnapshot = await database.ref('users').orderByChild('phone').equalTo(newPhone).once('value');
            if (phoneSnapshot.exists()) {
                let isSameUser = false;
                phoneSnapshot.forEach((childSnapshot) => {
                    if (childSnapshot.key !== userFirebaseKey) {
                        isSameUser = true;
                    }
                });
                if (isSameUser) {
                    showMsg("هذا الرقم مستخدم بالفعل!", "error");
                    return;
                }
            }
        }

        // تحضير البيانات للتحديث
        const updates = {
            nickname: newNickname,
            email: newEmail,
            email2: document.getElementById('edit_email2').value.trim(),
            phone: newPhone,
            phone2: document.getElementById('edit_phone2').value.trim(),
            gender: document.getElementById('edit_gender').value,
            age: document.getElementById('edit_age').value,
            country: document.getElementById('edit_country').value,
            bio: document.getElementById('edit_bio').value,
            updatedAt: new Date().toISOString()
        };

        // إذا تم تغيير الاسم المستعار، تحديث تاريخ التغيير
        if (newNickname !== (currentUser.nickname || currentUser.username)) {
            updates.lastNicknameChange = new Date().toISOString();
        }

        // تحديث البيانات في Firebase
        await database.ref('users/' + userFirebaseKey).update(updates);

        // تحديث البيانات المحلية
        currentUser = { ...currentUser, ...updates };
        
        // 🔧 تحديث localStorage بشكل متوافق
        const sessionUser = JSON.parse(localStorage.getItem('currentUser'));
        sessionUser.nickname = newNickname;
        sessionUser.email = newEmail;
        sessionUser.phone = newPhone;
        sessionUser.numericId = currentUser.numericId || sessionUser.numericId;
        localStorage.setItem('currentUser', JSON.stringify(sessionUser));

        showMsg("تم تحديث بياناتك بنجاح", "success");
        
        // إعادة تحميل البيانات بعد ثانية
        setTimeout(() => {
            loadUserData();
        }, 1000);

    } catch (error) {
        console.error("❌ Error saving settings:", error);
        showMsg("خطأ في حفظ البيانات: " + error.message, "error");
    }
}

// حذف الحساب
async function deleteAccount() {
    if (!confirm("هل أنت متأكد من حذف الحساب نهائياً؟ هذا الإجراء لا يمكن التراجع عنه.")) {
        return;
    }

    const password = prompt("أدخل كلمة المرور للتأكيد:");
    if (!password) return;

    try {
        // التحقق من كلمة المرور
        if (password !== currentUser.password) {
            alert("كلمة المرور خاطئة");
            return;
        }

        // نقل الحساب إلى جدول المحذوفين المؤقتين
        await database.ref('deleted_users').push({
            ...currentUser,
            deletedAt: new Date().toISOString(),
            deletedBy: 'user',
            deletedFrom: 'settings_page',
            reason: 'حذف من قبل المستخدم'
        });

        // حذف الحساب من المستخدمين النشطين
        await database.ref('users/' + userFirebaseKey).remove();

        // مسح بيانات المستخدم من localStorage
        localStorage.removeItem('currentUser');
        
        showMsg("تم حذف حسابك بنجاح", "success");
        
        // الانتقال إلى صفحة الدخول بعد ثانيتين
        setTimeout(() => {
            window.location.replace('Login.html');
        }, 2000);

    } catch (error) {
        console.error("❌ Error deleting account:", error);
        showMsg("خطأ في حذف الحساب: " + error.message, "error");
    }
}

// التهيئة عند تحميل الصفحة
window.onload = function() {
    initializeFirebase();
};

// الاستماع لتحديثات الأرصدة في الوقت الحقيقي
function listenForBalanceUpdates() {
    if (!database || !userFirebaseKey) return;
    
    database.ref('users/' + userFirebaseKey + '/balanceEGP').on('value', (snapshot) => {
        if (snapshot.exists()) {
            const value = parseFloat(snapshot.val()) || 0;
            document.getElementById('balanceEGP').textContent = value.toFixed(2);
        }
    });
    
    database.ref('users/' + userFirebaseKey + '/balanceUSD').on('value', (snapshot) => {
        if (snapshot.exists()) {
            const value = parseFloat(snapshot.val()) || 0;
            document.getElementById('balanceUSD').textContent = value.toFixed(2);
        }
    });
}

// 🔧 دالة مساعدة للتحقق من القيم
function validateUserData(data) {
    if (!data) return false;
    
    // التحقق من وجود الحقول الأساسية
    if (!data.username || !data.email) {
        console.warn("⚠️ Missing required fields in user data");
        return false;
    }
    
    return true;
}

// 🔧 إضافة وظيفة للتعامل مع الأخطاء بشكل عام
window.onerror = function(msg, url, lineNo, columnNo, error) {
    console.error('Global error:', msg, 'at', url, ':', lineNo);
    return false;
};
</script>
