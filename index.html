        .icon-wrapper { 
            display: flex; align-items: center; gap: 12px;

        .header-icon {

        .notif-header {

            flex-direction: column;

        /* إذا كان هناك أكثر من فيديو */

        .pulse-dot {

        @keyframes pulse-ring {

        footer { 
            background-color: #1a1a1a;

            padding: 20px 0; 
            border-top: 3px solid #ffd700; 
            margin-top: 40px;

        /* تحسينات للجوال */
        @media (max-width: 768px) {
            .multiple-videos-layout {
                grid-template-columns: 1fr;
                gap: 25px;
            }
            .single-video-layout {
                width: 100%;
            }
            .videos-section {
                padding: 30px 20px;

            .section-header h2 {

            .video-meta {

            main h1 { font-size: 2rem; }
            .play-button {
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>

        // بيانات الفيديوهات الافتراضية
        const defaultVideos = [
            {

        // دالة لتحميل وعرض الفيديوهات
        async function loadVideos() {
            const videoContainer = document.getElementById('videoContainer');
            
            // عرض حالة التحميل
            videoContainer.innerHTML = `
                <div style="width: 100%; text-align: center; padding: 40px;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: #ffd700; margin-bottom: 15px;"></i>

            try {
                // في المستقبل: تحميل الفيديوهات من Firebase
                // const videosRef = database.ref('videos');
                // const snapshot = await videosRef.once('value');
                // const videos = snapshot.val() || defaultVideos;
                
                // للآن نستخدم البيانات الافتراضية
                const videos = defaultVideos;
                
                if (videos.length === 0) {
                    showNoVideosMessage();
                    return;
                }
                
                // عرض الفيديوهات بناءً على عددها
                displayVideos(videos);
                
            } catch (error) {
                console.error('Error loading videos:', error);
                // إذا حدث خطأ، نعرض البيانات الافتراضية
                displayVideos(defaultVideos);
            }
        }

        // دالة لعرض الفيديوهات بناءً على العدد
        function displayVideos(videos) {
            const videoContainer = document.getElementById('videoContainer');
            videoContainer.innerHTML = '';
            
            if (videos.length === 1) {
                // إذا كان هناك فيديو واحد فقط
                displaySingleVideo(videos[0]);
            } else {
                // إذا كان هناك أكثر من فيديو
                displayMultipleVideos(videos);
            }
        }

        // دالة لعرض فيديو واحد فقط (يأخذ العرض الكامل)
        function displaySingleVideo(video) {
            const videoContainer = document.getElementById('videoContainer');
            
            videoContainer.innerHTML = `
                <div class="single-video-layout">
                    <div class="video-card">
                        <div class="video-container" id="videoContainer-${video.id}">
                            <iframe src="" 
                                    title="${video.title}" 
                                    frameborder="0" 
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                    allowfullscreen>
                            </iframe>
                            <img src="${video.thumbnail || 'https://via.placeholder.com/800x450/1a1a1a/ffd700?text=VIP+CLUB'}" 
                                 alt="${video.title}" 
                                 class="video-thumbnail" 
                                 id="thumbnail-${video.id}">
                            <div class="play-button" onclick="playVideo(${video.id})">
                                <i class="fas fa-play"></i>
                            </div>
                        </div>
                        <div class="video-info">
                            <h3 class="video-title">${video.title}</h3>
                            <p class="video-description">${video.description}</p>
                            <div class="video-meta">
                                <div class="video-date">
                                    <i class="far fa-calendar-alt"></i>
                                    <span>${video.date}</span>
                                </div>
                                <div class="video-views">
                                    <i class="far fa-eye"></i>
                                    <span>${video.views.toLocaleString()} مشاهدة</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // دالة لعرض عدة فيديوهات (بجانب بعض)
        function displayMultipleVideos(videos) {
            const videoContainer = document.getElementById('videoContainer');
            
            videoContainer.innerHTML = `
                <div class="multiple-videos-layout">
                    ${videos.map(video => `
                        <div class="video-card">
                            <div class="video-container" id="videoContainer-${video.id}">
                                <iframe src="" 
                                        title="${video.title}" 
                                        frameborder="0" 
                                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                        allowfullscreen>
                                </iframe>
                                <img src="${video.thumbnail || 'https://via.placeholder.com/350x200/1a1a1a/ffd700?text=VIP+CLUB'}" 
                                     alt="${video.title}" 
                                     class="video-thumbnail" 
                                     id="thumbnail-${video.id}">
                                <div class="play-button" onclick="playVideo(${video.id})">
                                    <i class="fas fa-play"></i>
                                </div>
                            </div>
                            <div class="video-info">
                                <h3 class="video-title">${video.title}</h3>
                                <p class="video-description">${video.description}</p>
                                <div class="video-meta">
                                    <div class="video-date">
                                        <i class="far fa-calendar-alt"></i>
                                        <span>${video.date}</span>
                                    </div>
                                    <div class="video-views">
                                        <i class="far fa-eye"></i>
                                        <span>${video.views.toLocaleString()} مشاهدة</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // دالة لتشغيل الفيديو عند النقر على الصورة
        function playVideo(videoId) {
            const video = defaultVideos.find(v => v.id === videoId);
            if (!video) return;
            
            const iframe = document.querySelector(`#videoContainer-${videoId} iframe`);
            const thumbnail = document.getElementById(`thumbnail-${videoId}`);
            
            // تعيين مصدر الفيديو
            iframe.src = video.url;
            
            // إخفاء الصورة المصغرة
            thumbnail.classList.add('hidden');
            
            // إخفاء زر التشغيل
            const playButton = thumbnail.nextElementSibling;
            playButton.style.display = 'none';
            
            // زيادة عدد المشاهدات (محاكاة)
            video.views++;
            
            // تحديث عداد المشاهدات
            const viewsElement = document.querySelector(`#videoContainer-${videoId} .video-views span`);
            if (viewsElement) {
                viewsElement.textContent = video.views.toLocaleString() + ' مشاهدة';
            }
        }

        // دالة لعرض رسالة عدم وجود فيديوهات
        function showNoVideosMessage() {
            const videoContainer = document.getElementById('videoContainer');
            videoContainer.innerHTML = `
                <div class="no-videos">
                    <i class="fas fa-video-slash"></i>
                    <h3>لا توجد فيديوهات متاحة حالياً</h3>
                    <p>سيتم إضافة فيديوهات حصرية قريباً لأعضاء VipClub. تابعنا!</p>
                </div>
            `;
        }

        // دالة لتحميل الإشعارات من Firebase
        async function loadNotifications() {
            try {
                const user = getCurrentUser();
                if (!user || !user.numericId) {
                    showNoUserMessage();
                    return;
                }

                const usersRef = database.ref('users');
                const snapshot = await usersRef.orderByChild('numericId').equalTo(user.numericId).once('value');
                
                if (!snapshot.exists()) {
                    showNoNotifications();
                    return;
                }

                const userData = snapshot.val();
                const userId = Object.keys(userData)[0];
                const notificationsRef = database.ref('users/' + userId + '/notifications');
                const notifSnapshot = await notificationsRef.once('value');

                const list = document.getElementById('notifList');
                
                if (!notifSnapshot.exists()) {
                    showNoNotifications();
                    return;
                }

                const notifications = [];
                let unreadCount = 0;
                const notifData = notifSnapshot.val();

                for (const key in notifData) {
                    const notif = notifData[key];
                    notifications.push({
                        key: key,
                        text: notif.text || '',
                        read: notif.read || false,
                        date: notif.date || 'قريباً'
                    });
                    if (!notif.read) unreadCount++;
                }

                notifications.sort((a, b) => {
                    return b.key.localeCompare(a.key);
                });

                const badge = document.getElementById('notifBadge');
                if (unreadCount > 0) {
                    badge.innerText = unreadCount;
                    badge.style.display = 'block';
                } else {
                    badge.style.display = 'none';
                }

                if (notifications.length === 0) {
                    showNoNotifications();
                    return;
                }

                list.innerHTML = '';
                notifications.forEach(notif => {
                    const item = document.createElement('div');
                    item.className = `notif-item ${!notif.read ? 'unread' : ''}`;
                    item.innerHTML = `
                        <div style="flex:1;">
                            <div>${notif.text}</div>
                            <small style="color:#aaa; font-size:0.7rem;">${notif.date}</small>
                        </div>
                        <div>
                            ${!notif.read ? 
                                `<i class="fas fa-eye" onclick="markAsRead('${userId}', '${notif.key}')" 
                                    style="cursor:pointer; color:#ddd; margin-left:5px;" title="تعيين كمقروء"></i>` : ''
                            }
                            <i class="fas fa-trash delete-notif" onclick="deleteNotif('${userId}', '${notif.key}')" title="حذف"></i>
                        </div>
                    `;
                    list.appendChild(item);
                });

            } catch (error) {
                console.error('Error loading notifications:', error);
                const list = document.getElementById('notifList');
                list.innerHTML = '<div style="padding:30px; text-align:center; color:#888;">خطأ في تحميل الإشعارات</div>';
            }
        }

        // دالة لتعيين إشعار كمقروء
        async function markAsRead(userId, notifKey) {
            try {
                await database.ref('users/' + userId + '/notifications/' + notifKey).update({
                    read: true
                });
                loadNotifications();
            } catch (error) {
                console.error('Error marking as read:', error);
            }
        }

        // دالة لتعيين جميع الإشعارات كمقروءة
        async function markAllRead() {
            try {
                const user = getCurrentUser();
                if (!user || !user.numericId) return;

                const usersRef = database.ref('users');
                const snapshot = await usersRef.orderByChild('numericId').equalTo(user.numericId).once('value');
                
                if (!snapshot.exists()) return;

                const userData = snapshot.val();
                const userId = Object.keys(userData)[0];
                const notificationsRef = database.ref('users/' + userId + '/notifications');
                const notifSnapshot = await notificationsRef.once('value');

                if (!notifSnapshot.exists()) return;

                const updates = {};
                notifSnapshot.forEach(child => {
                    updates[child.key + '/read'] = true;
                });

                await notificationsRef.update(updates);
                loadNotifications();
            } catch (error) {
                console.error('Error marking all as read:', error);
            }
        }

        // دالة لحذف إشعار
        async function deleteNotif(userId, notifKey) {
            if (!confirm('هل تريد حذف هذا الإشعار؟')) return;
            
            try {
                await database.ref('users/' + userId + '/notifications/' + notifKey).remove();
                loadNotifications();
            } catch (error) {
                console.error('Error deleting notification:', error);
            }
        }

        // دالة لحذف جميع الإشعارات
        async function deleteAllNotifs() {
            if (!confirm('هل تريد حذف جميع الإشعارات؟')) return;
            
            try {
                const user = getCurrentUser();
                if (!user || !user.numericId) return;

                const usersRef = database.ref('users');
                const snapshot = await usersRef.orderByChild('numericId').equalTo(user.numericId).once('value');
                
                if (!snapshot.exists()) return;

                const userData = snapshot.val();
                const userId = Object.keys(userData)[0];
                
                await database.ref('users/' + userId + '/notifications').remove();
                loadNotifications();
            } catch (error) {
                console.error('Error deleting all notifications:', error);
            }
        }

        // دالة لعرض رسالة عدم وجود مستخدم
        function showNoUserMessage() {
            const list = document.getElementById('notifList');

        // دالة لعرض رسالة عدم وجود إشعارات
        function showNoNotifications() {

                <div style="padding:40px 20px; text-align:center; color:#888;">
                    <i class="far fa-bell" style="font-size:2rem; margin-bottom:10px;"></i>
                    <div>لا توجد إشعارات</div>

        // فتح/إغلاق نافذة الإشعارات
        function toggleNotifs() {
            const dropdown = document.getElementById('notifDropdown');
            dropdown.classList.toggle('active');
            
            if (dropdown.classList.contains('active')) {
                loadNotifications();
            }
        }

        // تحديث واجهة المستخدم
        function updateUI() {
            const user = getCurrentUser();
            if (user) {
                document.getElementById('welcomeMsg').innerText = `مرحباً، ${user.nickname || user.username || 'مستخدم'}`;
                if (document.getElementById('notifDropdown').classList.contains('active')) {
                    loadNotifications();
                }
            }
        }

        // إغلاق نافذة الإشعارات عند النقر خارجها
        window.onclick = function(event) {
            const dropdown = document.getElementById('notifDropdown');
            const iconWrapper = document.querySelector('.icon-wrapper');
            
            if (!event.target.closest('.icon-wrapper') && dropdown.classList.contains('active')) {
                dropdown.classList.remove('active');
            }
        };

        // عند تحميل الصفحة
        window.onload = function() {
            updateUI();
            loadVideos(); // تحميل الفيديوهات عند تحميل الصفحة
        };
    </script>
