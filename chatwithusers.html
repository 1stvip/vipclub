<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <link rel="shortcut icon" href="images//videoslogo/vip.png">
    <title>إدارة المحادثات الاحترافية - VipClub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        /* تحسينات متقدمة للهواتف المحمولة */
        :root {
            --whatsapp-dark: #0c1317;
            --whatsapp-dark-2: #111b21;
            --whatsapp-dark-3: #202c33;
            --whatsapp-dark-4: #2a3942;
            --whatsapp-green: #005c4b;
            --whatsapp-green-light: #008069;
            --whatsapp-blue: #53bdeb;
            --text-primary: #e9edef;
            --text-secondary: #8696a0;
            --text-muted: #667781;
            --border-color: #303d45;
            --online: #00a884;
            --away: #ffb347;
            --offline: #8696a0;
            --danger: #f15c6d;
            --warning: #ffb347;
            --success: #00a884;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            box-sizing: border-box;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; 
            background: var(--whatsapp-dark); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
            color: var(--text-primary);
        }

        /* تحسين الشريط الجانبي للهواتف */
        .users-sidebar {
            width: 380px; 
            background: var(--whatsapp-dark-2); 
            border-left: 1px solid var(--border-color);
            display: flex; 
            flex-direction: column; 
            z-index: 100; 
            position: relative;
            min-width: 300px;
        }

        @media (max-width: 992px) {
            body {
                flex-direction: column;
            }
            
            .users-sidebar {
                width: 100%;
                height: 45vh;
                border-left: none;
                border-bottom: 1px solid var(--border-color);
                min-width: 100%;
            }
            
            .chat-area {
                height: 55vh;
            }
        }

        @media (max-width: 576px) {
            .users-sidebar {
                height: 50vh;
            }
            
            .chat-area {
                height: 50vh;
            }
        }

        .sidebar-header { 
            padding: 12px 15px; 
            background: var(--whatsapp-dark-3); 
            color: var(--text-primary); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            min-height: 60px;
        }

        .sidebar-header h4 {
            margin: 0;
            font-size: 1rem;
        }
        
        .sidebar-search-wrap { 
            padding: 10px 12px; 
            background: var(--whatsapp-dark-3); 
            border-bottom: 1px solid var(--border-color); 
        }
        
        .search-input-inner {
            display: flex; 
            align-items: center; 
            background: var(--whatsapp-dark-4); 
            border: none; 
            border-radius: 8px; 
            padding: 6px 10px;
        }
        
        .search-input-inner input { 
            border: none; 
            outline: none; 
            width: 100%; 
            padding: 5px; 
            font-size: 0.85rem; 
            background: transparent;
            color: var(--text-primary);
            font-family: inherit;
        }
        
        .sidebar-refresh-btn {
            background: var(--whatsapp-dark-4);
            border: none;
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
        }
        
        .sidebar-refresh-btn:active { 
            background: var(--whatsapp-dark-3); 
            color: var(--text-primary);
            transform: rotate(90deg);
        }
        
        .rotate-anim { animation: spin 0.6s ease-in-out; }
        
        @keyframes spin { 
            100% { transform: rotate(360deg); } 
        }

        /* تحسين التبويبات للهواتف */
        .sidebar-tabs { 
            display: flex; 
            background: var(--whatsapp-dark-3); 
            border-bottom: 1px solid var(--border-color); 
        }
        
        .tab { 
            flex: 1; 
            padding: 10px 5px; 
            text-align: center; 
            cursor: pointer; 
            font-size: 0.75rem; 
            transition: 0.3s; 
            color: var(--text-secondary); 
            position: relative;
            font-weight: 500;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
        }

        @media (min-width: 768px) {
            .tab {
                padding: 14px;
                font-size: 0.85rem;
            }
        }
        
        .tab.active { 
            color: var(--whatsapp-blue); 
            border-bottom: 3px solid var(--whatsapp-blue);
            background: var(--whatsapp-dark);
        }
        
        .tab-badge {
            background: var(--whatsapp-blue);
            color: var(--text-primary);
            font-size: 0.65rem;
            padding: 2px 5px;
            border-radius: 10px;
            margin-right: 3px;
        }

        .user-list { 
            flex: 1; 
            overflow-y: auto; 
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            background: var(--whatsapp-dark-2);
        }
        
        .user-list::-webkit-scrollbar {
            width: 4px;
        }
        
        .user-list::-webkit-scrollbar-thumb {
            background: var(--whatsapp-dark-4);
            border-radius: 2px;
        }
        
        .user-item {
            padding: 12px; 
            border-bottom: 1px solid var(--border-color); 
            cursor: pointer;
            display: flex; 
            flex-direction: column; 
            position: relative; 
            transition: all 0.2s;
            background: var(--whatsapp-dark-2);
        }
        
        .user-item:active { 
            background: var(--whatsapp-dark-3); 
        }
        
        .user-item.active { 
            background: var(--whatsapp-dark-4); 
        }
        
        .user-item.escalated { 
            background: rgba(239, 68, 68, 0.1); 
            border-right: 4px solid var(--danger);
        }
        
        .user-item.archived {
            opacity: 0.7;
            background: var(--whatsapp-dark);
        }

        .user-info-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 5px;
            gap: 8px;
        }

        .user-name-container {
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
            min-width: 0;
            flex-wrap: wrap;
        }

        .user-nickname {
            color: var(--text-primary);
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100px;
        }

        @media (min-width: 768px) {
            .user-nickname {
                max-width: 150px;
            }
        }

        .user-id-tag { 
            font-size: 0.7rem; 
            background: var(--whatsapp-dark-4); 
            color: var(--text-secondary); 
            padding: 2px 6px; 
            border-radius: 10px; 
            font-family: 'Monaco', 'Courier New', monospace; 
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        
        .copy-id-btn {
            cursor: pointer;
            color: var(--whatsapp-blue);
            transition: 0.2s;
            font-size: 0.65rem;
        }
        
        .copy-id-btn:active {
            color: var(--text-primary);
            transform: scale(1.1);
        }

        .escalation-tag {
            background: var(--danger);
            color: white;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 500;
        }

        .user-status {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        
        .status-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        
        .status-online { background-color: var(--online); }
        .status-away { background-color: var(--away); }
        .status-offline { background-color: var(--offline); }

        /* تحسين أزرار الإجراءات للهواتف */
        .item-actions { 
            position: absolute; 
            left: 5px; 
            top: 50%; 
            transform: translateY(-50%);
            display: flex; 
            gap: 3px; 
            opacity: 0; 
            transition: 0.3s; 
            z-index: 5; 
            background: var(--whatsapp-dark-4);
            padding: 3px;
            border-radius: 6px;
        }
        
        .user-item:hover .item-actions,
        .user-item:active .item-actions { 
            opacity: 1; 
        }
        
        .action-icon { 
            font-size: 0.7rem; 
            padding: 5px; 
            border-radius: 4px; 
            background: var(--whatsapp-dark-3); 
            color: var(--text-secondary); 
            transition: 0.2s; 
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .action-icon:active { 
            background: var(--whatsapp-blue); 
            color: white; 
        }

        /* تحسين منطقة الدردشة للهواتف */
        .chat-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: var(--whatsapp-dark); 
            position: relative; 
            min-width: 0;
        }
        
        .chat-header {
            padding: 10px 12px; 
            background: var(--whatsapp-dark-3); 
            border-bottom: 1px solid var(--border-color);
            display: flex; 
            flex-direction: column;
            gap: 8px;
            min-height: 70px;
            box-sizing: border-box;
        }

        @media (min-width: 768px) {
            .chat-header {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                padding: 15px 20px;
            }
        }

        .user-header-info {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            flex: 1;
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--whatsapp-green), var(--whatsapp-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 14px;
            flex-shrink: 0;
        }

        .header-text-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
            flex: 1;
        }

        #currentUserName {
            color: var(--text-primary);
            font-size: 0.95rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #currentUserDisplayId {
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-family: 'Monaco', 'Courier New', monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #statusIndicator {
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            gap: 3px;
            white-space: nowrap;
        }

        .status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* تحسين أزرار الهيدر للهواتف */
        .header-btns { 
            display: flex; 
            gap: 4px; 
            flex-wrap: wrap;
            justify-content: flex-start;
            overflow-x: auto;
            padding-bottom: 2px;
            -webkit-overflow-scrolling: touch;
        }

        .header-btns::-webkit-scrollbar {
            height: 2px;
        }

        .header-btns::-webkit-scrollbar-thumb {
            background: var(--whatsapp-dark-4);
            border-radius: 1px;
        }
        
        .btn { 
            padding: 6px 10px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.7rem; 
            font-weight: 600; 
            transition: all 0.3s; 
            display: flex;
            align-items: center;
            gap: 4px;
            height: 32px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .btn-refresh { 
            background: var(--whatsapp-dark-4); 
            color: var(--text-primary); 
            border: 1px solid var(--border-color);
        }
        
        .btn-refresh:active { 
            background: var(--whatsapp-dark-3); 
        }
        
        .btn-quick-replies { 
            background: var(--whatsapp-green-light); 
            color: white; 
        }
        
        .btn-quick-replies:active { 
            background: var(--whatsapp-green); 
        }
        
        .btn-end { 
            background: var(--warning); 
            color: #000; 
        }
        
        .btn-end:active { 
            background: #e68900; 
        }
        
        .btn-delete-mine { 
            background: var(--whatsapp-dark-4); 
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .btn-delete-all { 
            background: var(--danger); 
            color: white; 
        }
        
        .btn-delete-all:active { 
            background: #d03c4d; 
        }

        .chat-search-box {
            display: none;
        }

        /* تحسين لوحة الردود السريعة للهواتف */
        .quick-replies-panel {
            position: absolute;
            bottom: 70px;
            right: 10px;
            left: 10px;
            background: var(--whatsapp-dark-4);
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            z-index: 1000;
            display: none;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }
        
        @media (min-width: 768px) {
            .quick-replies-panel {
                width: 320px;
                right: 20px;
                left: auto;
            }
        }
        
        .quick-replies-panel::-webkit-scrollbar {
            width: 4px;
        }
        
        .quick-replies-panel::-webkit-scrollbar-thumb {
            background: var(--whatsapp-dark-3);
            border-radius: 2px;
        }
        
        .quick-replies-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .quick-replies-header h4 {
            margin: 0;
            color: var(--text-primary);
            font-size: 0.85rem;
        }
        
        .manage-quick-replies-btn {
            background: var(--whatsapp-dark-3);
            border: none;
            color: var(--text-secondary);
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.3s;
        }
        
        .manage-quick-replies-btn:active {
            background: var(--whatsapp-blue);
            color: white;
        }
        
        .quick-reply-btn {
            display: block;
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 6px;
            background: var(--whatsapp-dark-3);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-primary);
            transition: all 0.3s;
            font-family: inherit;
            position: relative;
        }
        
        .quick-reply-btn:active {
            background: var(--whatsapp-blue);
            color: white;
            transform: translateX(-3px);
            border-color: var(--whatsapp-blue);
        }
        
        .quick-reply-actions {
            position: absolute;
            left: 5px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 3px;
            opacity: 0;
            transition: opacity 0.3s;
            background: var(--whatsapp-dark-4);
            padding: 2px;
            border-radius: 4px;
        }
        
        .quick-reply-btn:hover .quick-reply-actions,
        .quick-reply-btn:active .quick-reply-actions {
            opacity: 1;
        }
        
        .quick-reply-action-btn {
            background: rgba(0,0,0,0.3);
            border: none;
            color: var(--text-primary);
            width: 20px;
            height: 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .quick-reply-action-btn:active {
            background: var(--whatsapp-blue);
        }

        /* تحسين منطقة الرسائل للهواتف */
        .chat-messages {
            flex: 1; 
            padding: 10px; 
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            display: flex; 
            flex-direction: column; 
            gap: 8px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-color: var(--whatsapp-dark-2);
            background-blend-mode: overlay;
            position: relative;
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--whatsapp-dark-4);
            border-radius: 2px;
        }

        .highlight { 
            background: rgba(255, 235, 59, 0.3); 
            color: inherit; 
            font-weight: bold; 
            padding: 0 2px; 
            border-radius: 3px; 
        }

        .msg-row { 
            display: flex; 
            align-items: flex-end; 
            gap: 4px; 
            max-width: 85%; 
            position: relative; 
        }

        @media (min-width: 768px) {
            .msg-row {
                max-width: 75%;
            }
        }
        
        .msg-row.admin { 
            margin-left: auto; 
            flex-direction: row-reverse;
        }
        
        .msg-row.user { 
            margin-right: auto; 
            flex-direction: row;
        }

        .msg { 
            padding: 6px 10px; 
            border-radius: 12px; 
            font-size: 0.85rem; 
            position: relative; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
            line-height: 1.4;
            word-break: break-word;
            max-width: 100%;
            overflow-wrap: break-word;
        }

        @media (min-width: 768px) {
            .msg {
                padding: 8px 12px;
                font-size: 0.9rem;
            }
        }
        
        .msg.admin { 
            background: var(--whatsapp-green); 
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .msg.user { 
            background: var(--whatsapp-dark-4); 
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }
        
        .msg-options-trigger {
            cursor: pointer; 
            color: var(--text-secondary); 
            padding: 5px; 
            font-size: 0.8rem; 
            transition: 0.2s; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            background: var(--whatsapp-dark-3);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            opacity: 0;
            visibility: hidden;
            flex-shrink: 0;
        }
        
        .msg-row:hover .msg-options-trigger,
        .msg-row:active .msg-options-trigger {
            opacity: 1;
            visibility: visible;
        }
        
        .msg-options-trigger:active { 
            color: var(--whatsapp-blue); 
            background: var(--whatsapp-dark-4);
        }

        /* تحسين قائمة خيارات الرسالة للهواتف */
        .msg-options-menu {
            position: fixed;
            background: var(--whatsapp-dark-4);
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 10000;
            min-width: 150px;
            overflow: hidden;
            display: none;
            border: 1px solid var(--border-color);
        }
        
        .msg-option {
            padding: 10px 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 0.8rem;
        }
        
        .msg-option:active {
            background: var(--whatsapp-dark-3);
        }
        
        .msg-option:last-child {
            border-bottom: none;
        }
        
        .msg-option.edit { color: var(--warning); }
        .msg-option.delete-for-me { color: var(--text-secondary); }
        .msg-option.delete-for-all { color: var(--danger); }

        .msg img, .msg video { 
            max-width: 100%; 
            border-radius: 8px; 
            margin-top: 5px; 
            display: block; 
            cursor: pointer; 
            max-height: 200px;
            object-fit: contain;
        }

        @media (min-width: 768px) {
            .msg img, .msg video {
                max-height: 300px;
            }
        }
        
        .file-attachment {
            display: flex; 
            align-items: center; 
            gap: 8px; 
            background: rgba(255,255,255,0.05);
            padding: 8px; 
            border-radius: 8px; 
            text-decoration: none; 
            color: inherit;
            border: 1px dashed var(--border-color); 
            transition: 0.2s;
            margin-top: 5px;
        }
        
        .file-attachment:active { 
            background: rgba(255,255,255,0.1); 
            border-color: var(--whatsapp-blue);
        }

        .msg-status-tag { 
            font-size: 0.65rem; 
            color: rgba(255,255,255,0.6); 
            font-style: italic; 
            margin-right: 3px; 
        }
        
        .read-check { 
            color: var(--whatsapp-blue) !important; 
            font-size: 0.7rem !important; 
            margin-right: 2px !important;
        }
        
        .unread-check {
            color: var(--text-secondary) !important;
            font-size: 0.65rem !important;
            margin-right: 2px !important;
        }

        /* تحسين شريط الإدخال للهواتف */
        .chat-input-wrap {
            padding: 8px 10px; 
            background: var(--whatsapp-dark-3);

    // Set admin typing status
    function setAdminTyping(isTyping) {
        if (!activeUserId) return;
        
        if (adminTypingTimeout) {
            clearTimeout(adminTypingTimeout);
        }
        
        if (isTyping) {
            database.ref('chats').child(activeUserId).update({
                adminTyping: true,
                adminTypingTime: new Date().toISOString()
            }).catch(error => {
                console.error('Error setting typing status:', error);
            });
            
            adminTypingTimeout = setTimeout(() => {
                setAdminTyping(false);
            }, 3000);
        } else {
            database.ref('chats').child(activeUserId).update({
                adminTyping: false
            }).catch(error => {
                console.error('Error clearing typing status:', error);
            });
        }
    }

    // File Upload Functions
    async function handleFileUpload(input) {
        if (!input || !activeUserId) return;
        const file = input.files[0];
        if (!file) return;
        
        if (file.size > 2 * 1024 * 1024) {
            showNotification('⚠️ حجم الملف كبير جداً. يرجى اختيار ملف أقل من 2 ميجابايت.', 'warning');
            return;
        }
        
        const reader = new FileReader();
        let fileType = 'file';
        if (file.type.startsWith('image/')) fileType = 'image';
        else if (file.type.startsWith('video/')) fileType = 'video';
        
        reader.onload = async function(e) {
            const fileData = e.target.result;
            await sendMessage('admin', fileData, fileType, file.name);
            input.value = ''; 
        };
        reader.readAsDataURL(file);
    }

    async function sendExternalLink() {
        const linkInput = document.getElementById('externalLinkInput');
        const link = linkInput.value.trim();
        
        if (!link) {
            showNotification('⚠️ يرجى إدخال رابط صحيح', 'warning');
            return;
        }
        
        if (!link.startsWith('http')) {
            showNotification('⚠️ يرجى إدخال رابط صحيح يبدأ بـ http أو https', 'warning');
            return;
        }
        
        await sendMessage('admin', link, 'text');
        linkInput.value = '';
        closeExternalUploadPanel();
    }

    // Chat Management Functions
    async function sendMessage(sender = 'admin', text, type = 'text', fileName = null) {
        if (!activeUserId || !text) {
            console.log('Cannot send message: missing activeUserId or text');
            return;
        }

        const msgObj = { 
            id: Date.now(), 
            sender: sender, 
            text: text, 
            type: type, 
            fileName: fileName, 
            time: new Date().toISOString(),
            isEdited: false,
            isDeleted: false,
            isRead: false,
            hiddenForAdmin: false
        };

        try {
            const msgRef = database.ref('chats').child(activeUserId).child('messages').push();
            const messageKey = msgRef.key;
            await msgRef.set({
                ...msgObj,
                firebaseKey: messageKey
            });
            
            if (sender === 'admin') {
                await database.ref('chats').child(activeUserId).update({
                    lastActivity: new Date().toISOString(),
                    unreadCount: firebase.database.ServerValue.increment(1),
                    adminTyping: false
                });
            } else {
                await database.ref('chats').child(activeUserId).update({
                    lastActivity: new Date().toISOString(),
                    adminTyping: false
                });
            }

            playNotificationSound();
            
            if (sender === 'admin') {
                document.getElementById('adminInput').value = '';
                setAdminTyping(false);
            }
            
        } catch (error) {
            console.error('Error sending message:', error);
            showNotification('❌ خطأ في إرسال الرسالة', 'error');
        }
    }

    async function markAllMessagesAsRead(userId) {
        if (!userId) return;
        
        try {
            const messagesRef = database.ref('chats').child(userId).child('messages');
            const snapshot = await messagesRef.once('value');
            
            if (!snapshot.exists()) return;
            
            const updates = {};
            const now = new Date().toISOString();
            
            snapshot.forEach((childSnapshot) => {
                const msg = childSnapshot.val();
                if (msg.sender === 'admin' && !msg.isRead) {
                    updates[`${childSnapshot.key}/isRead`] = true;
                    updates[`${childSnapshot.key}/readAt`] = now;
                    
                    database.ref('chats').child(userId).child('messages').child(childSnapshot.key).update({
                        isRead: true,
                        readAt: now
                    }).catch(e => console.log('Error updating read status:', e));
                }
            });
            
            if (Object.keys(updates).length > 0) {
                await messagesRef.update(updates);
                
                await database.ref('chats').child(userId).update({
                    unreadCount: 0,
                    lastSeen: now
                });
            }
            
        } catch (error) {
            console.error('Error marking messages as read:', error);
        }
    }

    async function openChat(userId) {
        if (messagesListener) {
            database.ref('chats').child(activeUserId).child('messages').off('value', messagesListener);
            messagesListener = null;
        }
        
        if (userStatusListener) {
            database.ref('chats').child(activeUserId).off('value', userStatusListener);
            userStatusListener = null;
        }

        activeUserId = userId;
        editingMsgId = null;
        
        closeEmojiPicker();
        closeExternalUploadPanel();
        closeAllMenus();
        document.getElementById('quickRepliesPanel').style.display = 'none';

        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('chatContent').style.display = 'flex';
        
        try {
            const chatSnapshot = await database.ref('chats').child(userId).once('value');
            const chatData = chatSnapshot.val();
            
            if (!chatData) {
                showNotification('❌ المحادثة غير موجودة', 'error');
                return;
            }
            
            const displayName = chatData.username || 'مستخدم';
            const cleanUserId = userId.replace('user_', '');
            document.getElementById('currentUserName').innerText = displayName;
            document.getElementById('currentUserDisplayId').innerText = `(${cleanUserId})`;
            
            const avatar = document.getElementById('userAvatar');
            if (avatar) {
                const firstLetter = displayName.charAt(0).toUpperCase();
                avatar.textContent = firstLetter;
            }
            
            updateCurrentUserStatus(chatData);
            
        } catch (error) {
            console.log('Error loading user info:', error);
            const displayName = 'مستخدم';
            const cleanUserId = userId.replace('user_', '');
            document.getElementById('currentUserName').innerText = displayName;
            document.getElementById('currentUserDisplayId').innerText = `(${cleanUserId})`;
            
            const avatar = document.getElementById('userAvatar');
            if (avatar) {
                const firstLetter = displayName.charAt(0).toUpperCase();
                avatar.textContent = firstLetter;
            }
        }
        
        document.getElementById('chatSearchInput').value = "";
        document.getElementById('adminInput').value = '';
        
        userStatusListener = database.ref('chats').child(userId).on('value', (snapshot) => {
            const chatData = snapshot.val();
            if (chatData) {
                updateCurrentUserStatus(chatData);
            }
        });
        
        await markAllMessagesAsRead(userId);
        await loadMessages(userId);
        loadChats();
    }

    async function loadMessages(userId) {
        try {
            if (messagesListener) {
                database.ref('chats').child(activeUserId).child('messages').off('value', messagesListener);
                messagesListener = null;
            }
            
            const messagesRef = database.ref('chats').child(userId).child('messages');
            
            messagesListener = messagesRef.on('value', (snapshot) => {
                try {
                    const messages = [];
                    if (snapshot.exists()) {
                        snapshot.forEach((childSnapshot) => {
                            const msgData = childSnapshot.val();
                            if (msgData && !msgData.hiddenForAdmin) {
                                messages.push({
                                    firebaseKey: childSnapshot.key,
                                    ...msgData
                                });
                            }
                        });
                    }
                    
                    messages.sort((a, b) => new Date(a.time) - new Date(b.time));
                    
                    renderMessages(messages);
                    
                } catch (renderError) {
                    console.error('Error rendering messages:', renderError);
                    showNotification('❌ خطأ في عرض الرسائل', 'error');
                }
            }, (error) => {
                console.error('Error listening to messages:', error);
                showNotification('❌ خطأ في تحميل الرسائل', 'error');
            });
            
        } catch (error) {
            console.error('Error setting up messages listener:', error);
            showNotification('❌ خطأ في تحميل الرسائل', 'error');
        }
    }

    function renderMessages(messages) {
        if (isDisplayHidden) {
            const container = document.getElementById('chatMessages');
            if (container) {
                container.innerHTML = `<div class="hidden-notice">
                    <div>
                        <i class="fas fa-eye-slash fa-3x" style="opacity:0.2; display:block; margin-bottom:10px;"></i>
                        محتوى الدردشة مخفي الآن.<br>
                        <small>اضغط على أيقونة العين لإظهار النص.</small>
                    </div>
                </div>`;
            }
            return;
        }
        
        if (!activeUserId) return;
        
        const container = document.getElementById('chatMessages');
        const chatSearchKeyword = document.getElementById('chatSearchInput')?.value.toLowerCase().trim() || '';

        if (!container) return;
        
        container.innerHTML = '';
        
        messagesMap.clear();
        
        if (!messages || messages.length === 0) {
            container.innerHTML += `
                <div style="text-align: center; padding: 30px; color: var(--text-secondary);">
                    <i class="fas fa-comments fa-3x" style="opacity: 0.2;"></i>
                    <p style="font-size:0.9rem;">لا توجد رسائل بعد</p>
                </div>
            `;
            return;
        }
        
        messages.forEach((msg) => {
            if (!msg || msg.hiddenForAdmin) return;
            
            const row = createMessageElement(msg, chatSearchKeyword);
            container.appendChild(row);
            messagesMap.set(msg.firebaseKey, { row, msg });
        });

        container.scrollTop = container.scrollHeight;
    }

    function createMessageElement(msg, chatSearchKeyword) {
        const row = document.createElement('div');
        row.className = `msg-row ${msg.sender}`;
        row.id = `msg-${msg.firebaseKey}`;

        let content = "";
        
        if (msg.isDeleted) {
            content = `<span style="color:var(--text-secondary); font-style:italic;">
                <i class="fas fa-ban"></i> تم حذف هذه الرسالة
            </span>`;
        } else {
            if (msg.type === 'image') {
                content = `<img src="${msg.text}" style="max-width: 100%; border-radius: 8px; cursor: pointer;" 
                       onclick="window.open('${msg.text}', '_blank')" alt="صورة" loading="lazy">`;
            } else if (msg.type === 'video') {
                content = `<video src="${msg.text}" controls style="max-width: 100%; border-radius: 8px;" preload="metadata"></video>`;
            } else if (msg.type === 'file') {
                content = `
                    <a href="${msg.text}" download="${msg.fileName || 'file'}" class="file-attachment">
                        <i class="fas fa-file-download fa-2x" style="color:var(--whatsapp-blue)"></i>
                        <div style="overflow:hidden">
                            <div style="font-weight:bold; font-size:0.8rem; white-space:nowrap; text-overflow:ellipsis;">
                                ${msg.fileName || 'تحميل الملف'}
                            </div>
                            <small style="opacity:0.7">اضغط للتحميل</small>
                        </div>
                    </a>`;
            } else {
                let displayText = msg.text || "";
                const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
                displayText = displayText.replace(urlPattern, function(url) {
                    return `<a href="${url}" target="_blank" style="color:inherit; text-decoration:underline;">${url}</a>`;
                });
                
                if (chatSearchKeyword !== "" && displayText.toLowerCase().includes(chatSearchKeyword)) {
                    const regex = new RegExp(`(${chatSearchKeyword})`, 'gi');
                    displayText = displayText.replace(regex, `<span class="highlight">$1</span>`);
                }
                content = `<span>${displayText}</span>`;
            }
        }

        let readStatus = '';
        if (msg.sender === 'admin') {
            if (msg.isRead) {
                readStatus = '<i class="fas fa-check-double read-check"></i>';
            } else {
                readStatus = '<i class="fas fa-check unread-check"></i>';
            }
        }

        const statusTags = `
            <div style="display:flex; align-items:center; justify-content:flex-end; gap:2px; margin-top:2px;">
                ${msg.isEdited ? '<span class="msg-status-tag">معدلة</span>' : ''}
                <small style="font-size:0.6rem; opacity:0.7; color:${msg.sender === 'admin' ? 'rgba(255,255,255,0.7)' : 'var(--text-secondary)'}">
                    ${formatTime(msg.time)}
                </small>
                ${readStatus}
            </div>
        `;

        let optionsButton = '';
        if (!msg.isDeleted && (msg.sender === 'admin' || msg.sender === 'user')) {
            optionsButton = `
                <div class="msg-options-trigger" onclick="showMessageMenu(event, '${msg.firebaseKey}', '${msg.sender}', '${msg.text ? msg.text.replace(/'/g, "\\'").replace(/"/g, '&quot;') : ''}')">
                    <i class="fas fa-ellipsis-v"></i>
                </div>
            `;
        }

        row.innerHTML = `
            ${msg.sender === 'admin' ? '' : optionsButton}
            <div class="msg ${msg.sender}" id="message-content-${msg.firebaseKey}">
                <div id="message-text-${msg.firebaseKey}">
                    ${content}
                </div>
                ${statusTags}
            </div>
            ${msg.sender === 'admin' ? optionsButton : ''}
        `;
        
        return row;
    }

    function showMessageMenu(event, messageId, sender, messageText) {
        event.stopPropagation();
        
        closeAllMenus();
        
        let x = event.clientX;
        let y = event.clientY;
        
        if (x > window.innerWidth - 150) x = window.innerWidth - 160;
        if (y > window.innerHeight - 100) y = window.innerHeight - 120;
        
        const menu = document.createElement('div');
        menu.className = 'msg-options-menu';
        menu.style.left = x + 'px';
        menu.style.top = y + 'px';
        
        let menuItems = '';
        
        if (sender === 'admin' && messageText && !messageText.includes('تم حذف هذه الرسالة')) {
            menuItems += `
                <div class="msg-option edit" onclick="editMessage('${messageId}', '${messageText.replace(/'/g, "\\'")}')">
                    <i class="fas fa-edit"></i>
                    <span>تعديل الرسالة</span>
                </div>
            `;
        }
        
        menuItems += `
            <div class="msg-option delete-for-me" onclick="deleteForMe('${messageId}')">
                <i class="fas fa-user-slash"></i>
                <span>حذف من شاشتي</span>
            </div>
            <div class="msg-option delete-for-all" onclick="deleteForAll('${messageId}')">
                <i class="fas fa-trash-alt"></i>
                <span>حذف للجميع</span>
            </div>
        `;
        
        menu.innerHTML = menuItems;
        document.body.appendChild(menu);
        menu.style.display = 'block';
        
        setTimeout(() => {
            document.addEventListener('click', function closeMenu(e) {
                if (!menu.contains(e.target) && !e.target.closest('.msg-options-trigger')) {
                    menu.remove();
                    document.removeEventListener('click', closeMenu);
                }
            });
        }, 10);
    }

    function editMessage(messageId, currentText) {
        closeAllMenus();
        
        editingMsgId = messageId;
        
        const messageContent = document.getElementById(`message-content-${messageId}`);
        const messageTextDiv = document.getElementById(`message-text-${messageId}`);
        
        if (!messageContent || !messageTextDiv) return;
        
        const originalHTML = messageTextDiv.innerHTML;
        
        messageContent.classList.add('edit-mode');
        messageTextDiv.innerHTML = `
            <div class="edit-input">
                <textarea id="editInput_${messageId}" rows="2">${currentText}</textarea>
                <div class="edit-buttons">
                    <button class="edit-btn edit-save" onclick="saveMessageEdit('${messageId}')">
                        <i class="fas fa-check"></i> حفظ
                    </button>
                    <button class="edit-btn edit-cancel" onclick="cancelEditMessage('${messageId}', '${originalHTML.replace(/'/g, "\\'")}')">
                        <i class="fas fa-times"></i> إلغاء
                    </button>
                </div>
            </div>
        `;
        
        setTimeout(() => {
            const editInput = document.getElementById(`editInput_${messageId}`);
            if (editInput) {
                editInput.focus();
                editInput.select();
            }
        }, 100);
    }

    function cancelEditMessage(messageId, originalHTML) {
        const messageContent = document.getElementById(`message-content-${messageId}`);
        const messageTextDiv = document.getElementById(`message-text-${messageId}`);
        
        if (messageContent && messageTextDiv) {
            messageContent.classList.remove('edit-mode');
            if (originalHTML) {
                messageTextDiv.innerHTML = originalHTML;
            }
        }
        
        editingMsgId = null;
    }

    async function saveMessageEdit(messageId) {
        const editInput = document.getElementById(`editInput_${messageId}`);
        if (!editInput) return;
        
        const newText = editInput.value.trim();
        
        if (!newText) {
            showNotification('⚠️ لا يمكن ترك الرسالة فارغة', 'warning');
            return;
        }
        
        try {
            const msgData = messagesMap.get(messageId);
            const originalTime = msgData?.msg?.time || new Date().toISOString();
            
            await database.ref('chats').child(activeUserId).child('messages').child(messageId).update({
                text: newText,
                isEdited: true,
                time: originalTime
            });
            
            const messageContent = document.getElementById(`message-content-${messageId}`);
            const messageTextDiv = document.getElementById(`message-text-${messageId}`);
            
            if (messageContent && messageTextDiv) {
                messageContent.classList.remove('edit-mode');
                
                const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
                const linkedText = newText.replace(urlPattern, function(url) {
                    return `<a href="${url}" target="_blank" style="color:inherit; text-decoration:underline;">${url}</a>`;
                });
                
                messageTextDiv.innerHTML = `<span>${linkedText}</span>`;
                
                const statusTags = messageContent.querySelector('small')?.parentElement;
                if (statusTags) {
                    const statusTagElement = statusTags.querySelector('.msg-status-tag');
                    if (!statusTagElement) {
                        const statusTag = document.createElement('span');
                        statusTag.className = 'msg-status-tag';
                        statusTag.innerHTML = 'معدلة';
                        statusTags.insertBefore(statusTag, statusTags.querySelector('small'));
                    }
                }
            }
            
            if (messagesMap.has(messageId)) {
                const msg = messagesMap.get(messageId).msg;
                msg.text = newText;
                msg.isEdited = true;
            }
            
            editingMsgId = null;
            showNotification('✅ تم تعديل الرسالة بنجاح', 'success');
            
        } catch (error) {
            console.error('Error saving edit:', error);
            showNotification('❌ خطأ في تعديل الرسالة', 'error');
        }
    }

    async function deleteForMe(messageId) {
        if (!confirm('هل تريد حذف هذه الرسالة من شاشتك فقط؟')) return;
        
        try {
            await database.ref('chats').child(activeUserId).child('messages').child(messageId).update({
                hiddenForAdmin: true
            });
            
            const row = document.getElementById(`msg-${messageId}`);
            if (row) {
                row.style.display = 'none';
            }
            
            showNotification('✅ تم حذف الرسالة من شاشتك', 'success');
        } catch (error) {
            console.error('Error deleting for me:', error);
            showNotification('❌ خطأ في حذف الرسالة', 'error');
        }
    }

    async function deleteForAll(messageId) {
        if (!confirm('هل تريد حذف هذه الرسالة نهائياً للطرفين؟')) return;
        
        try {
            await database.ref('chats').child(activeUserId).child('messages').child(messageId).update({
                isDeleted: true,
                text: "تم حذف هذه الرسالة"
            });
            
            const messageTextDiv = document.getElementById(`message-text-${messageId}`);
            if (messageTextDiv) {
                messageTextDiv.innerHTML = `
                    <span style="color:var(--text-secondary); font-style:italic;">
                        <i class="fas fa-ban"></i> تم حذف هذه الرسالة
                    </span>`;
                
                const optionsTrigger = document.querySelector(`#msg-${messageId} .msg-options-trigger`);
                if (optionsTrigger) {
                    optionsTrigger.style.display = 'none';
                }
            }
            
            showNotification('✅ تم حذف الرسالة للجميع', 'success');
        } catch (error) {
            console.error('Error deleting for all:', error);
            showNotification('❌ خطأ في حذف الرسالة', 'error');
        }
    }

    async function deleteAllMyMessages() {
        if (!activeUserId) return;
        
        if (!confirm('هل تريد حذف جميع رسائلك من هذه المحادثة من شاشتك فقط؟')) return;
        
        try {
            const messagesRef = database.ref('chats').child(activeUserId).child('messages');
            const snapshot = await messagesRef.once('value');
            
            const updates = {};
            snapshot.forEach((childSnapshot) => {
                const msg = childSnapshot.val();
                if (msg.sender === 'admin' && !msg.hiddenForAdmin) {
                    updates[`${childSnapshot.key}/hiddenForAdmin`] = true;
                    
                    const row = document.getElementById(`msg-${childSnapshot.key}`);
                    if (row) {
                        row.style.display = 'none';
                    }
                }
            });
            
            if (Object.keys(updates).length > 0) {
                await messagesRef.update(updates);
                showNotification('✅ تم حذف جميع رسائلك من شاشتك', 'success');
            } else {
                showNotification('ℹ️ لا توجد رسائل خاصة بك لحذفها', 'info');
            }
        } catch (error) {
            console.error('Error deleting all my messages:', error);
            showNotification('❌ خطأ في حذف الرسائل', 'error');
        }
    }

    function handleInputKeyPress(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendReply();
        } else {
            setAdminTyping(true);
        }
    }

    async function sendReply() {
        const input = document.getElementById('adminInput');
        const text = input.value.trim();
        
        if (!text || !activeUserId) {
            if (!text) {
                showNotification('⚠️ يرجى كتابة رسالة أولاً', 'warning');
            }
            return;
        }
        
        if (editingMsgId !== null) {
            try {
                await saveMessageEdit(editingMsgId);
            } catch (error) {
                showNotification('❌ خطأ في تعديل الرسالة', 'error');
            }
        } else {
            await sendMessage('admin', text, 'text');
        }
        
        input.value = '';
        setAdminTyping(false);
    }

    async function toggleArchive(userId, e) {
        e.stopPropagation();
        try {
            const chatRef = database.ref('chats').child(userId);
            const snapshot = await chatRef.once('value');
            const chatData = snapshot.val() || {};
            
            await chatRef.update({
                isArchived: !chatData.isArchived,
                isHidden: false
            });
            
            showNotification(chatData.isArchived ? '✅ تم إخراج المحادثة من الأرشيف' : '✅ تم أرشفة المحادثة', 'success');
            loadChats();
        } catch (error) {
            console.error('Error toggling archive:', error);
            showNotification('❌ خطأ في تحديث الأرشيف', 'error');
        }
    }

    function hideDisplay(userId, e) {
        e.stopPropagation();
        
        isDisplayHidden = !isDisplayHidden;
        
        if (activeUserId === userId) {
            loadMessages(userId);
        }
        
        showNotification(isDisplayHidden ? '✅ تم إخفاء محتوى المحادثة' : '✅ تم إظهار محتوى المحادثة', 'success');
        
        loadChats();
    }

    async function endChatOfficial() {
        if (!activeUserId) {
            showNotification('⚠️ يرجى تحديد محادثة أولاً', 'warning');
            return;
        }
        
        if (!confirm("هل تريد إنهاء هذه المحادثة بشكل رسمي؟ سيتم إرسال رسالة إنهاء للمستخدم.")) return;
        
        try {
            await sendMessage('admin', "تم إنهاء المحادثة من خلال فريق الدعم. شكراً لكم.", 'text');
            
            await database.ref('chats').child(activeUserId).update({
                isArchived: true,
                isHidden: false
            });
            
            showNotification('✅ تم إنهاء المحادثة وأرشفتها', 'success');
            
            loadChats();
            
        } catch (error) {
            console.error('Error ending chat:', error);
            showNotification('❌ خطأ في إنهاء المحادثة', 'error');
        }
    }

    async function deleteFullConversation() {
        if (!activeUserId) {
            showNotification('⚠️ يرجى تحديد محادثة أولاً', 'warning');
            return;
        }
        
        if (!confirm("تحذير: حذف كامل المحادثة نهائياً! سيتم حذف جميع الرسائل ولا يمكن استرجاعها.")) return;
        
        try {
            const messagesRef = database.ref('chats').child(activeUserId).child('messages');
            await messagesRef.remove();
            
            await database.ref('chats').child(activeUserId).remove();
            
            const cleanUserId = activeUserId.replace('user_', '');
            await database.ref('users').child(cleanUserId).remove();
            
            activeUserId = null;
            document.getElementById('chatContent').style.display = 'none';
            document.getElementById('emptyState').style.display = 'flex';
            
            showNotification('✅ تم حذف المحادثة نهائياً', 'success');
            
            loadChats();
            
        } catch (error) {
            console.error('Error deleting conversation:', error);
            showNotification('❌ خطأ في حذف المحادثة', 'error');
        }
    }

    function refreshChat() {
        if (activeUserId) {
            if (messagesListener) {
                database.ref('chats').child(activeUserId).child('messages').off('value', messagesListener);
                messagesListener = null;
            }
            
            loadMessages(activeUserId);
            showNotification('🔄 جاري تحديث المحادثة...', 'info');
        }
    }

    function copyToClipboard(text, event) {
        event.stopPropagation();
        navigator.clipboard.writeText(text).then(() => {
            const icon = event.target;
            const originalClass = icon.className;
            icon.className = 'fas fa-check';
            icon.style.color = 'var(--success)';
            setTimeout(() => {
                icon.className = originalClass;
                icon.style.color = '';
            }, 1500);
        }).catch(err => {
            console.error('Error copying to clipboard:', err);
            showNotification('❌ فشل نسخ النص', 'error');
        });
    }

    function handleChatSearch() {
        if (activeUserId) {
            loadMessages(activeUserId);
        }
    }

    function updateCurrentUserStatus(chatData) {
        if (!chatData) return;
        
        const statusIndicator = document.getElementById('statusIndicator');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        
        if (!statusIndicator || !statusDot || !statusText) return;
        
        const isOnline = chatData.isOnline || false;
        const lastSeen = chatData.lastSeen || null;
        const isTyping = chatData.isTyping || false;
        
        if (isTyping) {
            statusText.innerHTML = '<span class="typing-indicator">يكتب الآن<span class="typing-dots"><span></span><span></span><span></span></span></span>';
            statusDot.className = 'status-dot status-online';
            statusDot.style.backgroundColor = 'var(--whatsapp-blue)';
        } else if (isOnline === true) {
            statusText.textContent = 'متصل الآن';
            statusDot.className = 'status-dot status-online';
            statusDot.style.backgroundColor = 'var(--online)';
        } else if (lastSeen) {
            const lastSeenTime = new Date(lastSeen);
            const now = new Date();
            const diffMinutes = Math.floor((now - lastSeenTime) / (1000 * 60));
            
            if (diffMinutes < 5) {
                statusText.textContent = 'نشط الآن';
                statusDot.className = 'status-dot status-online';
                statusDot.style.backgroundColor = 'var(--online)';
            } else {
                statusText.textContent = `آخر ظهور منذ ${diffMinutes} دقيقة`;
                statusDot.className = 'status-dot status-offline';
                statusDot.style.backgroundColor = 'var(--offline)';
            }
        } else {
            statusText.textContent = 'غير متصل';
            statusDot.className = 'status-dot status-offline';
            statusDot.style.backgroundColor = 'var(--offline)';
        }
    }

    async function loadChats() {
        try {
            if (chatsListener) {
                database.ref('chats').off('value', chatsListener);
                chatsListener = null;
            }
            
            chatsListener = database.ref('chats').on('value', 
                (snapshot) => {
                    try {
                        const chats = snapshot.val() || {};
                        renderUserList(chats);
                    } catch (renderError) {
                        console.error('خطأ في عرض المحادثات:', renderError);
                        showNotification('❌ خطأ في عرض قائمة المحادثات', 'error');
                    }
                }, 
                (error) => {
                    console.error('خطأ في الاستماع للمحادثات:', error);
                    showNotification('❌ خطأ في الاتصال بقاعدة البيانات', 'error');
                }
            );
            
        } catch (error) {
            console.error('خطأ فادح في تحميل المحادثات:', error);
            showNotification('❌ فشل تحميل المحادثات. يرجى تحديث الصفحة', 'error');
        }
    }

    function renderUserList(chats) {
        const userListDiv = document.getElementById('userList');
        const searchKeyword = document.getElementById('sidebarSearchInput').value.toLowerCase().trim();
        
        if (!userListDiv) return;
        
        userListDiv.innerHTML = '';
        
        let userIds = Object.keys(chats);
        
        let activeCount = 0;
        let escalatedCount = 0;
        let archivedCount = 0;

        let filteredIds = userIds.filter(id => {
            const chat = chats[id];
            if (!chat) return false;
            
            if (chat.isArchived) {
                archivedCount++;
            } else if (chat.isEscalated && !chat.isHidden) {
                escalatedCount++;
            } else if (!chat.isHidden) {
                activeCount++;
            }

            if (currentTab === 'archived') {
                if (!chat.isArchived) return false;
            } else if (currentTab === 'escalated') {
                if (!chat.isEscalated || chat.isArchived || chat.isHidden) return false;
            } else {
                if (chat.isArchived || chat.isHidden || chat.isEscalated) return false;
            }

            if (searchKeyword === "") return true;
            
            const nameMatch = (chat.username || '').toLowerCase().includes(searchKeyword);
            const idMatch = id.toLowerCase().includes(searchKeyword);
            
            let contentMatch = false;
            if (chat.messages) {
                const messages = Object.values(chat.messages);
                contentMatch = messages.some(m => 
                    m && m.text && typeof m.text === 'string' && m.text.toLowerCase().includes(searchKeyword)
                );
            }
            
            return nameMatch || idMatch || contentMatch;
        });

        document.getElementById('activeCount').textContent = activeCount;
        document.getElementById('escalatedCount').textContent = escalatedCount;
        document.getElementById('archivedCount').textContent = archivedCount;

        filteredIds.sort((a, b) => {
            const tA = new Date(chats[a]?.lastActivity || 0);
            const tB = new Date(chats[b]?.lastActivity || 0);
            return tB - tA;
        });

        if (filteredIds.length === 0) {
            const message = currentTab === 'archived' ? 'لا توجد محادثات في الأرشيف' :
                           currentTab === 'escalated' ? 'لا توجد محادثات مصعدة' :
                           searchKeyword ? 'لا توجد نتائج بحث' : 'لا توجد محادثات نشطة';
            
            userListDiv.innerHTML = `
                <div style="text-align: center; padding: 30px; color: var(--text-secondary);">
                    <i class="fas fa-comments fa-3x" style="opacity: 0.2;"></i>
                    <p style="margin-top: 10px; font-size:0.9rem;">${message}</p>
                </div>
            `;
            return;
        }

        filteredIds.forEach(userId => {
            try {
                const chatData = chats[userId];
                if (!chatData) return;
                
                const messages = chatData.messages ? Object.values(chatData.messages) : [];
                const lastMsg = messages[messages.length - 1];
                const unreadCount = chatData.unreadCount || 0;
                const isTyping = chatData.isTyping || false;
                
                const isOnline = chatData.isOnline || false;
                const lastSeen = chatData.lastSeen || null;

                let lastMsgPrefix = "";
                if (lastMsg) {
                    lastMsgPrefix = lastMsg.sender === 'admin' ? "أنت: " : `${chatData.username || 'مستخدم'}: `;
                }

                const userItem = document.createElement('div');
                userItem.className = `user-item ${chatData.isEscalated ? 'escalated' : ''} ${chatData.isArchived ? 'archived' : ''} ${activeUserId === userId ? 'active' : ''}`;
                userItem.onclick = () => openChat(userId);

                const displayName = chatData.username || 'مستخدم';
                
                let statusText = 'غير متصل';
                let statusClass = 'status-offline';
                
                if (isOnline === true) {
                    statusText = 'متصل الآن';
                    statusClass = 'status-online';
                } else if (lastSeen) {
                    const lastSeenTime = new Date(lastSeen);
                    const now = new Date();
                    const diffMinutes = Math.floor((now - lastSeenTime) / (1000 * 60));
                    
                    if (diffMinutes < 5) {
                        statusText = 'نشط الآن';
                        statusClass = 'status-online';
                    } else {
                        statusText = `آخر ظهور منذ ${diffMinutes} دقيقة`;
                        statusClass = 'status-offline';
                    }
                } else {
                    statusText = 'غير متصل';
                    statusClass = 'status-offline';
                }

                const cleanUserId = userId.replace('user_', '');
                
                userItem.innerHTML = `
                    <div class="item-actions">
                        <i class="fas ${chatData.isArchived ? 'fa-inbox' : 'fa-archive'} action-icon" 
                           title="${chatData.isArchived ? 'إخراج من الأرشيف' : 'أرشفة'}" 
                           onclick="toggleArchive('${userId}', event)"></i>
                        <i class="fas ${isDisplayHidden ? 'fa-eye' : 'fa-eye-slash'} action-icon" 
                           title="${isDisplayHidden ? 'إظهار' : 'إخفاء النص'}" 
                           onclick="hideDisplay('${userId}', event)"></i>
                    </div>
                    <div class="user-info-row">
                        <div class="user-name-container">
                            <span class="user-nickname">${displayName}</span>
                            ${chatData.isEscalated ? '<span class="escalation-tag">مصعد</span>' : ''}
                            <span class="user-id-tag">
                                ${cleanUserId}
                                <i class="fas fa-copy copy-id-btn" title="نسخ المعرف" onclick="copyToClipboard('${cleanUserId}', event)"></i>
                            </span>
                        </div>
                        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:2px;">
                            <small style="font-size:0.65rem; color:var(--text-secondary);">
                                ${lastMsg ? formatTime(lastMsg.time) : ''}
                            </small>
                            ${unreadCount > 0 ? `<span style="background:var(--danger); color:white; font-size:0.65rem; min-width:16px; height:16px; border-radius:8px; display:flex; align-items:center; justify-content:center; padding:0 4px; font-weight:bold;">${unreadCount}</span>` : ''}
                        </div>
                    </div>
                    <div style="font-size:0.75rem; color:var(--text-secondary); margin-top:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                        ${isTyping ? 
                            '<span class="typing-indicator">يكتب الآن...</span>' : 
                            `<span style="font-weight: 500; color: var(--text-muted);">${lastMsgPrefix}</span>
                             ${lastMsg ? (lastMsg.isDeleted ? '🚫 تم حذف هذه الرسالة' : 
                                        (lastMsg.type === 'text' || !lastMsg.type ? 
                                         (lastMsg.text || '').substring(0, 30) + ((lastMsg.text || '').length > 30 ? '...' : '') : 
                                         '📎 وسائط')) : 'محادثة فارغة'}`
                        }
                    </div>
                    <div class="user-status">
                        <span class="status-indicator ${statusClass}"></span>
                        <span>${statusText}</span>
                    </div>
                `;
                userListDiv.appendChild(userItem);
            } catch (error) {
                console.error(`خطأ في عرض محادثة ${userId}:`, error);
            }
        });

        if (activeUserId && chats[activeUserId]) {
            updateCurrentUserStatus(chats[activeUserId]);
        }
    }

    function refreshSidebar(btn) {
        const icon = btn.querySelector('i');
        icon.classList.add('rotate-anim');
        
        if (chatsListener) {
            database.ref('chats').off('value', chatsListener);
            chatsListener = null;
        }
        
        loadChats();
        
        setTimeout(() => { 
            icon.classList.remove('rotate-anim'); 
        }, 600);
    }

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tabActive').classList.toggle('active', tab === 'active');
        document.getElementById('tabEscalated').classList.toggle('active', tab === 'escalated');
        document.getElementById('tabArchived').classList.toggle('active', tab === 'archived');
        loadChats();
    }

    function formatTime(isoStr) {
        try {
            const d = new Date(isoStr);
            return d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2, '0');
        } catch (e) {
            return '--:--';
        }
    }

    function playNotificationSound() {
        try {
            const sound = document.getElementById('notifSound');
            if (sound) {
                sound.currentTime = 0;
                sound.play().catch(e => console.log("خطأ في تشغيل الصوت: ", e));
            }
        } catch (error) {
            console.log('Error playing sound:', error);
        }
    }

    function showNotification(message, type = 'info') {
        const notification = document.getElementById('notification');
        if (!notification) return;
        
        notification.textContent = message;
        notification.style.background = type === 'error' ? 'var(--danger)' : 
                                      type === 'warning' ? 'var(--warning)' : 
                                      type === 'success' ? 'var(--success)' : 'var(--whatsapp-green-light)';
        notification.style.display = 'block';
        
        setTimeout(() => {
            notification.style.display = 'none';
        }, 3000);
    }

    // Initialize Emoji Picker
    try {
        const pickerOptions = { 
            onEmojiSelect: (emoji) => {
                const input = document.getElementById('adminInput');
                input.value += emoji.native;
                input.focus();
                setAdminTyping(true);
            },
            locale: 'ar',
            theme: 'dark',
            set: 'apple',
            previewPosition: 'none',
            skinTonePosition: 'none'
        };
        
        const picker = new EmojiMart.Picker(pickerOptions);
        document.getElementById('emojiPickerContainer').appendChild(picker);
    } catch (e) {
        console.log('Emoji picker failed to load:', e);
    }

    // Initialize
    window.onload = async function() {
        await initializeFirebase();
        loadChats();
        loadQuickReplies();
        showNotification('✅ تم الاتصال بنظام إدارة المحادثات', 'success');
    };

    // Cleanup on unload
    window.onbeforeunload = function() {
        if (messagesListener && activeUserId) {
            database.ref('chats').child(activeUserId).child('messages').off('value', messagesListener);
        }
        if (chatsListener) {
            database.ref('chats').off('value', chatsListener);
        }
        if (userStatusListener && activeUserId) {
            database.ref('chats').child(activeUserId).off('value', userStatusListener);
        }
        setAdminTyping(false);
    };
</script>
</body>
