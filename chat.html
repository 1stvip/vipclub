<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎙️ VipChat - غرف الدردشة الصوتية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #fff;
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #ffd700;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-left .icon-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: #fff;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-left .icon-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
        }

        .header-center .logo {
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffd700;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: default;
        }

        .header-center .logo i {
            font-size: 1.6rem;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-right .icon-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: #fff;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header-right .icon-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
        }

        .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ff4757;
            color: #fff;
            font-size: 0.5rem;
            padding: 2px 6px;
            border-radius: 50%;
            border: 2px solid #1a1a2e;
        }

        /* ===== HERO BANNER ===== */
        .hero-banner {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            margin: 16px 16px 20px;
            padding: 30px 20px;
            border-radius: 16px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.15);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
        }

        .hero-banner .vip-wave {
            position: absolute;
            inset: 0;
            background: #0a0a1a;
            overflow: hidden;
        }

        .hero-banner .vip-wave::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, transparent 40%, rgba(0, 0, 0, 0.8) 60%, #0a0a1a 100%);
            animation: waveMove 6s ease-in-out infinite;
        }

        .hero-banner .vip-wave::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 70% 50%, transparent 40%, rgba(0, 0, 0, 0.6) 60%, #0a0a1a 100%);
            animation: waveMove 8s ease-in-out infinite reverse;
        }

        @keyframes waveMove {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(5%, 5%) rotate(5deg); }
            50% { transform: translate(10%, 0) rotate(0deg); }
            75% { transform: translate(5%, -5%) rotate(-5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .hero-banner .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero-banner .hero-title {
            font-size: 2rem;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            letter-spacing: 2px;
        }

        .hero-banner .hero-subtitle {
            color: #c8d6e5;
            font-size: 1rem;
            margin-top: 6px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .hero-banner .hero-tag {
            display: inline-block;
            margin-top: 10px;
            background: rgba(255, 215, 0, 0.12);
            padding: 6px 20px;
            border-radius: 30px;
            color: #ffd700;
            font-size: 0.75rem;
            border: 1px solid rgba(255, 215, 0, 0.2);
            letter-spacing: 1px;
        }

        /* ===== SEARCH BAR ===== */
        .search-container {
            padding: 0 16px 16px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: #1e1e32;
            border-radius: 30px;
            padding: 0 18px;
            border: 1px solid #2a2a4a;
            transition: 0.3s;
        }

        .search-bar:focus-within {
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.06);
        }

        .search-bar i {
            color: #888;
            font-size: 0.9rem;
        }

        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 14px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }

        .search-bar input::placeholder {
            color: #666;
        }

        .search-bar .search-btn {
            background: linear-gradient(135deg, #ffd700, #f0c000);
            border: none;
            color: #1a1a2e;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-bar .search-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
        }

        /* ===== FILTER TABS ===== */
        .filter-tabs {
            display: flex;
            gap: 6px;
            padding: 0 16px 14px;
            overflow-x: auto;
            flex-wrap: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        .filter-tabs::-webkit-scrollbar {
            height: 0;
        }

        .filter-tab {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            color: #aaa;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
            font-weight: 500;
        }

        .filter-tab:hover {
            border-color: #ffd700;
            color: #fff;
        }

        .filter-tab.active {
            background: #ffd700;
            color: #1a1a2e;
            border-color: #ffd700;
            font-weight: 600;
        }

        .filter-tab i {
            margin-left: 4px;
        }

        /* ===== ROOMS GRID ===== */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            padding: 0 16px 20px;
            flex: 1;
        }

        /* ===== ROOM CARD ===== */
        .room-card {
            background: #14142a;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #1e1e3a;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .room-card:hover {
            transform: translateY(-4px);
            border-color: #ffd700;
            box-shadow: 0 12px 40px rgba(255, 215, 0, 0.06);
        }

        .room-card .room-banner {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            padding: 20px 16px;
            text-align: center;
            position: relative;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .room-card .room-banner .vip-wave-small {
            position: absolute;
            inset: 0;
            background: #0a0a1a;
            overflow: hidden;
            border-radius: 16px 16px 0 0;
        }

        .room-card .room-banner .vip-wave-small::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, transparent 40%, rgba(0, 0, 0, 0.8) 60%, #0a0a1a 100%);
            animation: waveMove 6s ease-in-out infinite;
        }

        .room-card .room-banner .vip-wave-small::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 70% 50%, transparent 40%, rgba(0, 0, 0, 0.6) 60%, #0a0a1a 100%);
            animation: waveMove 8s ease-in-out infinite reverse;
        }

        .room-card .room-banner .vip-text {
            position: relative;
            z-index: 2;
            font-size: 1.6rem;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            letter-spacing: 4px;
        }

        .room-card .room-banner .room-id-badge {
            position: absolute;
            top: 10px;
            right: 12px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 0.55rem;
            color: #aaa;
            z-index: 3;
            font-family: monospace;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .room-card .room-banner .room-status {
            position: absolute;
            top: 10px;
            left: 12px;
            background: #10b981;
            color: #fff;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 0.55rem;
            font-weight: 600;
            z-index: 3;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .room-card .room-banner .room-status i {
            font-size: 0.4rem;
        }

        .room-card .room-body {
            padding: 14px 16px;
        }

        .room-card .room-body .room-name {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .room-card .room-body .room-desc {
            font-size: 0.8rem;
            color: #888;
            line-height: 1.5;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .room-card .room-body .room-host {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-top: 10px;
            border-top: 1px solid #1e1e3a;
        }

        .room-card .room-body .room-host .host-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f46e5, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
            color: #fff;
            flex-shrink: 0;
        }

        .room-card .room-body .room-host .host-info {
            flex: 1;
            min-width: 0;
        }

        .room-card .room-body .room-host .host-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: #eee;
        }

        .room-card .room-body .room-host .host-id {
            font-size: 0.6rem;
            color: #666;
            font-family: monospace;
        }

        .room-card .room-footer {
            padding: 10px 16px;
            background: #0f0f1f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #1a1a30;
        }

        .room-card .room-footer .stats {
            display: flex;
            gap: 12px;
            font-size: 0.7rem;
            color: #777;
        }

        .room-card .room-footer .stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .room-card .room-footer .join-btn {
            background: linear-gradient(135deg, #ffd700, #f0c000);
            border: none;
            color: #1a1a2e;
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .room-card .room-footer .join-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.25);
        }

        /* ===== FLOATING BUTTONS ===== */
        .floating-support {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: #fff;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 8px 30px rgba(139, 92, 246, 0.4);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .floating-support:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 40px rgba(139, 92, 246, 0.6);
        }

        .floating-support .pulse-dot {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #ff4757;
            border-radius: 50%;
            border: 2px solid #1a1a2e;
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 12px rgba(255, 71, 87, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        .floating-create-room {
            position: fixed;
            bottom: 24px;
            left: 24px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: #fff;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 8px 30px rgba(79, 70, 229, 0.4);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .floating-create-room:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 40px rgba(79, 70, 229, 0.6);
        }

        .floating-create-room .plus-icon {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 20px;
            height: 20px;
            background: #ff4757;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.6);
            animation: glow-pulse 1.5s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0% { box-shadow: 0 0 8px rgba(255, 71, 87, 0.6); }
            50% { box-shadow: 0 0 25px rgba(255, 71, 87, 1), 0 0 50px rgba(255, 71, 87, 0.3); }
            100% { box-shadow: 0 0 8px rgba(255, 71, 87, 0.6); }
        }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            background: #14142a;
            border-top: 1px solid #1e1e3a;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 14px;
            position: sticky;
            bottom: 0;
            z-index: 100;
        }

        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #666;
            font-size: 0.6rem;
            cursor: pointer;
            transition: 0.3s;
            background: none;
            border: none;
            padding: 4px 12px;
        }

        .bottom-nav .nav-item i {
            font-size: 1.2rem;
            margin-bottom: 2px;
            transition: 0.3s;
        }

        .bottom-nav .nav-item:hover {
            color: #ffd700;
        }

        .bottom-nav .nav-item.active {
            color: #ffd700;
        }

        .bottom-nav .nav-item .nav-badge {
            background: #ff4757;
            color: #fff;
            font-size: 0.45rem;
            padding: 1px 6px;
            border-radius: 10px;
            margin-top: -4px;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            top: 80px;
            right: 16px;
            padding: 10px 20px;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            z-index: 9999;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.3s ease-out;
            max-width: 90vw;
            font-size: 0.85rem;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
        }

        .toast.success { border-right: 4px solid #10b981; }
        .toast.error { border-right: 4px solid #ef4444; }
        .toast.info { border-right: 4px solid #3b82f6; }
        .toast.warning { border-right: 4px solid #f59e0b; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .header-center .logo {
                font-size: 1.1rem;
            }
            .header-center .logo i {
                font-size: 1.2rem;
            }
            .header-left .icon-btn,
            .header-right .icon-btn {
                width: 32px;
                height: 32px;
                font-size: 0.9rem;
            }
            .hero-banner .hero-title {
                font-size: 1.5rem;
            }
            .hero-banner .hero-subtitle {
                font-size: 0.85rem;
            }
            .rooms-grid {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 0 12px 16px;
            }
            .filter-tabs {
                padding: 0 12px 12px;
                gap: 4px;
            }
            .filter-tab {
                font-size: 0.65rem;
                padding: 4px 12px;
            }
            .floating-support,
            .floating-create-room {
                width: 44px;
                height: 44px;
                font-size: 1.1rem;
                bottom: 70px;
            }
            .floating-support { right: 16px; }
            .floating-create-room { left: 16px; }
            .floating-create-room .plus-icon {
                width: 16px;
                height: 16px;
                font-size: 0.9rem;
                top: -3px;
                right: -3px;
            }
            .bottom-nav .nav-item {
                font-size: 0.5rem;
            }
            .bottom-nav .nav-item i {
                font-size: 1rem;
            }
            .room-card .room-banner .vip-text {
                font-size: 1.2rem;
                letter-spacing: 2px;
            }
            .search-container {
                padding: 0 12px 12px;
            }
            .search-bar input {
                font-size: 0.8rem;
                padding: 10px 10px;
            }
            .search-bar .search-btn {
                font-size: 0.65rem;
                padding: 4px 12px;
            }
        }

        @media (max-width: 400px) {
            .header {
                padding: 6px 10px;
            }
            .header-center .logo {
                font-size: 0.95rem;
            }
            .header-left .icon-btn,
            .header-right .icon-btn {
                width: 28px;
                height: 28px;
                font-size: 0.75rem;
            }
            .hero-banner {
                margin: 10px 10px 14px;
                padding: 20px 12px;
            }
            .hero-banner .hero-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header-left">
            <button class="icon-btn" onclick="showToast('👤 الملف الشخصي', 'info')">
                <i class="fas fa-user-circle"></i>
            </button>
            <button class="icon-btn" onclick="showToast('🔔 الإشعارات', 'info')">
                <i class="fas fa-bell"></i>
                <span class="badge">3</span>
            </button>
        </div>
        <div class="header-center">
            <div class="logo">
                <i class="fas fa-crown"></i>
                VipChat
            </div>
        </div>
        <div class="header-right">
            <button class="icon-btn" onclick="showToast('🔍 بحث', 'info')">
                <i class="fas fa-search"></i>
            </button>
            <button class="icon-btn" onclick="showToast('⭐ الموصى بها', 'info')">
                <i class="fas fa-star"></i>
            </button>
            <button class="icon-btn" onclick="showToast('📋 القوائم', 'info')">
                <i class="fas fa-th-list"></i>
            </button>
        </div>
    </header>

    <!-- ===== HERO BANNER ===== -->
    <div class="hero-banner">
        <div class="vip-wave"></div>
        <div class="hero-content">
            <div class="hero-title">🌟 VIP CLUB</div>
            <div class="hero-subtitle">نادي كبار الشخصيات</div>
            <div class="hero-tag">✨ اللحظات المميزة للأشخاص المميزون فقط ✨</div>
        </div>
    </div>

    <!-- ===== SEARCH ===== -->
    <div class="search-container">
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="ابحث باسم الغرفة، المعرف، أو المضيف..." oninput="filterRooms()">
            <button class="search-btn" onclick="filterRooms()">بحث</button>
        </div>
    </div>

    <!-- ===== FILTER TABS ===== -->
    <div class="filter-tabs">
        <span class="filter-tab active" data-filter="all" onclick="setFilter('all', this)"><i class="fas fa-th-large"></i> الجميع</span>
        <span class="filter-tab" data-filter="vip" onclick="setFilter('vip', this)"><i class="fas fa-crown"></i> VIP</span>
        <span class="filter-tab" data-filter="popular" onclick="setFilter('popular', this)"><i class="fas fa-fire"></i> رائج</span>
        <span class="filter-tab" data-filter="challenges" onclick="setFilter('challenges', this)"><i class="fas fa-trophy"></i> تحديات</span>
        <span class="filter-tab" data-filter="entertainment" onclick="setFilter('entertainment', this)"><i class="fas fa-music"></i> ترفيه</span>
        <span class="filter-tab" data-filter="ongoing" onclick="setFilter('ongoing', this)"><i class="fas fa-clock"></i> مستمر</span>
    </div>

    <!-- ===== ROOMS GRID ===== -->
    <div class="rooms-grid" id="roomsGrid">
        <!-- سيتم إضافة الغرف ديناميكياً -->
    </div>

    <!-- ===== FLOATING BUTTONS ===== -->
    <button class="floating-support" onclick="showToast('📞 الدعم الفني', 'info')">
        <i class="fas fa-headset"></i>
        <span class="pulse-dot"></span>
    </button>

    <button class="floating-create-room" onclick="showToast('🏠 إنشاء غرفة جديدة', 'info')">
        <i class="fas fa-home"></i>
        <span class="plus-icon">+</span>
    </button>

    <!-- ===== BOTTOM NAV ===== -->
    <div class="bottom-nav">
        <button class="nav-item active" onclick="showToast('🏠 الغرف', 'info')">
            <i class="fas fa-home"></i>
            <span>الغرف</span>
        </button>
        <button class="nav-item" onclick="showToast('🎮 الألعاب', 'info')">
            <i class="fas fa-gamepad"></i>
            <span>الألعاب</span>
            <span class="nav-badge">جديد</span>
        </button>
        <button class="nav-item" onclick="showToast('💬 الرسائل', 'info')">
            <i class="fas fa-comment-dots"></i>
            <span>الرسائل</span>
            <span class="nav-badge">2</span>
        </button>
        <button class="nav-item" onclick="showToast('📸 اللحظات', 'info')">
            <i class="fas fa-camera"></i>
            <span>اللحظات</span>
        </button>
    </div>

    <script>
        // ============================================================
        // 📋 ROOMS DATA
        // ============================================================
        const roomsData = [
            {
                id: '3X9K2P',
                name: 'هلا والله',
                desc: 'مرحباً بكم في أجواء الترحيب والدفء',
                host: 'بيجور',
                hostId: '100234',
                members: 128,
                status: 'live',
                vip: true,
                tag: 'vip'
            },
            {
                id: '7M4N8Q',
                name: 'لا مسابقات',
                desc: 'نقاشات هادئة بدون منافسات',
                host: 'مجهنيونية',
                hostId: '200567',
                members: 45,
                status: 'live',
                vip: false,
                tag: 'entertainment'
            },
            {
                id: '5R2T9W',
                name: 'أهلاً بالمستخدمين الجدد',
                desc: 'نرحب بكل الأعضاء الجدد في عائلة VIP',
                host: 'الإدارة',
                hostId: '000001',
                members: 89,
                status: 'live',
                vip: true,
                tag: 'vip'
            },
            {
                id: '1A6B3C',
                name: 'الاحتفال بالذكرى العاشرة',
                desc: 'احتفال مميز بمرور 10 سنوات على تأسيس يلا...',
                host: 'المؤسس',
                hostId: '000000',
                members: 312,
                status: 'live',
                vip: true,
                tag: 'challenges'
            },
            {
                id: '9E8F7G',
                name: 'مجهنيونية وبيسه',
                desc: 'أجواء مليئة بالمرح والفكاهة',
                host: 'بيسه',
                hostId: '300789',
                members: 67,
                status: 'live',
                vip: false,
                tag: 'entertainment'
            },
            {
                id: '2H4J6K',
                name: 'النجوم الجدد',
                desc: 'اكتشاف المواهب الجديدة في عالم الصوت',
                host: 'المشرف',
                hostId: '400123',
                members: 56,
                status: 'live',
                vip: true,
                tag: 'vip'
            }
        ];

        let currentFilter = 'all';
        let currentSearch = '';

        // ============================================================
        // 🖥️ RENDER ROOMS
        // ============================================================
        function renderRooms(rooms) {
            const grid = document.getElementById('roomsGrid');

            if (rooms.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1; text-align:center; padding:60px 20px; color:#666;">
                        <i class="fas fa-microphone-slash" style="font-size:3rem; color:#333; margin-bottom:12px;"></i>
                        <h3 style="color:#888;">لا توجد غرف مطابقة</h3>
                        <p style="font-size:0.85rem;">جرب تغيير البحث أو التصفية</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = rooms.map(room => `
                <div class="room-card" onclick="joinRoom('${room.id}')" data-room-id="${room.id}">
                    <div class="room-banner">
                        <div class="vip-wave-small"></div>
                        <div class="room-id-badge">🔑 ${room.id}</div>
                        <div class="room-status"><i class="fas fa-circle"></i> مباشر</div>
                        <div class="vip-text">${room.vip ? 'V I P' : '🎙️'}</div>
                    </div>
                    <div class="room-body">
                        <div class="room-name">${room.name}</div>
                        <div class="room-desc">${room.desc}</div>
                        <div class="room-host">
                            <div class="host-avatar">${room.host.charAt(0).toUpperCase()}</div>
                            <div class="host-info">
                                <div class="host-name">${room.host}</div>
                                <div class="host-id">🆔 ${room.hostId}</div>
                            </div>
                        </div>
                    </div>
                    <div class="room-footer">
                        <div class="stats">
                            <span><i class="fas fa-users"></i> ${room.members}</span>
                            <span><i class="fas fa-bolt"></i> ${room.vip ? 'VIP' : 'عام'}</span>
                        </div>
                        <button class="join-btn" onclick="event.stopPropagation(); joinRoom('${room.id}')">
                            <i class="fas fa-sign-in-alt"></i> دخول
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ============================================================
        // 🔍 FILTER & SEARCH
        // ============================================================
        function filterRooms() {
            const search = document.getElementById('searchInput').value.trim().toLowerCase();
            currentSearch = search;

            let filtered = roomsData;

            // Filter by tab
            if (currentFilter !== 'all') {
                filtered = filtered.filter(room => room.tag === currentFilter);
            }

            // Filter by search
            if (search) {
                filtered = filtered.filter(room =>
                    room.name.toLowerCase().includes(search) ||
                    room.id.toLowerCase().includes(search) ||
                    room.host.toLowerCase().includes(search) ||
                    room.hostId.includes(search)
                );
            }

            renderRooms(filtered);
        }

        function setFilter(filter, el) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
            el.classList.add('active');
            filterRooms();
        }

        // ============================================================
        // 🎯 JOIN ROOM
        // ============================================================
        function joinRoom(roomId) {
            showToast(`🚪 جاري الدخول إلى الغرفة ${roomId}...`, 'info');
            // window.location.href = `voice-room.html?room=${roomId}`;
        }

        // ============================================================
        // 🔔 TOAST
        // ============================================================
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(30px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ============================================================
        // 🚀 INIT
        // ============================================================
        window.onload = function() {
            renderRooms(roomsData);
        };
    </script>

</body>
</html>
