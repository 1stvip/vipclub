<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎙️ VipChat - غرف الدردشة الصوتية</title>
    <link rel="shortcut icon" href="images/videoslogo/vip.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== HEADER ===== */
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 2rem;
            color: #ffd700;
        }

        .header-icons {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            flex-wrap: wrap;
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .icon-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: translateY(-2px);
            color: #ffd700;
        }

        .icon-btn .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4757;
            color: white;
            font-size: 0.6rem;
            padding: 2px 7px;
            border-radius: 50%;
            border: 2px solid #1a1a2e;
            font-weight: bold;
            min-width: 20px;
            text-align: center;
        }

        /* ===== NOTIFICATION DROPDOWN ===== */
        .notif-dropdown {
            position: absolute;
            top: 60px;
            right: 0;
            width: 380px;
            max-width: 90vw;
            background: #1a1a2e;
            border-radius: 15px;
            border: 1px solid #333;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            z-index: 1001;
            overflow: hidden;
            max-height: 500px;
        }

        .notif-dropdown.active {
            display: flex;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-15px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .notif-header {
            padding: 15px 20px;
            background: #16213e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
            gap: 10px;
        }

        .notif-header h3 {
            color: #ffd700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .notif-actions {
            display: flex;
            gap: 10px;
            font-size: 0.75rem;
        }

        .notif-actions span {
            cursor: pointer;
            color: #aaa;
            transition: 0.3s;
            padding: 3px 8px;
            border-radius: 5px;
        }

        .notif-actions span:hover {
            color: #ffd700;
            background: rgba(255,215,0,0.1);
        }

        .notif-actions .delete-all:hover {
            color: #ff4757;
            background: rgba(255,71,87,0.1);
        }

        #notifList {
            overflow-y: auto;
            max-height: 350px;
            min-height: 100px;
        }

        .notif-item {
            padding: 12px 20px;
            border-bottom: 1px solid #2a2a3e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
            cursor: default;
        }

        .notif-item:hover {
            background: #2a2a3e;
        }

        .notif-item.unread {
            background: #1e2a4a;
            border-right: 4px solid #ffd700;
        }

        .notif-item .notif-content {
            flex: 1;
        }

        .notif-item .notif-text {
            color: #eee;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .notif-item .notif-time {
            color: #777;
            font-size: 0.7rem;
            margin-top: 3px;
        }

        .notif-item .notif-actions-btn {
            display: flex;
            gap: 8px;
        }

        .notif-item .notif-actions-btn i {
            cursor: pointer;
            color: #555;
            transition: 0.3s;
            padding: 5px;
            border-radius: 5px;
        }

        .notif-item .notif-actions-btn i:hover {
            color: #ffd700;
            background: rgba(255,215,0,0.1);
        }

        .notif-item .notif-actions-btn .delete-notif:hover {
            color: #ff4757;
            background: rgba(255,71,87,0.1);
        }

        .empty-notif {
            padding: 40px 20px;
            text-align: center;
            color: #666;
        }

        .empty-notif i {
            font-size: 2.5rem;
            color: #444;
            margin-bottom: 10px;
        }

        /* ===== MAIN CONTENT ===== */
        main {
            flex: 1;
            padding: 30px 5%;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-header h1 {
            color: #1a1a2e;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h1 i {
            color: #7c3aed;
        }

        /* ===== ROOMS GRID ===== */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .room-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            border: 1px solid #eee;
            position: relative;
        }

        .room-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
        }

        .room-card .room-header {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            padding: 20px;
            color: white;
            position: relative;
        }

        .room-card .room-header .room-id {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
        }

        .room-card .room-header .room-icon {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .room-card .room-header .room-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 5px;
        }

        .room-card .room-body {
            padding: 20px;
        }

        .room-card .room-body .room-description {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .room-card .room-body .room-creator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .room-card .room-body .room-creator .creator-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .room-card .room-body .room-creator .creator-info {
            flex: 1;
        }

        .room-card .room-body .room-creator .creator-info .creator-name {
            font-weight: bold;
            color: #1a1a2e;
        }

        .room-card .room-body .room-creator .creator-info .creator-id {
            font-size: 0.75rem;
            color: #888;
            font-family: monospace;
        }

        .room-card .room-footer {
            padding: 15px 20px;
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eee;
        }

        .room-card .room-footer .room-stats {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            color: #666;
        }

        .room-card .room-footer .room-stats span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .room-card .room-footer .btn-join {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .room-card .room-footer .btn-join:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }

        .room-card .room-status {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .room-status.live {
            background: #10b981;
            color: white;
        }

        .room-status.pending {
            background: #f59e0b;
            color: white;
        }

        .room-status.closed {
            background: #ef4444;
            color: white;
        }

        /* ============================================= */
        /* ===== FLOATING BUTTONS (الأزرار العائمة) ===== */
        /* ============================================= */
        
        /* ===== زر إنشاء غرفة (الجانب الأيسر) ===== */
        .floating-create-room {
            position: fixed;
            bottom: 25px;
            left: 25px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 9999;
            transition: all 0.3s ease;
            border: none;
            box-shadow: 0 5px 25px rgba(79, 70, 229, 0.4);
            text-decoration: none;
            position: fixed;
        }

        .floating-create-room:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 35px rgba(79, 70, 229, 0.6);
            background: linear-gradient(135deg, #6366f1, #7c3aed);
        }

        /* علامة + بيضاء على زر إنشاء الغرفة */
        .floating-create-room .plus-icon {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #ff4757;
            color: white;
            font-size: 1.5rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.8), 0 0 30px rgba(255, 71, 87, 0.4);
            animation: glow-pulse 1.5s ease-in-out infinite;
            line-height: 1;
            text-shadow: 0 0 3px rgba(0,0,0,0.3);
        }

        @keyframes glow-pulse {
            0% {
                box-shadow: 0 0 8px rgba(255, 71, 87, 0.6), 0 0 15px rgba(255, 71, 87, 0.3);
            }
            50% {
                box-shadow: 0 0 20px rgba(255, 71, 87, 1), 0 0 40px rgba(255, 71, 87, 0.6), 0 0 60px rgba(255, 71, 87, 0.3);
            }
            100% {
                box-shadow: 0 0 8px rgba(255, 71, 87, 0.6), 0 0 15px rgba(255, 71, 87, 0.3);
            }
        }

        /* ===== زر الدعم الفني (الجانب الأيمن) ===== */
        .floating-support {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 5px 25px rgba(59, 130, 246, 0.4);
            cursor: pointer;
            z-index: 9999;
            transition: 0.3s;
            text-decoration: none;
            border: none;
        }

        .floating-support:hover {
            transform: scale(1.1) rotate(-10deg);
            box-shadow: 0 8px 35px rgba(59, 130, 246, 0.6);
        }

        .floating-support .pulse-dot {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            background: #ff4757;
            border: 2px solid white;
            border-radius: 50%;
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.33); }
            80%, 100% { opacity: 0; }
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 35px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        }

        .modal-content h2 {
            color: #1a1a2e;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #7c3aed;
            padding-bottom: 15px;
        }

        .modal-content .form-group {
            margin-bottom: 18px;
        }

        .modal-content .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .modal-content .form-group input,
        .modal-content .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            outline: none;
        }

        .modal-content .form-group input:focus,
        .modal-content .form-group textarea:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .modal-content .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-actions .btn-submit {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: white;
        }

        .modal-actions .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.3);
        }

        .modal-actions .btn-cancel {
            background: #f1f1f1;
            color: #666;
        }

        .modal-actions .btn-cancel:hover {
            background: #e2e2e2;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: slideDown 0.3s ease-out;
            max-width: 400px;
        }

        .toast.success { background: linear-gradient(135deg, #10b981, #059669); }
        .toast.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .toast.info { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .toast.warning { background: linear-gradient(135deg, #f59e0b, #d97706); }

        /* ===== FOOTER ===== */
        footer {
            background: #1a1a2e;
            color: #888;
            text-align: center;
            padding: 20px;
            border-top: 2px solid #ffd700;
            margin-top: auto;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            header {
                padding: 0.8rem 4%;
                flex-wrap: wrap;
                gap: 10px;
            }

            .logo {
                font-size: 1.3rem;
            }

            .logo i {
                font-size: 1.5rem;
            }

            .icon-btn {
                width: 38px;
                height: 38px;
                font-size: 1rem;
            }

            .notif-dropdown {
                right: -10px;
                width: 340px;
            }

            .rooms-grid {
                grid-template-columns: 1fr;
            }

            .page-header {
                flex-direction: column;
                align-items: stretch;
            }

            .modal-content {
                padding: 25px;
            }

            .floating-create-room,
            .floating-support {
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
            }

            .floating-create-room {
                left: 20px;
                bottom: 20px;
            }

            .floating-support {
                right: 20px;
                bottom: 20px;
            }

            .floating-create-room .plus-icon {
                width: 18px;
                height: 18px;
                font-size: 0.7rem;
                top: -3px;
                right: -3px;
            }
        }

        @media (max-width: 480px) {
            .header-icons {
                gap: 6px;
            }

            .icon-btn {
                width: 32px;
                height: 32px;
                font-size: 0.8rem;
            }

            .notif-dropdown {
                width: 280px;
                right: -5px;
            }

            .floating-create-room,
            .floating-support {
                width: 45px;
                height: 45px;
                font-size: 1.3rem;
            }

            .floating-create-room {
                left: 15px;
                bottom: 15px;
            }

            .floating-support {
                right: 15px;
                bottom: 15px;
            }

            .floating-create-room .plus-icon {
                width: 16px;
                height: 16px;
                font-size: 0.6rem;
                top: -2px;
                right: -2px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header>
        <div class="logo" onclick="location.reload()">
            <i class="fas fa-crown"></i>
            VipChat
        </div>

        <div class="header-icons" style="position: relative;">
            <!-- أيقونة الملف الشخصي -->
            <button class="icon-btn" onclick="handleProfileClick()" title="الملف الشخصي">
                <i class="fas fa-user-circle"></i>
            </button>

            <!-- أيقونة المحفظة -->
            <button class="icon-btn" onclick="handleWalletClick()" title="المحفظة">
                <i class="fas fa-wallet"></i>
            </button>

            <!-- أيقونة الإعدادات -->
            <button class="icon-btn" onclick="handleSettingsClick()" title="الإعدادات">
                <i class="fas fa-cog"></i>
            </button>

            <!-- أيقونة الإشعارات -->
            <button class="icon-btn" onclick="toggleNotifs()" title="الإشعارات" id="notifBtn">
                <i class="fas fa-bell"></i>
                <span class="badge" id="notifBadge" style="display: none;">0</span>
            </button>

            <!-- ===== NOTIFICATION DROPDOWN ===== -->
            <div id="notifDropdown" class="notif-dropdown">
                <div class="notif-header">
                    <h3><i class="fas fa-bell"></i> الإشعارات</h3>
                    <div class="notif-actions">
                        <span onclick="loadNotifications()" title="تحديث">
                            <i class="fas fa-sync-alt"></i>
                        </span>
                        <span onclick="markAllRead()" title="تعيين الكل كمقروء">
                            <i class="fas fa-check-double"></i>
                        </span>
                        <span onclick="deleteAllNotifs()" class="delete-all" title="حذف الكل">
                            <i class="fas fa-trash"></i>
                        </span>
                    </div>
                </div>
                <div id="notifList">
                    <div class="empty-notif">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>جاري تحميل الإشعارات...</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main>
        <div class="page-header">
            <h1><i class="fas fa-microphone-alt"></i> غرف الدردشة الصوتية</h1>
        </div>

        <div class="rooms-grid" id="roomsGrid">
            <!-- سيتم إضافة الغرف ديناميكياً -->
        </div>
    </main>

    <!-- ========================================================== -->
    <!-- ===== الأزرار العائمة (FLOATING BUTTONS) ===== -->
    <!-- ========================================================== -->
    
    <!-- زر إنشاء غرفة (الجانب الأيسر) -->
    <button class="floating-create-room" onclick="openCreateRoomModal()" title="إنشاء غرفة جديدة">
        <i class="fas fa-home"></i>
        <span class="plus-icon">+</span>
    </button>

    <!-- زر الدعم الفني (الجانب الأيمن) -->
    <button class="floating-support" onclick="handleSupportClick()" title="الدعم الفني">
        <i class="fas fa-headset"></i>
        <span class="pulse-dot"></span>
    </button>

    <!-- ===== MODAL: إنشاء غرفة ===== -->
    <div id="createRoomModal" class="modal">
        <div class="modal-content">
            <h2><i class="fas fa-home" style="color: #7c3aed;"></i> إنشاء غرفة جديدة</h2>
            <div class="form-group">
                <label>اسم الغرفة *</label>
                <input type="text" id="roomNameInput" placeholder="أدخل اسم الغرفة" maxlength="50">
            </div>
            <div class="form-group">
                <label>وصف الغرفة</label>
                <textarea id="roomDescInput" placeholder="أدخل وصفاً للغرفة..." rows="3"></textarea>
            </div>
            <div class="form-group" style="background: #f0f7ff; padding: 15px; border-radius: 10px;">
                <p style="font-size: 0.9rem; color: #555;">
                    <i class="fas fa-info-circle" style="color: #7c3aed;"></i>
                    سيتم إرسال طلبك إلى الإدارة للموافقة عليه. ستتلقى إشعاراً عند الموافقة أو الرفض.
                </p>
            </div>
            <div class="modal-actions">
                <button class="btn-submit" onclick="submitRoomRequest()">
                    <i class="fas fa-paper-plane"></i> إرسال الطلب
                </button>
                <button class="btn-cancel" onclick="closeModal('createRoomModal')">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer>
        &copy; 2026 VipChat - جميع الحقوق محفوظة
    </footer>

    <script>
        // ============================================================
        // 🔥 FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAVSzkDLqi1G-hpfEPqvBMmuyYRfEuaTKk",
            authDomain: "vipclub-1d04a.firebaseapp.com",
            databaseURL: "https://vipclub-1d04a-default-rtdb.firebaseio.com",
            projectId: "vipclub-1d04a",
            storageBucket: "vipclub-1d04a.firebasestorage.app",
            messagingSenderId: "120667552740",
            appId: "1:120667552740:web:02085765fd43eb0080e5f1"
        };

        let database;
        let currentUser = null;

        // ============================================================
        // 🚀 INITIALIZE FIREBASE
        // ============================================================
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            database = firebase.database();
            console.log('✅ Firebase connected successfully');
        } catch (error) {
            console.error('❌ Firebase connection error:', error);
        }

        // ============================================================
        // 👤 USER MANAGEMENT
        // ============================================================
        function getCurrentUser() {
            try {
                return JSON.parse(localStorage.getItem('currentUser'));
            } catch (e) {
                return null;
            }
        }

        // ============================================================
        // 📋 ROOMS MANAGEMENT
        // ============================================================
        function generateRoomId() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < 8; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        async function loadRooms() {
            if (!database) return;

            try {
                const snapshot = await database.ref('rooms').once('value');
                const roomsGrid = document.getElementById('roomsGrid');

                if (!snapshot.exists()) {
                    roomsGrid.innerHTML = `
                        <div style="grid-column: 1 / -1; text-align: center; padding: 60px 20px;">
                            <i class="fas fa-microphone-slash" style="font-size: 3rem; color: #ccc; margin-bottom: 15px;"></i>
                            <h3 style="color: #555;">لا توجد غرف حالياً</h3>
                            <p style="color: #888;">اضغط على أيقونة <strong style="color: #7c3aed;">🏠+</strong> لإنشاء غرفة جديدة</p>
                        </div>
                    `;
                    return;
                }

                const roomsData = snapshot.val();
                let html = '';
                let hasActiveRooms = false;

                for (const roomId in roomsData) {
                    const room = roomsData[roomId];
                    
                    if (room.status !== 'approved') continue;
                    
                    hasActiveRooms = true;

                    let creatorName = room.creatorName || 'مستخدم';
                    let creatorId = room.creatorId || '---';

                    html += `
                        <div class="room-card" data-room-id="${roomId}">
                            <div class="room-header">
                                <div class="room-id">🔑 ${roomId}</div>
                                <div class="room-status live">● مباشر</div>
                                <div class="room-icon">🎙️</div>
                                <div class="room-name">${room.name || 'غرفة بدون اسم'}</div>
                            </div>
                            <div class="room-body">
                                <div class="room-description">${room.description || 'لا يوجد وصف'}</div>
                                <div class="room-creator">
                                    <div class="creator-avatar">${creatorName.charAt(0).toUpperCase()}</div>
                                    <div class="creator-info">
                                        <div class="creator-name">${creatorName}</div>
                                        <div class="creator-id">🆔 ${creatorId}</div>
                                    </div>
                                </div>
                            </div>
                            <div class="room-footer">
                                <div class="room-stats">
                                    <span><i class="fas fa-users"></i> ${room.members || 0}</span>
                                    <span><i class="fas fa-calendar"></i> ${room.createdAt ? new Date(room.createdAt).toLocaleDateString('ar-EG') : '---'}</span>
                                </div>
                                <button class="btn-join" onclick="joinRoom('${roomId}')">
                                    <i class="fas fa-sign-in-alt"></i> دخول
                                </button>
                            </div>
                        </div>
                    `;
                }

                if (!hasActiveRooms) {
                    roomsGrid.innerHTML = `
                        <div style="grid-column: 1 / -1; text-align: center; padding: 60px 20px;">
                            <i class="fas fa-microphone-slash" style="font-size: 3rem; color: #ccc; margin-bottom: 15px;"></i>
                            <h3 style="color: #555;">لا توجد غرف متاحة حالياً</h3>
                            <p style="color: #888;">قم بإنشاء غرفة جديدة وسيتم مراجعتها من قبل الإدارة</p>
                        </div>
                    `;
                } else {
                    roomsGrid.innerHTML = html;
                }

            } catch (error) {
                console.error('Error loading rooms:', error);
            }
        }

        // ============================================================
        // 📝 SUBMIT ROOM REQUEST
        // ============================================================
        async function submitRoomRequest() {
            const name = document.getElementById('roomNameInput').value.trim();
            const description = document.getElementById('roomDescInput').value.trim();

            if (!name) {
                showToast('⚠️ يرجى إدخال اسم الغرفة', 'warning');
                return;
            }

            currentUser = getCurrentUser();
            
            const userData = currentUser || {
                numericId: 'GUEST_' + Math.floor(Math.random() * 1000000),
                username: 'زائر',
                nickname: 'زائر',
                isGuest: true
            };

            const roomId = generateRoomId();
            const requestData = {
                roomId: roomId,
                name: name,
                description: description || 'لا يوجد وصف',
                creatorId: userData.numericId || 'GUEST',
                creatorName: userData.nickname || userData.username || 'زائر',
                creatorEmail: userData.email || '',
                creatorPhone: userData.phone || '',
                status: 'pending',
                createdAt: new Date().toISOString(),
                members: 0,
                isActive: false,
                isGuest: userData.isGuest || false
            };

            try {
                await database.ref('room_requests/' + roomId).set(requestData);

                await database.ref('admin_notifications').push({
                    type: 'new_room_request',
                    roomId: roomId,
                    roomName: name,
                    creatorName: requestData.creatorName,
                    creatorId: requestData.creatorId,
                    read: false,
                    createdAt: new Date().toISOString()
                });

                if (currentUser && currentUser.numericId) {
                    await sendNotification(
                        currentUser.numericId,
                        `✅ تم استلام طلب إنشاء غرفة "${name}" بنجاح!`,
                        `معرف الطلب: ${roomId}\nسيتم مراجعة طلبك من قبل الإدارة وسنخطرك عند الموافقة.`
                    );
                }

                showToast('✅ تم إرسال طلب إنشاء الغرفة بنجاح!', 'success');
                closeModal('createRoomModal');
                document.getElementById('roomNameInput').value = '';
                document.getElementById('roomDescInput').value = '';

                setTimeout(() => loadRooms(), 500);

            } catch (error) {
                console.error('Error submitting room request:', error);
                showToast('❌ حدث خطأ في إرسال الطلب. حاول مرة أخرى.', 'error');
            }
        }

        // ============================================================
        // 🔔 SEND NOTIFICATION
        // ============================================================
        async function sendNotification(userId, title, message) {
            if (!database) return;

            try {
                const usersRef = database.ref('users');
                const snapshot = await usersRef.orderByChild('numericId').equalTo(userId).once('value');

                if (!snapshot.exists()) {
                    console.warn('User not found for notification:', userId);
                    return;
                }

                const userData = snapshot.val();
                const userKey = Object.keys(userData)[0];

                await database.ref('users/' + userKey + '/notifications').push({
                    text: `${title}\n${message}`,
                    date: new Date().toLocaleString('ar-EG'),
                    read: false,
                    type: 'room_request'
                });

            } catch (error) {
                console.error('Error sending notification:', error);
            }
        }

        // ============================================================
        // 🔔 NOTIFICATIONS
        // ============================================================
        async function loadNotifications() {
            const list = document.getElementById('notifList');

            try {
                currentUser = getCurrentUser();
                if (!currentUser || !currentUser.numericId) {
                    list.innerHTML = `
                        <div class="empty-notif">
                            <i class="fas fa-user-lock"></i>
                            <p>يجب تسجيل الدخول لعرض الإشعارات</p>
                            <button onclick="window.location.href='Login.html'" 
                                    style="margin-top:15px; padding:8px 20px; background:#ffd700; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">
                                تسجيل الدخول
                            </button>
                        </div>
                    `;
                    return;
                }

                const usersRef = database.ref('users');
                const snapshot = await usersRef.orderByChild('numericId').equalTo(currentUser.numericId).once('value');

                if (!snapshot.exists()) {
                    list.innerHTML = `
                        <div class="empty-notif">
                            <i class="fas fa-user-slash"></i>
                            <p>المستخدم غير موجود</p>
                        </div>
                    `;
                    return;
                }

                const userData = snapshot.val();
                const userId = Object.keys(userData)[0];
                const notifRef = database.ref('users/' + userId + '/notifications');
                const notifSnapshot = await notifRef.once('value');

                if (!notifSnapshot.exists()) {
                    list.innerHTML = `
                        <div class="empty-notif">
                            <i class="far fa-bell"></i>
                            <p>لا توجد إشعارات</p>
                        </div>
                    `;
                    document.getElementById('notifBadge').style.display = 'none';
                    return;
                }

                const notifications = [];
                let unreadCount = 0;

                notifSnapshot.forEach(child => {
                    const notif = child.val();
                    const isRead = notif.read || false;
                    notifications.push({
                        key: child.key,
                        text: notif.text || 'إشعار جديد',
                        read: isRead,
                        date: notif.date || new Date().toLocaleString('ar-EG')
                    });
                    if (!isRead) unreadCount++;
                });

                notifications.sort((a, b) => b.key.localeCompare(a.key));

                const badge = document.getElementById('notifBadge');
                if (unreadCount > 0) {
                    badge.textContent = unreadCount;
                    badge.style.display = 'block';
                } else {
                    badge.style.display = 'none';
                }

                list.innerHTML = '';
                notifications.forEach(notif => {
                    const item = document.createElement('div');
                    item.className = `notif-item ${!notif.read ? 'unread' : ''}`;
                    item.innerHTML = `
                        <div class="notif-content">
                            <div class="notif-text">${notif.text}</div>
                            <div class="notif-time"><i class="far fa-clock"></i> ${notif.date}</div>
                        </div>
                        <div class="notif-actions-btn">
                            ${!notif.read ? `
                                <i class="fas fa-check" onclick="markAsRead('${userId}', '${notif.key}')" 
                                   title="تعيين كمقروء" style="color:#10b981;"></i>
                            ` : ''}
                            <i class="fas fa-trash delete-notif" onclick="deleteNotif('${userId}', '${notif.key}')" 
                               title="حذف"></i>
                        </div>
                    `;
                    list.appendChild(item);
                });

            } catch (error) {
                console.error('Error loading notifications:', error);
                list.innerHTML = `
                    <div class="empty-notif">
                        <i class="fas fa-exclamation-triangle" style="color:#ff4757;"></i>
                        <p>خطأ في تحميل الإشعارات</p>
                    </div>
                `;
            }
        }

        async function markAsRead(userId, notifKey) {
            try {
                await database.ref('users/' + userId + '/notifications/' + notifKey).update({ read: true });
                await loadNotifications();
            } catch (error) {
                console.error('Error marking as read:', error);
            }
        }

        async function markAllRead() {
            try {
                currentUser = getCurrentUser();
                if (!currentUser || !currentUser.numericId) return;

                const usersRef = database.ref('users');
                const snapshot = await usersRef.orderByChild('numericId').equalTo(currentUser.numericId).once('value');

                if (!snapshot.exists()) return;

                const userData = snapshot.val();
                const userId = Object.keys(userData)[0];
                const notifRef = database.ref('users/' + userId + '/notifications');
                const notifSnapshot = await notifRef.once('value');

                if (!notifSnapshot.exists()) return;

                const updates = {};
                notifSnapshot.forEach(child => {
                    updates[child.key + '/read'] = true;
                });

                await notifRef.update(updates);
                await loadNotifications();

            } catch (error) {
                console.error('Error marking all as read:', error);
            }
        }

        async function deleteNotif(userId, notifKey) {
            if (!confirm('هل تريد حذف هذا الإشعار؟')) return;

            try {
                await database.ref('users/' + userId + '/notifications/' + notifKey).remove();
                await loadNotifications();
            } catch (error) {
                console.error('Error deleting notification:', error);
            }
        }

        async function deleteAllNotifs() {
            if (!confirm('هل تريد حذف جميع الإشعارات نهائياً؟')) return;

            try {
                currentUser = getCurrentUser();
                if (!currentUser || !currentUser.numericId) return;

                const usersRef = database.ref('users');
                const snapshot = await usersRef.orderByChild('numericId').equalTo(currentUser.numericId).once('value');

                if (!snapshot.exists()) return;

                const userData = snapshot.val();
                const userId = Object.keys(userData)[0];

                await database.ref('users/' + userId + '/notifications').remove();
                await loadNotifications();

            } catch (error) {
                console.error('Error deleting all notifications:', error);
            }
        }

        // ============================================================
        // 🧭 NAVIGATION FUNCTIONS
        // ============================================================
        function handleProfileClick() {
            const user = getCurrentUser();
            if (user) {
                window.location.href = 'profile.html';
            } else {
                showToast('⚠️ يرجى تسجيل الدخول أولاً', 'warning');
                setTimeout(() => window.location.href = 'Login.html', 1500);
            }
        }

        function handleWalletClick() {
            const user = getCurrentUser();
            if (user) {
                window.location.href = 'Wallet.html';
            } else {
                showToast('⚠️ يرجى تسجيل الدخول أولاً', 'warning');
                setTimeout(() => window.location.href = 'Login.html', 1500);
            }
        }

        function handleSettingsClick() {
            const user = getCurrentUser();
            if (user) {
                window.location.href = 'settings.html';
            } else {
                showToast('⚠️ يرجى تسجيل الدخول أولاً', 'warning');
                setTimeout(() => window.location.href = 'Login.html', 1500);
            }
        }

        function handleSupportClick() {
            window.location.href = 'support.html';
        }

        function toggleNotifs() {
            const dropdown = document.getElementById('notifDropdown');
            dropdown.classList.toggle('active');
            if (dropdown.classList.contains('active')) {
                loadNotifications();
            }
        }

        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('notifDropdown');
            const notifBtn = document.getElementById('notifBtn');

            if (!dropdown.contains(event.target) && event.target !== notifBtn && !notifBtn.contains(event.target)) {
                dropdown.classList.remove('active');
            }
        });

        // ============================================================
        // 🎯 JOIN ROOM
        // ============================================================
        function joinRoom(roomId) {
            window.location.href = `voice-room.html?room=${roomId}`;
        }

        // ============================================================
        // 🖥️ MODAL FUNCTIONS
        // ============================================================
        function openCreateRoomModal() {
            document.getElementById('createRoomModal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });
        });

        // ============================================================
        // 🔔 TOAST SYSTEM
        // ============================================================
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(50px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }

        // ============================================================
        // 🚀 INIT ON PAGE LOAD
        // ============================================================
        window.onload = function() {
            currentUser = getCurrentUser();
            loadRooms();

            if (currentUser) {
                updateNotifBadge();
            }

            if (database) {
                database.ref('rooms').on('value', () => {
                    loadRooms();
                });
            }

            console.log('🎙️ VipChat - غرف الدردشة الصوتية جاهزة!');
            console.log('📌 الأزرار العائمة:');
            console.log('   🏠+ زر إنشاء غرفة (أسفل اليسار)');
            console.log('   🎧 زر الدعم الفني (أسفل اليمين)');
        };

        async function updateNotifBadge() {
            try {
                currentUser = getCurrentUser();
                if (!currentUser || !currentUser.numericId) {
                    document.getElementById('notifBadge').style.display = 'none';
                    return;
                }

                const usersRef = database.ref('users');
                const snapshot = await usersRef.orderByChild('numericId').equalTo(currentUser.numericId).once('value');

                if (!snapshot.exists()) {
                    document.getElementById('notifBadge').style.display = 'none';
                    return;
                }

                const userData = snapshot.val();
                const userId = Object.keys(userData)[0];
                const notifRef = database.ref('users/' + userId + '/notifications');
                const notifSnapshot = await notifRef.once('value');

                if (!notifSnapshot.exists()) {
                    document.getElementById('notifBadge').style.display = 'none';
                    return;
                }

                let unreadCount = 0;
                notifSnapshot.forEach(child => {
                    if (!child.val().read) unreadCount++;
                });

                const badge = document.getElementById('notifBadge');
                if (unreadCount > 0) {
                    badge.textContent = unreadCount;
                    badge.style.display = 'block';
                } else {
                    badge.style.display = 'none';
                }

            } catch (error) {
                console.error('Error updating badge:', error);
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal.active').forEach(modal => {
                    modal.classList.remove('active');
                });
            }
        });
    </script>
</body>
