<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ لوحة تحكم الأدمن - VipChat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    
    <style>
        /* ===== نفس الستايلات السابقة مع تحسينات ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0a1a;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid #333;
            flex-wrap: wrap;
            gap: 15px;
        }

        .admin-header h1 {
            color: #ffd700;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
        }

        .admin-header .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .admin-header .back-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
        }

        .admin-header .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .admin-header .back-btn.backup {
            background: #8b5cf6;
        }
        .admin-header .back-btn.backup:hover {
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }
        .admin-header .back-btn.chat {
            background: #10b981;
        }
        .admin-header .back-btn.chat:hover {
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
        }
        .admin-header .back-btn.home {
            background: #3b82f6;
        }
        .admin-header .back-btn.home:hover {
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4);
        }

        .admin-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .admin-tabs .tab-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            background: #1e293b;
            color: #aaa;
        }

        .admin-tabs .tab-btn:hover {
            background: #334155;
            color: #fff;
        }

        .admin-tabs .tab-btn.active {
            background: #8b5cf6;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .search-section {
            background: #111827;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #1e293b;
        }

        .search-section .search-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-section input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 10px;
            border: 2px solid #1e293b;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            min-width: 200px;
        }

        .search-section input:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        .search-section button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .search-section button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }

        .search-section button.btn-reset {
            background: #10b981;
        }

        .search-section button.btn-reset:hover {
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
        }

        .results-container {
            background: #111827;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #1e293b;
            min-height: 200px;
        }

        .results-container .placeholder {
            text-align: center;
            padding: 50px 20px;
            color: #666;
        }

        .results-container .placeholder i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #333;
        }

        .user-card {
            background: #0f172a;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid #1e293b;
            transition: 0.3s;
        }

        .user-card:hover {
            border-color: #8b5cf6;
            box-shadow: 0 5px 25px rgba(139, 92, 246, 0.1);
        }

        .user-card .user-header {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .user-card .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(135deg, #4f46e5, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
            flex-shrink: 0;
            cursor: pointer;
            transition: 0.3s;
        }

        .user-card .user-avatar:hover {
            transform: scale(1.05);
        }

        .user-card .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-card .user-info {
            flex: 1;
            min-width: 150px;
        }

        .user-card .user-info .name {
            font-weight: bold;
            font-size: 1.05rem;
            color: #fff;
        }

        .user-card .user-info .id {
            font-size: 0.8rem;
            color: #888;
            font-family: monospace;
        }

        .user-card .user-info .bio {
            font-size: 0.8rem;
            color: #666;
            margin-top: 3px;
        }

        .user-card .user-badges {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin: 8px 0;
        }

        .user-card .user-badges .badge-tag {
            background: linear-gradient(135deg, #4f46e5, #8b5cf6);
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
        }

        .user-card .user-status {
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: bold;
        }

        .user-card .user-status.active {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .user-card .user-status.banned {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .user-card .user-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .user-card .user-actions button {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: 0.3s;
            color: white;
        }

        .user-card .user-actions .btn-edit {
            background: #8b5cf6;
        }

        .user-card .user-actions .btn-edit:hover {
            background: #7c3aed;
            transform: translateY(-2px);
        }

        .user-card .user-actions .btn-ban {
            background: #ef4444;
        }

        .user-card .user-actions .btn-ban:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .user-card .user-actions .btn-unban {
            background: #10b981;
        }

        .user-card .user-actions .btn-unban:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .user-card .user-actions .btn-view {
            background: #3b82f6;
        }

        .user-card .user-actions .btn-view:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .user-card .user-actions .btn-gift {
            background: #f59e0b;
        }

        .user-card .user-actions .btn-gift:hover {
            background: #d97706;
            transform: translateY(-2px);
        }

        /* ===== User Detail View ===== */
        .user-detail-view {
            background: #0f172a;
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
            border: 1px solid #1e293b;
        }

        .user-detail-view .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #1e293b;
            flex-wrap: wrap;
            gap: 5px;
        }

        .user-detail-view .detail-row .label {
            color: #888;
            font-size: 0.85rem;
        }

        .user-detail-view .detail-row .value {
            color: #fff;
            font-weight: 500;
        }

        .user-detail-view .detail-row .value .edit-input {
            background: #0f172a;
            border: 2px solid #1e293b;
            border-radius: 6px;
            color: white;
            padding: 4px 8px;
            font-size: 0.85rem;
            width: 100%;
            max-width: 200px;
        }

        .user-detail-view .detail-row .value .edit-input:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        .user-detail-view .detail-row .value .save-btn {
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 0.75rem;
            margin-right: 5px;
        }

        .user-detail-view .detail-row .value .save-btn:hover {
            background: #059669;
        }

        .user-detail-view .gifts-list {
            margin-top: 15px;
            border-top: 1px solid #1e293b;
            padding-top: 15px;
        }

        .user-detail-view .gifts-list .gift-item-admin {
            background: rgba(255,255,255,0.03);
            border: 1px solid #1e293b;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .user-detail-view .gifts-list .gift-item-admin .gift-info {
            flex: 1;
            min-width: 150px;
        }

        .user-detail-view .gifts-list .gift-item-admin .gift-info .sender {
            color: #fff;
            font-weight: bold;
        }

        .user-detail-view .gifts-list .gift-item-admin .gift-info .sender-id {
            color: #666;
            font-size: 0.7rem;
        }

        .user-detail-view .gifts-list .gift-item-admin .gift-info .details {
            color: #888;
            font-size: 0.8rem;
        }

        .user-detail-view .gifts-list .gift-item-admin .gift-actions {
            display: flex;
            gap: 5px;
        }

        .user-detail-view .gifts-list .gift-item-admin .gift-actions button {
            padding: 4px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.3s;
            color: white;
        }

        .user-detail-view .gifts-list .gift-item-admin .gift-actions .btn-delete-gift {
            background: #ef4444;
        }

        .user-detail-view .gifts-list .gift-item-admin .gift-actions .btn-delete-gift:hover {
            background: #dc2626;
        }

        .user-detail-view .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .user-detail-view .posts-grid .post-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1;
        }

        .user-detail-view .posts-grid .post-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-detail-view .posts-grid .post-item .delete-post {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(239, 68, 68, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.3s;
        }

        .user-detail-view .posts-grid .post-item .delete-post:hover {
            background: #ef4444;
            transform: scale(1.1);
        }

        .user-detail-view .change-avatar-btn {
            background: #8b5cf6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.3s;
        }

        .user-detail-view .change-avatar-btn:hover {
            background: #7c3aed;
            transform: translateY(-2px);
        }

        .user-detail-view .close-detail-btn {
            padding: 8px 16px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        .user-detail-view .close-detail-btn:hover {
            background: #444;
        }

        /* ===== Report Card ===== */
        .report-card {
            background: #0f172a;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid #1e293b;
            transition: 0.3s;
        }

        .report-card:hover {
            border-color: #f59e0b;
        }

        .report-card .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .report-card .report-id {
            color: #ffd700;
            font-weight: bold;
            font-family: monospace;
        }

        .report-card .report-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .report-card .report-status.pending {
            background: #f59e0b;
            color: white;
        }

        .report-card .report-status.investigating {
            background: #3b82f6;
            color: white;
        }

        .report-card .report-status.resolved {
            background: #10b981;
            color: white;
        }

        .report-card .report-status.closed {
            background: #6b7280;
            color: white;
        }

        .report-card .report-details {
            margin: 10px 0;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }

        .report-card .report-details .detail-row {
            display: flex;
            gap: 10px;
            padding: 3px 0;
            flex-wrap: wrap;
        }

        .report-card .report-details .detail-row .label {
            color: #888;
            font-size: 0.8rem;
            min-width: 100px;
        }

        .report-card .report-details .detail-row .value {
            color: #ddd;
            font-size: 0.85rem;
        }

        .report-card .report-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .report-card .report-actions button {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            transition: 0.3s;
            color: white;
        }

        .report-card .report-actions .btn-investigate {
            background: #3b82f6;
        }

        .report-card .report-actions .btn-investigate:hover {
            background: #2563eb;
        }

        .report-card .report-actions .btn-resolve {
            background: #10b981;
        }

        .report-card .report-actions .btn-resolve:hover {
            background: #059669;
        }

        .report-card .report-actions .btn-close {
            background: #6b7280;
        }

        .report-card .report-actions .btn-close:hover {
            background: #4b5563;
        }

        .report-card .report-actions .btn-delete {
            background: #ef4444;
        }

        .report-card .report-actions .btn-delete:hover {
            background: #dc2626;
        }

        /* ===== Cancelled Gift Card ===== */
        .cancelled-gift-card {
            background: #0f172a;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #1e293b;
            transition: 0.3s;
        }

        .cancelled-gift-card:hover {
            border-color: #ef4444;
        }

        .cancelled-gift-card .gift-info {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .cancelled-gift-card .gift-info .gift-sender {
            color: #fff;
            font-weight: bold;
        }

        .cancelled-gift-card .gift-info .gift-receiver {
            color: #60a5fa;
        }

        .cancelled-gift-card .gift-info .gift-value {
            color: #f59e0b;
            font-weight: bold;
        }

        .cancelled-gift-card .gift-details {
            color: #888;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        .cancelled-gift-card .cancellation-reason {
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(239,68,68,0.1);
            border-radius: 6px;
            border-right: 3px solid #ef4444;
            color: #fca5a5;
            font-size: 0.85rem;
        }

        /* ===== Modals ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(8px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            border: 1px solid #333;
        }

        .modal-content h2 {
            color: #ffd700;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-content .form-group {
            margin-bottom: 15px;
        }

        .modal-content .form-group label {
            display: block;
            color: #aaa;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .modal-content .form-group input,
        .modal-content .form-group textarea,
        .modal-content .form-group select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 2px solid #1e293b;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            font-family: inherit;
        }

        .modal-content .form-group input:focus,
        .modal-content .form-group textarea:focus,
        .modal-content .form-group select:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        .modal-content .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }

        .modal-actions .btn-confirm {
            background: #8b5cf6;
        }

        .modal-actions .btn-confirm:hover {
            background: #7c3aed;
        }

        .modal-actions .btn-confirm-danger {
            background: #ef4444;
        }

        .modal-actions .btn-confirm-danger:hover {
            background: #dc2626;
        }

        .modal-actions .btn-confirm-success {
            background: #10b981;
        }

        .modal-actions .btn-confirm-success:hover {
            background: #059669;
        }

        .modal-actions .btn-cancel {
            background: #333;
        }

        .modal-actions .btn-cancel:hover {
            background: #444;
        }

        /* ===== Empty State ===== */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #666;
        }

        .empty-state i {
            font-size: 3rem;
            color: #333;
            margin-bottom: 15px;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            z-index: 9999;
            animation: slideDown 0.3s ease;
            max-width: 90vw;
        }

        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        .toast.warning { background: #f59e0b; }
        .toast.info { background: #3b82f6; }

        @keyframes slideDown {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .admin-header h1 {
                font-size: 1.2rem;
            }

            .admin-tabs {
                width: 100%;
            }

            .admin-tabs .tab-btn {
                flex: 1;
                text-align: center;
                font-size: 0.8rem;
                padding: 8px 12px;
            }

            .admin-header .header-actions {
                width: 100%;
            }

            .admin-header .back-btn {
                flex: 1;
                text-align: center;
                justify-content: center;
                font-size: 0.8rem;
                padding: 8px 12px;
            }

            .search-section .search-row {
                flex-direction: column;
            }

            .search-section input {
                min-width: unset;
            }

            .user-card .user-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .user-card .user-actions {
                flex-direction: column;
                width: 100%;
            }

            .user-card .user-actions button {
                width: 100%;
                text-align: center;
            }

            .modal-content {
                padding: 20px;
            }

            .user-detail-view .detail-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .user-detail-view .detail-row .value .edit-input {
                max-width: 100%;
            }

        // ============================================================

            const tabMap = {
                'users': 'tabUsersContent',
                'reports': 'tabReportsContent',
                'cancelled': 'tabCancelledContent'
            };
            
            document.getElementById(tabMap[tab]).classList.add('active');
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
            
            if (tab === 'reports') loadReports();
            if (tab === 'cancelled') loadCancelledGifts();

        // ============================================================
        // 🔍 USER SEARCH
        // ============================================================
        async function adminSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const container = document.getElementById('resultsContainer');

            try {
                const usersRef = database.ref('users');
                let results = [];

                if (!query) {
                    const snapshot = await usersRef.once('value');
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        for (const key in data) {
                            results.push({ id: key, ...data[key] });
                        }
                    }
                } else {
                    // البحث بالـ numericId
                    if (!isNaN(query)) {
                        const snapshot = await usersRef.orderByChild('numericId').equalTo(parseInt(query)).once('value');
                        if (snapshot.exists()) {
                            const data = snapshot.val();
                            for (const key in data) {
                                results.push({ id: key, ...data[key] });
                            }
                        }
                    }
                    
                    // البحث باسم المستخدم
                    const usernameSnapshot = await usersRef.orderByChild('username').equalTo(query).once('value');
                    if (usernameSnapshot.exists()) {
                        const data = usernameSnapshot.val();
                        for (const key in data) {
                            if (!results.find(u => u.id === key)) {
                                results.push({ id: key, ...data[key] });
                            }
                        }
                    }

                    // البحث بالاسم المستعار
                    const nicknameSnapshot = await usersRef.orderByChild('nickname').equalTo(query).once('value');
                    if (nicknameSnapshot.exists()) {
                        const data = nicknameSnapshot.val();
                        for (const key in data) {
                            if (!results.find(u => u.id === key)) {
                                results.push({ id: key, ...data[key] });
                            }
                        }
                    }
                }

                currentResults = results;

                if (results.length === 0) {
                    container.innerHTML = `
                        <div class="placeholder">
                            <i class="fas fa-user-slash"></i>
                            <p>لم يتم العثور على مستخدمين</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = results.map(user => {
                    const isBanned = user.isBanned === true;
                    return `
                    <div class="user-card">
                        <div class="user-header">
                            <div class="user-avatar" onclick="viewUserDetails('${user.id}')">
                                ${user.avatar ? `<img src="${user.avatar}" alt="">` : user.nickname ? user.nickname.charAt(0).toUpperCase() : '👤'}

                            <div class="user-info">

                        </div>
                        <div class="user-badges">
                            ${(user.badges || []).map(b => `<span class="badge-tag">${b}</span>`).join('')}
                        </div>
                        <div class="user-actions">
                            <button class="btn-edit" onclick="openBadgeModal('${user.id}')">
                                <i class="fas fa-tag"></i> لقب
                            </button>
                            ${isBanned ? 
                                `<button class="btn-unban" onclick="openUnbanModal('${user.id}')">
                                    <i class="fas fa-unlock"></i> فك حظر
                                </button>` :
                                `<button class="btn-ban" onclick="openBanModal('${user.id}')">
                                    <i class="fas fa-ban"></i> حظر
                                </button>`
                            }
                            <button class="btn-view" onclick="viewUserDetails('${user.id}')">
                                <i class="fas fa-eye"></i> عرض
                            </button>
                            <button class="btn-gift" onclick="openGiftModal('${user.id}')">
                                <i class="fas fa-gift"></i> هدية
                            </button>
                        </div>
                        <div id="detail_${user.id}"></div>
                    </div>
                `}).join('');

            } catch (error) {
                console.error('Search error:', error);
                container.innerHTML = `
                    <div class="placeholder">
                        <i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i>
                        <p>حدث خطأ في البحث</p>
                    </div>

        }

        // ============================================================

        // ============================================================

                        <div class="detail-row">

                                <input class="edit-input" id="edit_bio_input_${userId}" value="${user.bio || ''}" style="display:none;">
                                <button class="save-btn" onclick="editField('${userId}', 'bio', 'edit_bio_${userId}', 'edit_bio_input_${userId}')">تعديل</button>

        // ============================================================
        // ✏️ EDIT FIELD
        // ============================================================
        function editField(userId, field, displayId, inputId) {
            const display = document.getElementById(displayId);
            const input = document.getElementById(inputId);
            
            if (input.style.display === 'none') {
                display.style.display = 'none';
                input.style.display = 'inline-block';
                input.focus();
                const btn = display.parentElement.querySelector('.save-btn');
                btn.textContent = 'حفظ';
                btn.style.background = '#10b981';
            } else {
                const newValue = input.value.trim();
                if (!newValue && field !== 'bio' && field !== 'balanceEGP' && field !== 'balanceUSD' && field !== 'numericId') {
                    showToast('⚠️ لا يمكن ترك هذا الحقل فارغاً', 'warning');
                    return;
                }

                const updateData = {};
                if (field === 'numericId') {
                    updateData[field] = parseInt(newValue);
                } else if (field === 'balanceEGP' || field === 'balanceUSD') {
                    updateData[field] = parseFloat(newValue) || 0;
                } else {
                    updateData[field] = newValue;
                }

                database.ref('users/' + userId).update(updateData).then(() => {
                    display.textContent = newValue;
                    display.style.display = 'inline';
                    input.style.display = 'none';
                    const btn = display.parentElement.querySelector('.save-btn');
                    btn.textContent = 'تعديل';
                    btn.style.background = '#10b981';
                    showToast('✅ تم التحديث بنجاح', 'success');
                }).catch(error => {
                    console.error('Error updating:', error);
                    showToast('❌ حدث خطأ', 'error');
                });
            }
        }

        // ============================================================
        // 📸 CHANGE AVATAR
        // ============================================================
        function openAvatarModal(userId) {
            selectedUserId = userId;
            document.getElementById('avatarFileInput').value = '';
            document.getElementById('avatarModal').classList.add('active');
        }

        async function confirmChangeAvatar() {
            const fileInput = document.getElementById('avatarFileInput');
            const file = fileInput.files[0];
            if (!file) {
                showToast('⚠️ يرجى اختيار صورة', 'warning');
                return;
            }

            if (!file.type.startsWith('image/')) {
                showToast('❌ يرجى اختيار صورة صالحة', 'error');
                return;
            }

            if (file.size > 5 * 1024 * 1024) {
                showToast('❌ حجم الصورة كبير جداً (حد أقصى 5 ميجابايت)', 'error');
                return;
            }

            try {
                showToast('⏳ جاري رفع الصورة...', 'info');
                closeModal('avatarModal');

                const storageRef = storage.ref('avatars/' + selectedUserId + '/' + Date.now() + '.jpg');
                const uploadTask = await storageRef.put(file);
                const downloadURL = await uploadTask.ref.getDownloadURL();

                await database.ref('users/' + selectedUserId).update({
                    avatar: downloadURL
                });

                showToast('✅ تم تغيير الصورة الشخصية بنجاح', 'success');
                adminSearch();

            } catch (error) {
                console.error('Error uploading avatar:', error);
                showToast('❌ حدث خطأ في رفع الصورة', 'error');
            }
        }

        // ============================================================
        // 👑 BADGE MANAGEMENT
        // ============================================================
        function openBadgeModal(userId) {
            selectedUserId = userId;
            document.getElementById('badgeInput').value = '';
            document.getElementById('badgeModal').classList.add('active');
        }

        async function confirmAddBadge() {
            const badge = document.getElementById('badgeInput').value.trim();
            if (!badge) {
                showToast('⚠️ يرجى إدخال لقب', 'warning');
                return;
            }

            try {
                const snapshot = await database.ref('users/' + selectedUserId).once('value');
                const user = snapshot.val();
                if (!user) {
                    showToast('❌ المستخدم غير موجود', 'error');
                    return;
                }

                const currentBadges = user.badges || [];
                if (currentBadges.includes(badge)) {
                    showToast('⚠️ هذا اللقب موجود بالفعل', 'warning');
                    return;
                }

                currentBadges.push(badge);
                await database.ref('users/' + selectedUserId).update({ badges: currentBadges });

                // إرسال إشعار للمستخدم
                await sendNotificationToUser(
                    user.numericId,
                    '👑 لقب جديد',
                    `تم إضافة لقب "${badge}" إلى حسابك`
                );
                
                showToast('✅ تم إضافة اللقب بنجاح', 'success');
                closeModal('badgeModal');
                adminSearch();

            } catch (error) {
                console.error('Error adding badge:', error);
                showToast('❌ حدث خطأ', 'error');
            }
        }

        // ============================================================
        // 🚫 BAN / UNBAN MANAGEMENT
        // ============================================================
        function openBanModal(userId) {
            selectedUserId = userId;
            document.getElementById('banReasonInput').value = '';
            document.getElementById('banModal').classList.add('active');
        }

        async function confirmBan() {
            const reason = document.getElementById('banReasonInput').value.trim() || 'غير محدد';

            try {
                const snapshot = await database.ref('users/' + selectedUserId).once('value');
                const user = snapshot.val();
                if (!user) {
                    showToast('❌ المستخدم غير موجود', 'error');
                    return;
                }

                await database.ref('users/' + selectedUserId).update({
                    isBanned: true,
                    banReason: reason,
                    banDate: new Date().toISOString()
                });

                // إرسال إشعار للمستخدم
                await sendNotificationToUser(
                    user.numericId,
                    '🚫 تم حظر حسابك',
                    `السبب: ${reason}`
                );
                
                showToast('✅ تم حظر المستخدم بنجاح', 'success');
                closeModal('banModal');
                adminSearch();

            } catch (error) {
                console.error('Error banning user:', error);
                showToast('❌ حدث خطأ', 'error');
            }
        }

        function openUnbanModal(userId) {
            selectedUserId = userId;
            document.getElementById('unbanModal').classList.add('active');
        }

        async function confirmUnban() {
            try {
                const snapshot = await database.ref('users/' + selectedUserId).once('value');
                const user = snapshot.val();
                if (!user) {
                    showToast('❌ المستخدم غير موجود', 'error');
                    return;
                }

                await database.ref('users/' + selectedUserId).update({
                    isBanned: false,
                    banReason: '',
                    banDate: ''
                });

                // إرسال إشعار للمستخدم
                await sendNotificationToUser(
                    user.numericId,
                    '🔓 تم فك الحظر عن حسابك',
                    'تم إلغاء حظر حسابك، يمكنك استخدام التطبيق الآن'
                );
                
                showToast('✅ تم فك الحظر عن المستخدم', 'success');
                closeModal('unbanModal');
                adminSearch();

            } catch (error) {
                console.error('Error unbanning user:', error);
                showToast('❌ حدث خطأ', 'error');
            }
        }

        // ============================================================
        // 🎁 GIFT MANAGEMENT
        // ============================================================
        function openGiftModal(userId) {
            selectedUserId = userId;
            document.getElementById('giftValueInput').value = '';
            document.getElementById('giftReasonInput').value = '';
            document.getElementById('giftModal').classList.add('active');
        }

        async function confirmSendGift() {
            const value = parseInt(document.getElementById('giftValueInput').value);
            const reason = document.getElementById('giftReasonInput').value.trim() || 'هدية من الإدارة';

            if (!value || value <= 0) {
                showToast('⚠️ يرجى إدخال قيمة صحيحة للهدية', 'warning');
                return;
            }

            try {
                const snapshot = await database.ref('users/' + selectedUserId).once('value');
                const user = snapshot.val();
                if (!user) {
                    showToast('❌ المستخدم غير موجود', 'error');
                    return;
                }

                const giftsList = user.giftsList || [];

                giftsList.push({
                    senderId: '1',
                    senderName: 'الإدارة',
                    senderAvatar: '',
                    value: value,
                    reason: reason,
                    date: new Date().toLocaleString('ar-EG'),
                    timestamp: new Date().toISOString()
                });

                await database.ref('users/' + selectedUserId).update({
                    giftsList: giftsList,
                    gifts: (user.gifts || 0) + 1
                });

                // إرسال إشعار للمستخدم
                await sendNotificationToUser(
                    user.numericId,
                    '🎁 هدية جديدة',
                    `تم إرسال هدية بقيمة ${value} من الإدارة${reason ? ` (${reason})` : ''}`
                );

                showToast('✅ تم إرسال الهدية بنجاح', 'success');
                closeModal('giftModal');
                adminSearch();

            } catch (error) {
                console.error('Error sending gift:', error);
                showToast('❌ حدث خطأ في إرسال الهدية', 'error');
            }
        }

        // ============================================================
        // ❌ CANCEL GIFT
        // ============================================================
        function openCancelGiftModal(userId, index) {
            selectedUserId = userId;
            selectedGiftIndex = index;
            document.getElementById('cancelReasonInput').value = '';
            document.getElementById('cancelGiftModal').classList.add('active');
        }

        async function confirmCancelGift() {
            const reason = document.getElementById('cancelReasonInput').value.trim() || 'تم الإلغاء من قبل الإدارة';

            try {
                const snapshot = await database.ref('users/' + selectedUserId).once('value');
                const user = snapshot.val();
                if (!user) return;

                const giftsList = user.giftsList || [];
                if (selectedGiftIndex >= giftsList.length) return;

                const cancelledGift = giftsList[selectedGiftIndex];

                // تسجيل الهدية الملغاة
                await database.ref('cancelled_gifts').push({
                    gift: cancelledGift,
                    userId: selectedUserId,
                    userName: user.nickname || user.username,
                    userNumericId: user.numericId,
                    cancellationReason: reason,
                    cancelledAt: new Date().toISOString(),
                    cancelledDate: new Date().toLocaleString('ar-EG')
                });

                // حذف الهدية من قائمة المستخدم
                giftsList.splice(selectedGiftIndex, 1);
                await database.ref('users/' + selectedUserId).update({
                    giftsList: giftsList,
                    gifts: giftsList.length
                });

                // إرسال إشعار للمستخدم
                await sendNotificationToUser(
                    user.numericId,
                    '❌ تم إلغاء هدية',
                    `تم إلغاء هدية بقيمة ${cancelledGift.value || 0}\nالسبب: ${reason}`
                );

                showToast('✅ تم إلغاء الهدية وتسجيلها', 'success');
                closeModal('cancelGiftModal');
                viewUserDetails(selectedUserId);
                loadCancelledGifts();

            } catch (error) {
                console.error('Error cancelling gift:', error);
                showToast('❌ حدث خطأ في إلغاء الهدية', 'error');
            }
        }

        // ============================================================
        // 🔔 SEND NOTIFICATION TO USER
        // ============================================================
        async function sendNotificationToUser(userId, title, message) {
            try {
                if (!userId) return;
                
                const snapshot = await database.ref('users').orderByChild('numericId').equalTo(parseInt(userId)).once('value');
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const key = Object.keys(data)[0];
                    await database.ref('users/' + key + '/notifications').push({
                        text: `${title}\n${message}`,
                        date: new Date().toLocaleString('ar-EG'),
                        read: false,
                        type: 'admin'
                    });
                }
            } catch (error) {
                console.error('Error sending notification:', error);
            }
        }

        // ============================================================
        // 📋 LOAD REPORTS
        // ============================================================
        async function loadReports() {
            const container = document.getElementById('reportsContainer');

            try {
                const snapshot = await database.ref('reports').once('value');

                if (!snapshot.exists()) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-flag"></i>
                            <p>لا توجد بلاغات</p>
                        </div>
                    `;
                    return;
                }

                const data = snapshot.val();
                const reports = Object.entries(data).map(([key, value]) => ({ id: key, ...value })).reverse();

                container.innerHTML = reports.map(report => `
                    <div class="report-card">
                        <div class="report-header">
                            <span class="report-id">📋 بلاغ #${report.id.slice(0, 8)}</span>
                            <span class="report-status ${report.status === 'قيد المراجعة' ? 'pending' : report.status === 'قيد التحقيق' ? 'investigating' : report.status === 'تم الحل' ? 'resolved' : 'closed'}">
                                ${report.status || 'قيد المراجعة'}
                            </span>
                        </div>
                        <div class="report-details">
                            <div class="detail-row">
                                <span class="label">👤 المبلغ:</span>
                                <span class="value">${report.reporterName || 'غير معروف'} (🆔 ${report.reporterId || '---'})</span>
                            </div>
                            <div class="detail-row">
                                <span class="label">📌 النوع:</span>
                                <span class="value">${report.type || 'غير محدد'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="label">📝 الوصف:</span>
                                <span class="value">${report.description || 'لا يوجد وصف'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="label">📅 التاريخ:</span>
                                <span class="value">${report.reportedAt ? new Date(report.reportedAt).toLocaleString('ar-EG') : '---'}</span>
                            </div>
                        </div>
                        <div class="report-actions">
                            <button class="btn-investigate" onclick="updateReportStatus('${report.id}', 'قيد التحقيق')">
                                <i class="fas fa-search"></i> قيد التحقيق
                            </button>
                            <button class="btn-resolve" onclick="updateReportStatus('${report.id}', 'تم الحل')">
                                <i class="fas fa-check"></i> تم الحل
                            </button>
                            <button class="btn-close" onclick="updateReportStatus('${report.id}', 'مغلق')">
                                <i class="fas fa-times"></i> إغلاق
                            </button>
                            <button class="btn-delete" onclick="deleteReport('${report.id}')">
                                <i class="fas fa-trash"></i> حذف
                            </button>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Error loading reports:', error);
                container.innerHTML = `
                    <div class="placeholder">
                        <i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i>
                        <p>حدث خطأ في تحميل البلاغات</p>
                    </div>
                `;
            }
        }

        // ============================================================
        // 📝 UPDATE REPORT STATUS
        // ============================================================
        async function updateReportStatus(reportId, status) {
            try {
                await database.ref('reports/' + reportId).update({
                    status: status,
                    updatedAt: new Date().toISOString()
                });
                showToast(`✅ تم تحديث حالة البلاغ إلى: ${status}`, 'success');
                loadReports();
            } catch (error) {
                console.error('Error updating report:', error);
                showToast('❌ حدث خطأ في تحديث البلاغ', 'error');
            }
        }

        // ============================================================
        // 🗑️ DELETE REPORT
        // ============================================================
        async function deleteReport(reportId) {
            if (!confirm('⚠️ هل أنت متأكد من حذف هذا البلاغ نهائياً؟')) return;

            try {
                await database.ref('reports/' + reportId).remove();
                showToast('✅ تم حذف البلاغ', 'success');
                loadReports();
            } catch (error) {
                console.error('Error deleting report:', error);
                showToast('❌ حدث خطأ في حذف البلاغ', 'error');
            }
        }

        // ============================================================
        // 📋 LOAD CANCELLED GIFTS
        // ============================================================
        async function loadCancelledGifts() {
            const container = document.getElementById('cancelledGiftsContainer');

            try {
                const snapshot = await database.ref('cancelled_gifts').once('value');

                if (!snapshot.exists()) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-gift"></i>
                            <p>لا توجد هدايا ملغاة</p>
                        </div>
                    `;
                    return;
                }

                const data = snapshot.val();
                const gifts = Object.values(data).reverse();

                container.innerHTML = gifts.map(g => `
                    <div class="cancelled-gift-card">
                        <div class="gift-info">
                            <div>
                                <span class="gift-sender">${g.gift.senderName || 'غير معروف'}</span>
                                <span style="color:#666; font-size:0.8rem;">→</span>
                                <span class="gift-receiver">${g.userName || 'مستخدم'}</span>
                                <span style="color:#666; font-size:0.7rem;">🆔 ${g.userNumericId || '---'}</span>
                            </div>
                            <span class="gift-value">💰 ${g.gift.value || 0}</span>
                        </div>
                        <div class="gift-details">
                            📅 الإلغاء: ${g.cancelledDate || new Date().toLocaleString('ar-EG')}
                            ${g.gift.reason ? ` | 📝 سبب الإرسال: ${g.gift.reason}` : ''}
                        </div>
                        <div class="cancellation-reason">
                            ❌ سبب الإلغاء: ${g.cancellationReason || 'غير محدد'}
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Error loading cancelled gifts:', error);
                container.innerHTML = `
                    <div class="placeholder">
                        <i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i>
                        <p>حدث خطأ في تحميل الهدايا الملغاة</p>
                    </div>
                `;
            }
        }

        // ============================================================
        // 🗑️ DELETE POST
        // ============================================================
        async function deletePost(postId, userId) {
            if (!confirm('⚠️ هل أنت متأكد من حذف هذه الصورة؟')) return;

            try {
                await database.ref('posts/' + postId).remove();
                showToast('✅ تم حذف الصورة', 'success');
                viewUserDetails(userId);
            } catch (error) {
                console.error('Error:', error);
                showToast('❌ حدث خطأ', 'error');
            }
        }

        // ============================================================
        // 📝 CLOSE USER DETAIL
        // ============================================================
        function closeUserDetail(userId) {
            document.getElementById('detail_' + userId).innerHTML = '';
        }

        // ============================================================
        // 🖥️ MODAL FUNCTIONS
        // ============================================================
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });
        });

        // ============================================================
        // 🔔 TOAST
        // ============================================================
        function showToast(message, type = 'info') {
            // Remove existing toasts
            document.querySelectorAll('.toast').forEach(t => t.remove());
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(50px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // ============================================================
        // 🚀 INIT
        // ============================================================
        window.onload = function() {
            console.log('🛡️ Admin Panel loaded - Connected to stvipclub');
            adminSearch();
            loadReports();
            loadCancelledGifts();
        };
    </script>
</body>
</html>
