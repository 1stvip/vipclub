<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ لوحة تحكم الأدمن - VipChat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0a1a;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid #333;
            flex-wrap: wrap;
            gap: 15px;
        }

        .admin-header h1 {
            color: #ffd700;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
        }

        .admin-header .back-btn {
            padding: 10px 20px;
            background: #8b5cf6;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .admin-header .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }

        .search-section {
            background: #111827;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #1e293b;
        }

        .search-section .search-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-section input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 10px;
            border: 2px solid #1e293b;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            min-width: 200px;
        }

        .search-section input:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        .search-section button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .search-section button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }

        .results-container {
            background: #111827;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #1e293b;
            min-height: 200px;
        }

        .results-container .placeholder {
            text-align: center;
            padding: 50px 20px;
            color: #666;
        }

        .results-container .placeholder i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #333;
        }

        .user-card {
            background: #0f172a;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid #1e293b;
            transition: 0.3s;
        }

        .user-card:hover {
            border-color: #8b5cf6;
            box-shadow: 0 5px 25px rgba(139, 92, 246, 0.1);
        }

        .user-card .user-header {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .user-card .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(135deg, #4f46e5, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
            flex-shrink: 0;
            cursor: pointer;
            transition: 0.3s;
        }

        .user-card .user-avatar:hover {
            transform: scale(1.05);
        }

        .user-card .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-card .user-info {
            flex: 1;
            min-width: 150px;
        }

        .user-card .user-info .name {
            font-weight: bold;
            font-size: 1.05rem;
            color: #fff;
        }

        .user-card .user-info .id {
            font-size: 0.8rem;
            color: #888;
            font-family: monospace;
        }

        .user-card .user-info .bio {
            font-size: 0.8rem;
            color: #666;
            margin-top: 3px;
        }

        .user-card .user-badges {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin: 8px 0;
        }

        .user-card .user-badges .badge-tag {
            background: linear-gradient(135deg, #4f46e5, #8b5cf6);
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
        }

        .user-card .user-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .user-card .user-actions button {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .user-card .user-actions .btn-edit {
            background: #8b5cf6;
            color: white;
        }

        .user-card .user-actions .btn-edit:hover {
            background: #7c3aed;
            transform: translateY(-2px);
        }

        .user-card .user-actions .btn-ban {
            background: #ef4444;
            color: white;
        }

        .user-card .user-actions .btn-ban:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .user-card .user-actions .btn-view {
            background: #10b981;
            color: white;
        }

        .user-card .user-actions .btn-view:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .user-card .user-actions .btn-gift {
            background: #f59e0b;
            color: white;
        }

        .user-card .user-actions .btn-gift:hover {
            background: #d97706;
            transform: translateY(-2px);
        }

        .user-card .user-actions .btn-delete-likes {
            background: #ef4444;
            color: white;
        }

        .user-card .user-actions .btn-delete-likes:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .user-card .user-actions .btn-delete-gifts {
            background: #8b5cf6;
            color: white;
        }

        .user-card .user-actions .btn-delete-gifts:hover {
            background: #7c3aed;
            transform: translateY(-2px);
        }

        .user-detail-view {
            background: #0f172a;
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
            border: 1px solid #1e293b;
        }

        .user-detail-view .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #1e293b;
            flex-wrap: wrap;
            gap: 5px;
        }

        .user-detail-view .detail-row .label {
            color: #888;
            font-size: 0.85rem;
        }

        .user-detail-view .detail-row .value {
            color: #fff;
            font-weight: 500;
        }

        .user-detail-view .detail-row .value .edit-input {
            background: #0f172a;
            border: 2px solid #1e293b;
            border-radius: 6px;
            color: white;
            padding: 4px 8px;
            font-size: 0.85rem;
            width: 100%;
            max-width: 200px;
        }

        .user-detail-view .detail-row .value .edit-input:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        .user-detail-view .detail-row .value .save-btn {
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 0.75rem;
            margin-right: 5px;
        }

        .user-detail-view .detail-row .value .save-btn:hover {
            background: #059669;
        }

        .user-detail-view .gifts-list {
            margin-top: 15px;
            border-top: 1px solid #1e293b;
            padding-top: 15px;
        }

        .user-detail-view .gifts-list .gift-item-admin {
            background: rgba(255,255,255,0.03);
            border: 1px solid #1e293b;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .user-detail-view .gifts-list .gift-item-admin .gift-info {
            flex: 1;
            min-width: 150px;
        }

        .user-detail-view .gifts-list .gift-item-admin .gift-info .sender {
            color: #fff;
            font-weight: bold;
        }

        .user-detail-view .gifts-list .gift-item-admin .gift-info .sender-id {
            color: #666;
            font-size: 0.7rem;
        }

        .user-detail-view .gifts-list .gift-item-admin .gift-info .details {
            color: #888;
            font-size: 0.8rem;
        }

        .user-detail-view .gifts-list .gift-item-admin .gift-actions {
            display: flex;
            gap: 5px;
        }

        .user-detail-view .gifts-list .gift-item-admin .gift-actions button {
            padding: 4px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.3s;
        }

        .user-detail-view .gifts-list .gift-item-admin .gift-actions .btn-delete-gift {
            background: #ef4444;
            color: white;
        }

        .user-detail-view .gifts-list .gift-item-admin .gift-actions .btn-delete-gift:hover {
            background: #dc2626;
        }

        .user-detail-view .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .user-detail-view .posts-grid .post-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1;
        }

        .user-detail-view .posts-grid .post-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-detail-view .posts-grid .post-item .delete-post {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(239, 68, 68, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.3s;
        }

        .user-detail-view .posts-grid .post-item .delete-post:hover {
            background: #ef4444;
            transform: scale(1.1);
        }

        .user-detail-view .change-avatar-btn {
            background: #8b5cf6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.3s;
        }

        .user-detail-view .change-avatar-btn:hover {
            background: #7c3aed;
            transform: translateY(-2px);
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            z-index: 9999;
            animation: slideDown 0.3s ease;
            max-width: 90vw;
        }

        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        .toast.warning { background: #f59e0b; }
        .toast.info { background: #3b82f6; }

        @keyframes slideDown {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(8px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            border: 1px solid #333;
        }

        .modal-content h2 {
            color: #ffd700;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-content .form-group {
            margin-bottom: 15px;
        }

        .modal-content .form-group label {
            display: block;
            color: #aaa;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .modal-content .form-group input,
        .modal-content .form-group textarea,
        .modal-content .form-group select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 2px solid #1e293b;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            font-family: inherit;
        }

        .modal-content .form-group input:focus,
        .modal-content .form-group textarea:focus,
        .modal-content .form-group select:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        .modal-content .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .modal-actions .btn-confirm {
            background: #8b5cf6;
            color: white;
        }

        .modal-actions .btn-confirm:hover {
            background: #7c3aed;
        }

        .modal-actions .btn-cancel {
            background: #333;
            color: white;
        }

        .modal-actions .btn-cancel:hover {
            background: #444;
        }

        @media (max-width: 768px) {
            .admin-header h1 {
                font-size: 1.2rem;
            }

            .search-section .search-row {
                flex-direction: column;
            }

            .search-section input {
                min-width: unset;
            }

            .user-card .user-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .user-card .user-actions {
                flex-direction: column;
                width: 100%;
            }

            .user-card .user-actions button {
                width: 100%;
                text-align: center;
            }

            .modal-content {
                padding: 20px;
            }

            .user-detail-view .detail-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .user-detail-view .detail-row .value .edit-input {
                max-width: 100%;
            }

            .user-detail-view .gifts-list .gift-item-admin {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <!-- Header -->
        <div class="admin-header">
            <h1><i class="fas fa-shield-alt" style="color:#ef4444;"></i> لوحة تحكم الأدمن</h1>
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-right"></i> العودة للرئيسية
            </a>
        </div>

        <!-- Search -->
        <div class="search-section">
            <div class="search-row">
                <input type="text" id="searchInput" placeholder="🔍 ابحث بالمعرف أو اسم المستخدم..." onkeypress="if(event.key==='Enter') adminSearch()">
                <button onclick="adminSearch()"><i class="fas fa-search"></i> بحث</button>
                <button onclick="adminSearch()" style="background:#10b981;"><i class="fas fa-sync-alt"></i> عرض الكل</button>
            </div>
        </div>

        <!-- Results -->
        <div class="results-container" id="resultsContainer">
            <div class="placeholder">
                <i class="fas fa-user-search"></i>
                <p>ابحث عن مستخدم للبدء في إدارته</p>
                <p style="font-size:0.8rem; color:#444;">يمكنك البحث بالمعرف الرقمي أو اسم المستخدم</p>
            </div>
        </div>
    </div>

    <!-- Modal: إضافة لقب -->
    <div id="badgeModal" class="modal">
        <div class="modal-content">
            <h2>👑 إضافة لقب</h2>
            <div class="form-group">
                <label>اللقب الجديد</label>
                <input type="text" id="badgeInput" placeholder="أدخل اللقب...">
            </div>
            <div class="modal-actions">
                <button class="btn-confirm" onclick="confirmAddBadge()">إضافة</button>
                <button class="btn-cancel" onclick="closeModal('badgeModal')">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- Modal: حظر المستخدم -->
    <div id="banModal" class="modal">
        <div class="modal-content">
            <h2>🚫 حظر المستخدم</h2>
            <div class="form-group">
                <label>سبب الحظر</label>
                <input type="text" id="banReasonInput" placeholder="أدخل سبب الحظر...">
            </div>
            <div class="modal-actions">
                <button class="btn-confirm" onclick="confirmBan()" style="background:#ef4444;">حظر</button>
                <button class="btn-cancel" onclick="closeModal('banModal')">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- Modal: إرسال هدية -->
    <div id="giftModal" class="modal">
        <div class="modal-content">
            <h2>🎁 إرسال هدية</h2>
            <div class="form-group">
                <label>قيمة الهدية</label>
                <input type="number" id="giftValueInput" placeholder="أدخل قيمة الهدية..." min="1">
            </div>
            <div class="form-group">
                <label>سبب الإرسال</label>
                <textarea id="giftReasonInput" placeholder="أدخل سبب إرسال الهدية..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-confirm" onclick="confirmSendGift()" style="background:#f59e0b;">إرسال</button>
                <button class="btn-cancel" onclick="closeModal('giftModal')">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- Modal: تغيير الصورة -->
    <div id="avatarModal" class="modal">
        <div class="modal-content">
            <h2>📸 تغيير الصورة الشخصية</h2>
            <div class="form-group">
                <label>اختر صورة جديدة</label>
                <input type="file" id="avatarFileInput" accept="image/*">
            </div>
            <div class="modal-actions">
                <button class="btn-confirm" onclick="confirmChangeAvatar()" style="background:#10b981;">تغيير</button>
                <button class="btn-cancel" onclick="closeModal('avatarModal')">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 🔥 FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAVSzkDLqi1G-hpfEPqvBMmuyYRfEuaTKk",
            authDomain: "vipclub-1d04a.firebaseapp.com",
            databaseURL: "https://vipclub-1d04a-default-rtdb.firebaseio.com",
            projectId: "vipclub-1d04a",
            storageBucket: "vipclub-1d04a.firebasestorage.app",
            messagingSenderId: "120667552740",
            appId: "1:120667552740:web:02085765fd43eb0080e5f1"
        };

        let database, storage;
        let selectedUserId = null;
        let currentResults = [];

        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            database = firebase.database();
            storage = firebase.storage();
            console.log('✅ Firebase connected');
        } catch (error) {
            console.error('❌ Firebase error:', error);
        }

        // ============================================================
        // 🔍 SEARCH
        // ============================================================
        async function adminSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const container = document.getElementById('resultsContainer');

            try {
                const usersRef = database.ref('users');
                let results = [];

                if (!query) {
                    const snapshot = await usersRef.once('value');
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        for (const key in data) {
                            results.push({ id: key, ...data[key] });
                        }
                    }
                } else {
                    if (!isNaN(query)) {
                        const snapshot = await usersRef.orderByChild('numericId').equalTo(parseInt(query)).once('value');
                        if (snapshot.exists()) {
                            const data = snapshot.val();
                            for (const key in data) {
                                results.push({ id: key, ...data[key] });
                            }
                        }
                    }
                    
                    const usernameSnapshot = await usersRef.orderByChild('username').equalTo(query).once('value');
                    if (usernameSnapshot.exists()) {
                        const data = usernameSnapshot.val();
                        for (const key in data) {
                            if (!results.find(u => u.id === key)) {
                                results.push({ id: key, ...data[key] });
                            }
                        }
                    }

                    const nicknameSnapshot = await usersRef.orderByChild('nickname').equalTo(query).once('value');
                    if (nicknameSnapshot.exists()) {
                        const data = nicknameSnapshot.val();
                        for (const key in data) {
                            if (!results.find(u => u.id === key)) {
                                results.push({ id: key, ...data[key] });
                            }
                        }
                    }
                }

                currentResults = results;

                if (results.length === 0) {
                    container.innerHTML = `
                        <div class="placeholder">
                            <i class="fas fa-user-slash"></i>
                            <p>لم يتم العثور على مستخدمين</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = results.map(user => `
                    <div class="user-card">
                        <div class="user-header">
                            <div class="user-avatar" onclick="viewUserDetails('${user.id}')">
                                ${user.avatar ? `<img src="${user.avatar}" alt="">` : user.nickname ? user.nickname.charAt(0).toUpperCase() : '👤'}
                            </div>
                            <div class="user-info">
                                <div class="name">${user.nickname || user.username || 'مستخدم'} ${user.flag || ''}</div>
                                <div class="id">🆔 ${user.numericId || '---'}</div>
                                <div class="bio">${user.bio || 'لا توجد سيرة ذاتية'}</div>
                            </div>
                            <div style="font-size:0.8rem; color:#666;">
                                ${user.isBanned ? '🚫 محظور' : '✅ نشط'}
                            </div>
                        </div>
                        <div class="user-badges">
                            ${(user.badges || []).map(b => `<span class="badge-tag">${b}</span>`).join('')}
                        </div>
                        <div class="user-actions">
                            <button class="btn-edit" onclick="openBadgeModal('${user.id}')">
                                <i class="fas fa-tag"></i> لقب
                            </button>
                            <button class="btn-ban" onclick="openBanModal('${user.id}')">
                                <i class="fas fa-ban"></i> حظر
                            </button>
                            <button class="btn-view" onclick="viewUserDetails('${user.id}')">
                                <i class="fas fa-eye"></i> عرض
                            </button>
                            <button class="btn-gift" onclick="openGiftModal('${user.id}')">
                                <i class="fas fa-gift"></i> هدية
                            </button>
                            <button class="btn-delete-likes" onclick="deleteUserLikes('${user.id}')">
                                <i class="fas fa-heart-broken"></i> إعجابات
                            </button>
                            <button class="btn-delete-gifts" onclick="deleteUserGifts('${user.id}')">
                                <i class="fas fa-trash"></i> هدايا
                            </button>
                        </div>
                        <div id="detail_${user.id}"></div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Search error:', error);
                container.innerHTML = `
                    <div class="placeholder">
                        <i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i>
                        <p>حدث خطأ في البحث</p>
                    </div>
                `;
            }
        }

        // ============================================================
        // 👁️ VIEW USER DETAILS
        // ============================================================
        async function viewUserDetails(userId) {
            try {
                const snapshot = await database.ref('users/' + userId).once('value');
                const user = snapshot.val();
                if (!user) {
                    showToast('❌ المستخدم غير موجود', 'error');
                    return;
                }

                let posts = [];
                const postsSnapshot = await database.ref('posts').orderByChild('userId').equalTo(user.numericId).once('value');
                if (postsSnapshot.exists()) {
                    const data = postsSnapshot.val();
                    posts = Object.values(data);
                }

                const gifts = user.giftsList || [];
                const totalGifts = gifts.reduce((sum, g) => sum + (g.value || 0), 0);

                const detailDiv = document.getElementById('detail_' + userId);
                detailDiv.innerHTML = `
                    <div class="user-detail-view">
                        <div class="detail-row">
                            <span class="label">🆔 المعرف</span>
                            <span class="value">
                                <span id="edit_id_${userId}">${user.numericId}</span>
                                <input class="edit-input" id="edit_id_input_${userId}" value="${user.numericId}" style="display:none;">
                                <button class="save-btn" onclick="editField('${userId}', 'numericId', 'edit_id_${userId}', 'edit_id_input_${userId}')">تعديل</button>
                            </span>
                        </div>
                        <div class="detail-row">
                            <span class="label">📛 الاسم</span>
                            <span class="value">
                                <span id="edit_name_${userId}">${user.nickname || user.username}</span>
                                <input class="edit-input" id="edit_name_input_${userId}" value="${user.nickname || user.username}" style="display:none;">
                                <button class="save-btn" onclick="editField('${userId}', 'nickname', 'edit_name_${userId}', 'edit_name_input_${userId}')">تعديل</button>
                            </span>
                        </div>
                        <div class="detail-row">
                            <span class="label">📝 السيرة الذاتية</span>
                            <span class="value">
                                <span id="edit_bio_${userId}">${user.bio || 'لا يوجد'}</span>
                                <input class="edit-input" id="edit_bio_input_${userId}" value="${user.bio || ''}" style="display:none;">
                                <button class="save-btn" onclick="editField('${userId}', 'bio', 'edit_bio_${userId}', 'edit_bio_input_${userId}')">تعديل</button>
                            </span>
                        </div>
                        <div class="detail-row">
                            <span class="label">🏷️ الألقاب</span>
                            <span class="value">${(user.badges || []).join(', ') || 'لا يوجد'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="label">📸 الصورة الشخصية</span>
                            <span class="value">
                                <button class="change-avatar-btn" onclick="openAvatarModal('${userId}')">
                                    <i class="fas fa-camera"></i> تغيير الصورة
                                </button>
                            </span>
                        </div>
                        <div class="detail-row">
                            <span class="label">❤️ الإعجابات</span>
                            <span class="value">${user.likes || 0}</span>
                        </div>
                        <div class="detail-row">
                            <span class="label">🎁 الهدايا</span>
                            <span class="value">${user.gifts || 0} (المجموع: ${totalGifts})</span>
                        </div>
                        <div class="detail-row">
                            <span class="label">👁️ الزيارات</span>
                            <span class="value">${user.visits || 0}</span>
                        </div>
                        <div class="detail-row">
                            <span class="label">💰 رصيد EGP</span>
                            <span class="value" style="color:#10b981;">
                                <span id="edit_egp_${userId}">${user.balanceEGP || 0}</span>
                                <input class="edit-input" id="edit_egp_input_${userId}" value="${user.balanceEGP || 0}" style="display:none;">
                                <button class="save-btn" onclick="editField('${userId}', 'balanceEGP', 'edit_egp_${userId}', 'edit_egp_input_${userId}')">تعديل</button>
                            </span>
                        </div>
                        <div class="detail-row">
                            <span class="label">💰 رصيد USD</span>
                            <span class="value" style="color:#60a5fa;">
                                <span id="edit_usd_${userId}">${user.balanceUSD || 0}</span>
                                <input class="edit-input" id="edit_usd_input_${userId}" value="${user.balanceUSD || 0}" style="display:none;">
                                <button class="save-btn" onclick="editField('${userId}', 'balanceUSD', 'edit_usd_${userId}', 'edit_usd_input_${userId}')">تعديل</button>
                            </span>
                        </div>
                        <div class="detail-row">
                            <span class="label">🚫 محظور</span>
                            <span class="value" style="color:${user.isBanned ? '#ef4444' : '#10b981'};">${user.isBanned ? 'نعم' : 'لا'}</span>
                        </div>
                        ${user.banReason ? `
                            <div class="detail-row">
                                <span class="label">سبب الحظر</span>
                                <span class="value" style="color:#ef4444;">${user.banReason}</span>
                            </div>
                        ` : ''}

                        <!-- سجل الهدايا -->
                        <div class="gifts-list">
                            <h4 style="color:#ffd700; margin-bottom:10px;">🎁 سجل الهدايا (${gifts.length})</h4>
                            ${gifts.length === 0 ? '<div style="color:#666; text-align:center;">لا توجد هدايا</div>' : 
                                gifts.map((gift, index) => `
                                    <div class="gift-item-admin">
                                        <div class="gift-info">
                                            <div>
                                                <span class="sender">${gift.senderName || 'غير معروف'}</span>
                                                <span class="sender-id">🆔 ${gift.senderId || '---'}</span>
                                            </div>
                                            <div class="details">
                                                💰 ${gift.value || 0} | 📅 ${gift.date || new Date().toLocaleString('ar-EG')}
                                                ${gift.reason ? `| 📝 ${gift.reason}` : ''}
                                            </div>
                                        </div>
                                        <div class="gift-actions">
                                            <button class="btn-delete-gift" onclick="deleteSingleGift('${userId}', ${index})">
                                                <i class="fas fa-trash"></i> حذف
                                            </button>
                                        </div>
                                    </div>
                                `).join('')
                            }
                        </div>

                        ${posts.length > 0 ? `
                            <div style="margin-top:15px; border-top:1px solid #1e293b; padding-top:15px;">
                                <h4 style="color:#aaa; margin-bottom:10px;">📸 الصور المنشورة (${posts.length})</h4>
                                <div class="posts-grid">
                                    ${posts.map(post => `
                                        <div class="post-item">
                                            <img src="${post.image}" alt="صورة">
                                            <button class="delete-post" onclick="deletePost('${post.id}', '${userId}')" title="حذف الصورة">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                        <div style="margin-top:15px; display:flex; gap:8px; flex-wrap:wrap;">
                            <button onclick="closeUserDetail('${userId}')" style="padding:8px 16px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;">
                                <i class="fas fa-times"></i> إغلاق
                            </button>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error('Error viewing user:', error);
                showToast('❌ حدث خطأ', 'error');
            }
        }

        // ============================================================
        // ✏️ EDIT FIELD
        // ============================================================
        function editField(userId, field, displayId, inputId) {
            const display = document.getElementById(displayId);
            const input = document.getElementById(inputId);
            
            if (input.style.display === 'none') {
                // Show input
                display.style.display = 'none';
                input.style.display = 'inline-block';
                input.focus();
                // Change button text
                const btn = display.parentElement.querySelector('.save-btn');
                btn.textContent = 'حفظ';
                btn.style.background = '#10b981';
            } else {
                // Save
                const newValue = input.value.trim();
                if (!newValue && field !== 'bio' && field !== 'balanceEGP' && field !== 'balanceUSD') {
                    showToast('⚠️ لا يمكن ترك هذا الحقل فارغاً', 'warning');
                    return;
                }

                // Update Firebase
                const updateData = {};
                if (field === 'numericId') {
                    updateData[field] = parseInt(newValue);
                } else if (field === 'balanceEGP' || field === 'balanceUSD') {
                    updateData[field] = newValue;
                } else {
                    updateData[field] = newValue;
                }

                database.ref('users/' + userId).update(updateData).then(() => {
                    display.textContent = newValue;
                    display.style.display = 'inline';
                    input.style.display = 'none';
                    const btn = display.parentElement.querySelector('.save-btn');
                    btn.textContent = 'تعديل';
                    btn.style.background = '#10b981';
                    showToast('✅ تم التحديث بنجاح', 'success');
                }).catch(error => {
                    console.error('Error updating:', error);
                    showToast('❌ حدث خطأ', 'error');
                });
            }
        }

        // ============================================================
        // 📸 CHANGE AVATAR
        // ============================================================
        function openAvatarModal(userId) {
            selectedUserId = userId;
            document.getElementById('avatarFileInput').value = '';
            document.getElementById('avatarModal').classList.add('active');
        }

        async function confirmChangeAvatar() {
            const fileInput = document.getElementById('avatarFileInput');
            const file = fileInput.files[0];
            if (!file) {
                showToast('⚠️ يرجى اختيار صورة', 'warning');
                return;
            }

            if (!file.type.startsWith('image/')) {
                showToast('❌ يرجى اختيار صورة صالحة', 'error');
                return;
            }

            if (file.size > 5 * 1024 * 1024) {
                showToast('❌ حجم الصورة كبير جداً (حد أقصى 5 ميجابايت)', 'error');
                return;
            }

            try {
                showToast('⏳ جاري رفع الصورة...', 'info');
                closeModal('avatarModal');

                const storageRef = storage.ref('avatars/' + selectedUserId + '/' + Date.now() + '.jpg');
                const uploadTask = await storageRef.put(file);
                const downloadURL = await uploadTask.ref.getDownloadURL();

                await database.ref('users/' + selectedUserId).update({
                    avatar: downloadURL
                });

                showToast('✅ تم تغيير الصورة الشخصية بنجاح', 'success');
                adminSearch();

            } catch (error) {
                console.error('Error uploading avatar:', error);
                showToast('❌ حدث خطأ في رفع الصورة', 'error');
            }
        }

        // ============================================================
        // 🎁 SEND GIFT
        // ============================================================
        function openGiftModal(userId) {
            selectedUserId = userId;
            document.getElementById('giftValueInput').value = '';
            document.getElementById('giftReasonInput').value = '';
            document.getElementById('giftModal').classList.add('active');
        }

        async function confirmSendGift() {
            const value = parseInt(document.getElementById('giftValueInput').value);
            const reason = document.getElementById('giftReasonInput').value.trim() || 'هدية من الإدارة';

            if (!value || value <= 0) {
                showToast('⚠️ يرجى إدخال قيمة صحيحة للهدية', 'warning');
                return;
            }

            try {
                const snapshot = await database.ref('users/' + selectedUserId).once('value');
                const user = snapshot.val();
                if (!user) {
                    showToast('❌ المستخدم غير موجود', 'error');
                    return;
                }

                const giftsList = user.giftsList || [];
                const adminId = 1; // معرف الإدارة

                giftsList.push({
                    senderId: adminId,
                    senderName: 'الإدارة',
                    senderAvatar: '',
                    value: value,
                    reason: reason,
                    date: new Date().toLocaleString('ar-EG'),
                    timestamp: new Date().toISOString()
                });

                await database.ref('users/' + selectedUserId).update({
                    giftsList: giftsList,
                    gifts: (user.gifts || 0) + 1
                });

                // Send notification to user
                const notification = {
                    text: `🎁 تم إرسال هدية بقيمة ${value} من الإدارة${reason ? ` (${reason})` : ''}`,
                    date: new Date().toLocaleString('ar-EG'),
                    read: false,
                    type: 'gift'
                };

                const notifRef = database.ref('users/' + selectedUserId + '/notifications');
                await notifRef.push(notification);

                showToast('✅ تم إرسال الهدية بنجاح', 'success');
                closeModal('giftModal');
                adminSearch();

            } catch (error) {
                console.error('Error sending gift:', error);
                showToast('❌ حدث خطأ في إرسال الهدية', 'error');
            }
        }

        // ============================================================
        // 🗑️ DELETE SINGLE GIFT
        // ============================================================
        async function deleteSingleGift(userId, index) {
            if (!confirm('⚠️ هل أنت متأكد من حذف هذه الهدية؟')) return;

            try {
                const snapshot = await database.ref('users/' + userId).once('value');
                const user = snapshot.val();
                if (!user) return;

                const giftsList = user.giftsList || [];
                if (index >= giftsList.length) return;

                giftsList.splice(index, 1);
                await database.ref('users/' + userId).update({
                    giftsList: giftsList,
                    gifts: giftsList.length
                });

                showToast('✅ تم حذف الهدية', 'success');
                viewUserDetails(userId);

            } catch (error) {
                console.error('Error deleting gift:', error);
                showToast('❌ حدث خطأ', 'error');
            }
        }

        // ============================================================
        // 👑 BADGE MANAGEMENT
        // ============================================================
        function openBadgeModal(userId) {
            selectedUserId = userId;
            document.getElementById('badgeInput').value = '';
            document.getElementById('badgeModal').classList.add('active');
        }

        async function confirmAddBadge() {
            const badge = document.getElementById('badgeInput').value.trim();
            if (!badge) {
                showToast('⚠️ يرجى إدخال لقب', 'warning');
                return;
            }

            try {
                const snapshot = await database.ref('users/' + selectedUserId).once('value');
                const user = snapshot.val();
                if (!user) {
                    showToast('❌ المستخدم غير موجود', 'error');
                    return;
                }

                const currentBadges = user.badges || [];
                if (currentBadges.includes(badge)) {
                    showToast('⚠️ هذا اللقب موجود بالفعل', 'warning');
                    return;
                }

                currentBadges.push(badge);
                await database.ref('users/' + selectedUserId).update({ badges: currentBadges });
                
                showToast('✅ تم إضافة اللقب بنجاح', 'success');
                closeModal('badgeModal');
                adminSearch();

            } catch (error) {
                console.error('Error adding badge:', error);
                showToast('❌ حدث خطأ', 'error');
            }
        }

        // ============================================================
        // 🚫 BAN MANAGEMENT
        // ============================================================
        function openBanModal(userId) {
            selectedUserId = userId;
            document.getElementById('banReasonInput').value = '';
            document.getElementById('banModal').classList.add('active');
        }

        async function confirmBan() {
            const reason = document.getElementById('banReasonInput').value.trim() || 'غير محدد';

            try {
                await database.ref('users/' + selectedUserId).update({
                    isBanned: true,
                    banReason: reason,
                    banDate: new Date().toISOString()
                });
                
                showToast('✅ تم حظر المستخدم بنجاح', 'success');
                closeModal('banModal');
                adminSearch();

            } catch (error) {
                console.error('Error banning user:', error);
                showToast('❌ حدث خطأ', 'error');
            }
        }

        // ============================================================
        // 🗑️ DELETE ACTIONS
        // ============================================================
        async function deleteUserLikes(userId) {
            if (!confirm('⚠️ هل أنت متأكد من حذف جميع الإعجابات لهذا المستخدم؟')) return;

            try {
                await database.ref('users/' + userId).update({ likes: 0 });
                showToast('✅ تم حذف جميع الإعجابات', 'success');
                adminSearch();
            } catch (error) {
                console.error('Error:', error);
                showToast('❌ حدث خطأ', 'error');
            }
        }

        async function deleteUserGifts(userId) {
            if (!confirm('⚠️ هل أنت متأكد من حذف جميع الهدايا لهذا المستخدم؟')) return;

            try {
                await database.ref('users/' + userId).update({ 
                    giftsList: [],
                    gifts: 0
                });
                showToast('✅ تم حذف جميع الهدايا', 'success');
                adminSearch();
            } catch (error) {
                console.error('Error:', error);
                showToast('❌ حدث خطأ', 'error');
            }
        }

        async function deletePost(postId, userId) {
            if (!confirm('⚠️ هل أنت متأكد من حذف هذه الصورة؟')) return;

            try {
                await database.ref('posts/' + postId).remove();
                showToast('✅ تم حذف الصورة', 'success');
                viewUserDetails(userId);
            } catch (error) {
                console.error('Error:', error);
                showToast('❌ حدث خطأ', 'error');
            }
        }

        function closeUserDetail(userId) {
            document.getElementById('detail_' + userId).innerHTML = '';
        }

        // ============================================================
        // 🖥️ MODAL FUNCTIONS
        // ============================================================
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });
        });

        // ============================================================
        // 🔔 TOAST
        // ============================================================
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(50px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // ============================================================
        // 🚀 INIT
        // ============================================================
        window.onload = function() {
            console.log('🛡️ Admin Panel loaded');
            adminSearch();
        };
    </script>
</body>
</html>
