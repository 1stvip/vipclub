<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎬 عرض الدخلة المميزة VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0a0a1a, #1a1040, #0f0c29);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 30px;
            max-width: 900px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .title {
            color: #ffd700;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .subtitle {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        /* ===== حاوية الفيديو - نفس تصميم الكود الأصلي ===== */
        #vipEntrance {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.15), 0 0 150px rgba(255, 215, 0, 0.05);
            border: 2px solid rgba(255, 215, 0, 0.15);
            margin-bottom: 20px;
        }

        /* ===== الحل السحري: استخدام padding-bottom للحفاظ على النسبة ===== */
        #vipEntrance .vip-video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* نسبة 16:9 */
            height: 0;
            overflow: hidden;
            background: #000;
        }

        #vipEntrance .vip-video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* تغطية كاملة بدون تشويه أو قص */
            display: block;
            background: #000;
        }

        /* ===== عنوان الفيديو - نفس الكود الأصلي ===== */
        #vipEntrance .vip-title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 1.8rem;
            font-weight: 900;
            text-shadow: 0 0 60px rgba(255, 215, 0, 0.5), 0 0 120px rgba(255, 215, 0, 0.2);
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 30px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 215, 0, 0.2);
            letter-spacing: 2px;
            white-space: nowrap;
            width: auto;
            pointer-events: none;
        }

        /* ===== اسم المستخدم - نفس الكود الأصلي ===== */
        #vipEntrance .vip-user {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 30px;
            border-radius: 16px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 10;
            pointer-events: none;
        }

        /* ===== زر تخطي - نفس الكود الأصلي ===== */
        #vipEntrance .vip-skip-btn {
            position: absolute;
            bottom: 80px;
            right: 20px;
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.3s;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        #vipEntrance .vip-skip-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            border-color: rgba(255, 215, 0, 0.3);
        }

        /* ===== أزرار التحكم ===== */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }

        .controls button {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            color: white;
            flex: 1;
            min-width: 100px;
        }

        .controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-vip1 {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .btn-vip2 {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }
        .btn-close {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        /* ===== معلومات الفيديو ===== */
        .video-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .video-info .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .video-info .info-item i {
            color: #ffd700;
        }

        /* ===== Toast ===== */
        .toast-message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 10000;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            animation: slideDown 0.3s ease-out;
            max-width: 300px;
            direction: rtl;
            font-size: 0.85rem;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ===== التجاوب - نفس الكود الأصلي ===== */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            .title {
                font-size: 1.2rem;
            }
            .subtitle {
                font-size: 0.8rem;
                margin-bottom: 15px;
            }
            #vipEntrance .vip-title {
                font-size: 1.2rem;
                padding: 8px 18px;
                top: 12px;
                white-space: normal;
                max-width: 90%;
            }
            #vipEntrance .vip-user {
                font-size: 0.9rem;
                padding: 6px 16px;
                bottom: 20px;
            }
            #vipEntrance .vip-skip-btn {
                font-size: 0.75rem;
                padding: 8px 16px;
                bottom: 65px;
                right: 12px;
            }
            .controls button {
                font-size: 0.75rem;
                padding: 8px 16px;
                min-width: 80px;
            }
            .video-info .info-item {
                font-size: 0.7rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }
            .title {
                font-size: 1rem;
            }
            #vipEntrance .vip-title {
                font-size: 0.9rem;
                padding: 6px 12px;
                top: 8px;
                border-radius: 12px;
            }
            #vipEntrance .vip-user {
                font-size: 0.75rem;
                padding: 4px 12px;
                bottom: 14px;
            }
            #vipEntrance .vip-skip-btn {
                font-size: 0.65rem;
                padding: 6px 12px;
                bottom: 50px;
                right: 8px;
                border-radius: 10px;
            }
            .controls button {
                font-size: 0.65rem;
                padding: 6px 12px;
                min-width: 60px;
            }
            .video-info {
                padding: 8px 10px;
            }
            .video-info .info-item {
                font-size: 0.6rem;
                gap: 4px;
            }
            .video-info .info-item i {
                font-size: 0.7rem;
            }
        }

        @media (min-width: 1024px) {
            .container {
                padding: 40px;
                max-width: 900px;
            }
            #vipEntrance .vip-title {
                font-size: 2.2rem;
                padding: 14px 40px;
            }
            #vipEntrance .vip-user {
                font-size: 1.3rem;
                padding: 10px 40px;
                bottom: 35px;
            }
            #vipEntrance .vip-skip-btn {
                font-size: 1rem;
                padding: 12px 30px;
                bottom: 90px;
                right: 30px;
            }
            .controls button {
                font-size: 0.95rem;
                padding: 14px 30px;
            }
        }

        @media (min-width: 1400px) {
            .container {
                max-width: 1100px;
                padding: 50px;
            }
            #vipEntrance .vip-title {
                font-size: 2.6rem;
                padding: 16px 50px;
            }
            #vipEntrance .vip-user {
                font-size: 1.5rem;
                padding: 12px 50px;
                bottom: 40px;
            }
        }

        /* ===== زر إعادة التشغيل ===== */
        .replay-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 20px;
            background: rgba(139, 92, 246, 0.2);
            color: #a78bfa;
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
            text-align: center;
        }

        .replay-btn:hover {
            background: rgba(139, 92, 246, 0.3);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title">🎬 عرض الدخلة المميزة VIP</h1>
        <p class="subtitle">فيديو متجاوب مع جميع الشاشات - بدون قص</p>

        <!-- ===== حاوية الفيديو - نفس الكود الأصلي ===== -->
        <div id="vipEntrance">
            <div class="vip-video-container">
                <video id="vipVideoPlayer" playsinline autoplay muted>
                    <source src="" type="video/mp4">
                </video>
                <!-- عنوان الفيديو -->
                <div class="vip-title" id="vipTitle">🚗 VIP 1 - السيارة الرياضية</div>
                <!-- اسم المستخدم -->
                <div class="vip-user" id="vipEntranceUser">👤 أحمد</div>
                <!-- زر تخطي -->
                <button class="vip-skip-btn" onclick="skipVideo()">
                    <i class="fas fa-forward"></i> تخطي
                </button>
            </div>
        </div>

        <!-- ===== معلومات الفيديو ===== -->
        <div class="video-info">
            <div class="info-item">
                <i class="fas fa-clock"></i>
                <span>المدة: <span id="videoDuration">30</span> ثانية</span>
            </div>
            <div class="info-item">
                <i class="fas fa-crown"></i>
                <span>المستوى: <span id="videoLevel">VIP 1</span></span>
            </div>
            <div class="info-item">
                <i class="fas fa-user"></i>
                <span>المستخدم: <span id="videoUserName">أحمد</span></span>
            </div>
            <div class="info-item">
                <i class="fas fa-play-circle" style="color:#10b981;"></i>
                <span id="videoStatus">تشغيل</span>
            </div>
        </div>

        <!-- ===== أزرار التحكم ===== -->
        <div class="controls">
            <button class="btn-vip1" onclick="loadVideo('vip1')">🚗 VIP 1</button>
            <button class="btn-vip2" onclick="loadVideo('vip2')">🦁 VIP 2</button>
            <button class="btn-close" onclick="closeVideo()">✕ إغلاق</button>
        </div>

        <!-- ===== زر إعادة التشغيل ===== -->
        <div style="text-align:center; margin-top:10px;">
            <button class="replay-btn" onclick="replayVideo()">
                <i class="fas fa-redo"></i> إعادة التشغيل
            </button>
        </div>
    </div>

    <script>
        // ============================================================
        // 📋 بيانات الفيديوهات - نفس الكود الأصلي
        // ============================================================
        const VIP_CONFIG = {
            1: { level: 1, name: 'VIP 1', emoji: '🚗', title: 'VIP 1 - السيارة الرياضية', video: 'images/vipsystem/car.mp4', duration: 30, requirements: { EGP: 1000, USD: 20 } },
            2: { level: 2, name: 'VIP 2', emoji: '🦁', title: 'VIP 2 - هيبة الأسد', video: 'images/vipsystem/lion.mp4', duration: 60, requirements: { EGP: 2500, USD: null } }
        };

        // ============================================================
        // 📋 المتغيرات
        // ============================================================
        let currentVideo = null;
        let videoTimeout = null;
        let isVideoActive = false;
        let isVideoPaused = false;

        // ============================================================
        // 🎬 دالة تحميل الفيديو
        // ============================================================
        function loadVideo(videoId) {
            const videoData = VIP_CONFIG[videoId.replace('vip', '')];
            if (!videoData) {
                showToast('❌ الفيديو غير موجود', 'error');
                return;
            }

            // إلغاء أي تايمر سابق
            if (videoTimeout) {
                clearTimeout(videoTimeout);
                videoTimeout = null;
            }

            const video = document.getElementById('vipVideoPlayer');
            const title = document.getElementById('vipTitle');
            const user = document.getElementById('vipEntranceUser');
            const duration = document.getElementById('videoDuration');
            const level = document.getElementById('videoLevel');
            const userName = document.getElementById('videoUserName');
            const status = document.getElementById('videoStatus');

            // تحديث البيانات
            title.textContent = `${videoData.emoji} ${videoData.title}`;
            user.textContent = `👤 أحمد`; // يمكن تغيير الاسم حسب المستخدم
            duration.textContent = videoData.duration;
            level.textContent = videoData.name;
            userName.textContent = 'أحمد';
            status.textContent = '⏳ جارِ التحميل...';
            status.style.color = '#f59e0b';

            // تحميل الفيديو
            video.pause();
            video.currentTime = 0;
            video.src = videoData.video;
            video.load();
            video.muted = false;

            // محاولة تشغيل الفيديو
            video.play().then(() => {
                status.textContent = '▶️ تشغيل';
                status.style.color = '#10b981';
                showToast(`▶️ تشغيل: ${videoData.title}`, 'success');
            }).catch(e => {
                console.log('Auto-play prevented:', e);
                status.textContent = '⏸️ متوقف (انقر لتشغيل)';
                status.style.color = '#f59e0b';
                // إذا لم يتمكن من التشغيل تلقائياً، حاول مرة أخرى
                setTimeout(() => {
                    video.play().catch(() => {});
                }, 500);
            });

            // إظهار الفيديو
            document.getElementById('vipEntrance').style.display = 'block';
            isVideoActive = true;
            isVideoPaused = false;
            currentVideo = videoData;

            // إضافة تايمر لإيقاف الفيديو تلقائياً
            videoTimeout = setTimeout(() => {
                if (isVideoActive && !isVideoPaused) {
                    showToast('⏰ انتهت مدة الفيديو', 'info');
                    closeVideo();
                }
            }, videoData.duration * 1000);

            // إضافة حدث عند انتهاء الفيديو
            video.onended = function() {
                if (isVideoActive) {
                    status.textContent = '✅ انتهى';
                    status.style.color = '#10b981';
                    showToast('✅ انتهى الفيديو', 'success');
                    closeVideo();
                }
            };

            // إضافة حدث عند التشغيل والإيقاف
            video.onplay = function() {
                if (isVideoActive) {
                    status.textContent = '▶️ تشغيل';
                    status.style.color = '#10b981';
                    isVideoPaused = false;
                }
            };

            video.onpause = function() {
                if (isVideoActive) {
                    status.textContent = '⏸️ متوقف مؤقت';
                    status.style.color = '#f59e0b';
                    isVideoPaused = true;
                }
            };
        }

        // ============================================================
        // ❌ دالة إغلاق الفيديو
        // ============================================================
        function closeVideo() {
            const video = document.getElementById('vipVideoPlayer');
            video.pause();
            video.currentTime = 0;
            video.src = '';
            video.load();
            
            if (videoTimeout) {
                clearTimeout(videoTimeout);
                videoTimeout = null;
            }
            
            isVideoActive = false;
            isVideoPaused = false;
            currentVideo = null;
            
            document.getElementById('videoStatus').textContent = '⏹️ متوقف';
            document.getElementById('videoStatus').style.color = '#ef4444';
            
            showToast('📴 تم إغلاق الفيديو', 'info');
        }

        // ============================================================
        // ⏭️ دالة تخطي الفيديو
        // ============================================================
        function skipVideo() {
            if (!isVideoActive) {
                showToast('⚠️ لا يوجد فيديو نشط', 'warning');
                return;
            }
            
            showToast('⏭️ تم تخطي الفيديو', 'info');
            closeVideo();
        }

        // ============================================================
        // 🔄 دالة إعادة التشغيل
        // ============================================================
        function replayVideo() {
            if (!currentVideo) {
                showToast('⚠️ لا يوجد فيديو لإعادة تشغيله', 'warning');
                return;
            }

            const video = document.getElementById('vipVideoPlayer');
            video.currentTime = 0;
            video.play().then(() => {
                showToast('🔄 إعادة تشغيل الفيديو', 'success');
                document.getElementById('videoStatus').textContent = '▶️ تشغيل';
                document.getElementById('videoStatus').style.color = '#10b981';
                isVideoPaused = false;
            }).catch(() => {});
        }

        // ============================================================
        // 🍞 دالة Toast
        // ============================================================
        function showToast(message, type = 'info') {
            const colors = {
                success: '#10b981',
                error: '#ef4444',
                warning: '#f59e0b',
                info: '#3b82f6'
            };

            const old = document.querySelector('.toast-message');
            if (old) old.remove();

            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.style.cssText = `
                background: ${colors[type] || colors.info};
            `;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(30px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ============================================================
        // 🚀 تحميل فيديو افتراضي عند فتح الصفحة
        // ============================================================
        window.onload = function() {
            // تحميل فيديو VIP 1 بشكل افتراضي
            setTimeout(() => {
                loadVideo('vip1');
            }, 500);
        };

        // ============================================================
        // 🧹 تنظيف عند إغلاق الصفحة
        // ============================================================
        window.addEventListener('beforeunload', function() {
            const video = document.getElementById('vipVideoPlayer');
            if (video) {
                video.pause();
                video.currentTime = 0;
                video.src = '';
            }
            if (videoTimeout) {
                clearTimeout(videoTimeout);
                videoTimeout = null;
            }
        });

        // ============================================================
        // ⌨️ دعم لوحة المفاتيح (مفتاح المسافة للإيقاف/التشغيل)
        // ============================================================
        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' && isVideoActive) {
                e.preventDefault();
                const video = document.getElementById('vipVideoPlayer');
                if (video.paused) {
                    video.play();
                } else {
                    video.pause();
                }
            }
        });
    </script>

</body>
</html>
