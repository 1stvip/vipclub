<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎬 عرض الدخلة المميزة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0a0a1a, #1a1040);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 30px;
            max-width: 900px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .title {
            color: #ffd700;
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        .subtitle {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        /* ===== حاوية الفيديو ===== */
        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.1), 0 0 120px rgba(255, 215, 0, 0.05);
            border: 2px solid rgba(255, 215, 0, 0.15);
            margin-bottom: 20px;
        }

        /* ===== الحل السحري: نسبة العرض إلى الارتفاع 16:9 مع الحد الأقصى للارتفاع ===== */
        .video-wrapper .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            background: #000;
        }

        .video-wrapper .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* تغطية كاملة بدون قص */
            display: block;
            background: #000;
        }

        /* ===== عنوان الفيديو ===== */
        .video-title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 1.8rem;
            font-weight: 900;
            text-shadow: 0 0 60px rgba(255, 215, 0, 0.5), 0 0 120px rgba(255, 215, 0, 0.2);
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 30px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 215, 0, 0.2);
            letter-spacing: 2px;
            white-space: nowrap;
            width: auto;
            pointer-events: none;
        }

        /* ===== اسم المستخدم ===== */
        .video-user {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 30px;
            border-radius: 16px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 10;
            pointer-events: none;
        }

        /* ===== أزرار التحكم ===== */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }

        .controls button {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            color: white;
            flex: 1;
            min-width: 100px;
        }

        .controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-vip1 {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .btn-vip2 {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }
        .btn-vip3 {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }
        .btn-close {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        /* ===== معلومات الفيديو ===== */
        .video-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .video-info .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .video-info .info-item i {
            color: #ffd700;
        }

        /* ===== Toast ===== */
        .toast-message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 10000;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            animation: slideDown 0.3s ease-out;
            max-width: 300px;
            direction: rtl;
            font-size: 0.85rem;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ===== التجاوب ===== */

        /* للشاشات الصغيرة (الهواتف) */
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            .title {
                font-size: 1.1rem;
                margin-bottom: 15px;
            }
            .subtitle {
                font-size: 0.75rem;
                margin-bottom: 15px;
            }
            .video-title {
                font-size: 1rem;
                padding: 6px 16px;
                top: 12px;
                white-space: normal;
                max-width: 90%;
            }
            .video-user {
                font-size: 0.9rem;
                padding: 6px 16px;
                bottom: 20px;
            }
            .controls button {
                font-size: 0.7rem;
                padding: 8px 16px;
                min-width: 70px;
            }
            .video-info {
                padding: 10px 12px;
            }
            .video-info .info-item {
                font-size: 0.7rem;
            }
        }

        /* للشاشات المتوسطة (التابلت) */
        @media (min-width: 601px) and (max-width: 1024px) {
            .video-title {
                font-size: 1.4rem;
                padding: 8px 24px;
            }
            .video-user {
                font-size: 1rem;
            }
        }

        /* للشاشات الكبيرة (الكمبيوتر) */
        @media (min-width: 1025px) {
            .container {
                padding: 40px;
                max-width: 900px;
            }
            .video-title {
                font-size: 2rem;
                padding: 12px 40px;
            }
            .video-user {
                font-size: 1.3rem;
                padding: 10px 40px;
                bottom: 35px;
            }
            .controls button {
                font-size: 0.95rem;
                padding: 14px 30px;
            }
        }

        /* للشاشات فائقة الكبر */
        @media (min-width: 1400px) {
            .container {
                max-width: 1100px;
                padding: 50px;
            }
            .video-title {
                font-size: 2.4rem;
                padding: 14px 50px;
            }
            .video-user {
                font-size: 1.5rem;
                padding: 12px 50px;
                bottom: 40px;
            }
        }

        /* ===== زر تخطي ===== */
        .skip-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 30px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.3s;
            backdrop-filter: blur(5px);
            text-align: center;
        }

        .skip-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            border-color: rgba(255, 215, 0, 0.3);
        }

        .skip-btn i {
            margin-left: 8px;
        }

        .controls-center {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title">🎬 الدخلة المميزة VIP</h1>
        <p class="subtitle">عرض فيديو الدخلة بشكل متجاوب مع جميع الشاشات</p>

        <!-- ===== حاوية الفيديو ===== -->
        <div class="video-wrapper" id="videoWrapper">
            <div class="video-container">
                <video id="vipVideo" playsinline autoplay muted>
                    <source src="" type="video/mp4">
                </video>
                <!-- عنوان الفيديو -->
                <div class="video-title" id="videoTitle">🚗 VIP 1 - السيارة الرياضية</div>
                <!-- اسم المستخدم -->
                <div class="video-user" id="videoUser">👤 أحمد</div>
            </div>
        </div>

        <!-- ===== معلومات الفيديو ===== -->
        <div class="video-info">
            <div class="info-item">
                <i class="fas fa-clock"></i>
                <span>المدة: <span id="videoDuration">30</span> ثانية</span>
            </div>
            <div class="info-item">
                <i class="fas fa-crown"></i>
                <span>المستوى: <span id="videoLevel">VIP 1</span></span>
            </div>
            <div class="info-item">
                <i class="fas fa-user"></i>
                <span>المستخدم: <span id="videoUserName">أحمد</span></span>
            </div>
        </div>

        <!-- ===== أزرار التحكم ===== -->
        <div class="controls">
            <button class="btn-vip1" onclick="loadVideo('vip1')">🚗 VIP 1</button>
            <button class="btn-vip2" onclick="loadVideo('vip2')">🦁 VIP 2</button>
            <button class="btn-vip3" onclick="loadVideo('vip3')">👑 VIP 3</button>
            <button class="btn-close" onclick="closeVideo()">✕ إغلاق</button>
        </div>

        <!-- ===== زر تخطي ===== -->
        <div class="controls-center" style="margin-top:15px;">
            <button class="skip-btn" onclick="skipVideo()">
                <i class="fas fa-forward"></i> تخطي الفيديو
            </button>
        </div>
    </div>

    <script>
        // ============================================================
        // 📋 بيانات الفيديوهات
        // ============================================================
        const VIDEOS = {
            vip1: {
                title: '🚗 VIP 1 - السيارة الرياضية',
                video: 'images/vipsystem/car.mp4',
                duration: 30,
                level: 'VIP 1',
                user: 'أحمد'
            },
            vip2: {
                title: '🦁 VIP 2 - هيبة الأسد',
                video: 'images/vipsystem/lion.mp4',
                duration: 60,
                level: 'VIP 2',
                user: 'محمد'
            },
            vip3: {
                title: '👑 VIP 3 - الملك',
                video: 'images/vipsystem/queen.mp4',
                duration: 45,
                level: 'VIP 3',
                user: 'سارة'
            }
        };

        // ============================================================
        // 📋 المتغيرات
        // ============================================================
        let currentVideo = null;
        let videoTimeout = null;
        let isVideoActive = false;

        // ============================================================
        // 🎬 دالة تحميل الفيديو
        // ============================================================
        function loadVideo(videoId) {
            const videoData = VIDEOS[videoId];
            if (!videoData) {
                showToast('❌ الفيديو غير موجود', 'error');
                return;
            }

            // إلغاء أي تايمر سابق
            if (videoTimeout) {
                clearTimeout(videoTimeout);
                videoTimeout = null;
            }

            const video = document.getElementById('vipVideo');
            const title = document.getElementById('videoTitle');
            const user = document.getElementById('videoUser');
            const duration = document.getElementById('videoDuration');
            const level = document.getElementById('videoLevel');
            const userName = document.getElementById('videoUserName');

            // تحديث البيانات
            title.textContent = videoData.title;
            user.textContent = `👤 ${videoData.user}`;
            duration.textContent = videoData.duration;
            level.textContent = videoData.level;
            userName.textContent = videoData.user;

            // تحميل الفيديو
            video.pause();
            video.currentTime = 0;
            video.src = videoData.video;
            video.load();
            video.muted = false;

            // محاولة تشغيل الفيديو
            video.play().catch(e => {
                console.log('Auto-play prevented:', e);
                // إذا لم يتمكن من التشغيل تلقائياً، حاول مرة أخرى
                setTimeout(() => {
                    video.play().catch(() => {});
                }, 500);
            });

            // إظهار الفيديو
            document.getElementById('videoWrapper').style.display = 'block';
            isVideoActive = true;
            currentVideo = videoData;

            showToast(`▶️ تشغيل: ${videoData.title}`, 'success');

            // إضافة تايمر لإيقاف الفيديو تلقائياً
            videoTimeout = setTimeout(() => {
                if (isVideoActive) {
                    showToast('⏰ انتهت مدة الفيديو', 'info');
                    closeVideo();
                }
            }, videoData.duration * 1000);

            // إضافة حدث عند انتهاء الفيديو
            video.onended = function() {
                if (isVideoActive) {
                    showToast('✅ انتهى الفيديو', 'success');
                    closeVideo();
                }
            };
        }

        // ============================================================
        // ❌ دالة إغلاق الفيديو
        // ============================================================
        function closeVideo() {
            const video = document.getElementById('vipVideo');
            video.pause();
            video.currentTime = 0;
            video.src = '';
            video.load();
            
            if (videoTimeout) {
                clearTimeout(videoTimeout);
                videoTimeout = null;
            }
            
            isVideoActive = false;
            currentVideo = null;
            document.getElementById('videoWrapper').style.display = 'block';
            
            showToast('📴 تم إغلاق الفيديو', 'info');
        }

        // ============================================================
        // ⏭️ دالة تخطي الفيديو
        // ============================================================
        function skipVideo() {
            if (!isVideoActive) {
                showToast('⚠️ لا يوجد فيديو نشط', 'warning');
                return;
            }
            
            showToast('⏭️ تم تخطي الفيديو', 'info');
            closeVideo();
        }

        // ============================================================
        // 🍞 دالة Toast
        // ============================================================
        function showToast(message, type = 'info') {
            const colors = {
                success: '#10b981',
                error: '#ef4444',
                warning: '#f59e0b',
                info: '#3b82f6'
            };

            const old = document.querySelector('.toast-message');
            if (old) old.remove();

            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.style.cssText = `
                background: ${colors[type] || colors.info};
            `;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(30px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ============================================================
        // 🚀 تحميل فيديو افتراضي عند فتح الصفحة
        // ============================================================
        window.onload = function() {
            // تحميل فيديو VIP 1 بشكل افتراضي
            setTimeout(() => {
                loadVideo('vip1');
            }, 500);
        };

        // ============================================================
        // 🧹 تنظيف عند إغلاق الصفحة
        // ============================================================
        window.addEventListener('beforeunload', function() {
            const video = document.getElementById('vipVideo');
            if (video) {
                video.pause();
                video.currentTime = 0;
                video.src = '';
            }
            if (videoTimeout) {
                clearTimeout(videoTimeout);
                videoTimeout = null;
            }
        });
    </script>

</body>
</html>
