<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 نظام VIP - VipSystem</title>
    <link rel="shortcut icon" href="images/videoslogo/vip.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255,255,255,0.05);
            color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .tab-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            border-color: #8b5cf6;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
            gap: 15px;
        }

        .header .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header .logo i {
            color: #ffd700;
        }

        .header .back-btn {
            padding: 10px 25px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .header .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }

        .header .btn-admin {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }
        .header .btn-admin:hover {
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.4);
        }

        .header .login-btn {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .header .login-btn:hover {
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
        }

        .header .logout-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .header .logout-btn:hover {
            box-shadow: 0 5px 20px rgba(239, 68, 68, 0.4);
        }

        .user-info {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .user-info .user-details {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f46e5, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            overflow: hidden;
        }

        .user-info .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info .user-name {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .user-info .user-id {
            color: #94a3b8;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .user-info .user-vip {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 20px;
            border-radius: 12px;
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.2);
        }

        .user-info .user-vip .vip-level {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
        }

        .user-info .user-vip .vip-status {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .vip-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }

        .vip-card {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 580px;
        }

        .vip-card:hover {
            transform: translateY(-8px);
            border-color: #ffd700;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.1);
        }

        .vip-card .vip-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            z-index: 2;
        }

        .vip-card .vip-badge.vip1 { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .vip-card .vip-badge.vip2 { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        .vip-card .vip-badge.vip3 { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; }
        .vip-card .vip-badge.vip4 { background: linear-gradient(135deg, #06b6d4, #0891b2); color: white; }
        .vip-card .vip-badge.vip5 { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .vip-card .vip-badge.vip6 { background: linear-gradient(135deg, #ffd700, #f59e0b); color: #1a1a2e; }
        .vip-card .vip-badge.vip7 { background: linear-gradient(135deg, #f472b6, #ec4899); color: white; }
        .vip-card .vip-badge.vip8 { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; }
        .vip-card .vip-badge.vip9 { background: linear-gradient(135deg, #a78bfa, #8b5cf6); color: white; }
        .vip-card .vip-badge.vip10 { background: linear-gradient(135deg, #f59e0b, #d97706); color: #1a1a2e; }
        .vip-card .vip-badge.owned { background: #10b981; color: white; }
        .vip-card .vip-badge.expired { background: #6b7280; color: white; }
        .vip-card .vip-badge.active { background: #3b82f6; color: white; }
        .vip-card .vip-badge.special { background: linear-gradient(135deg, #ffd700, #f59e0b); color: #1a1a2e; }
        .vip-card .vip-badge.king { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; }
        .vip-card .vip-badge.elite { background: linear-gradient(135deg, #06b6d4, #0891b2); color: white; }
        .vip-card .vip-badge.legend { background: linear-gradient(135deg, #f59e0b, #d97706); color: #1a1a2e; }
        .vip-card .vip-badge.support { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }

        .vip-card .vip-video-container {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 18px;
            position: relative;
            background: #0a0a1a;
            aspect-ratio: 9/16;
            min-height: 350px;
            flex-shrink: 0;
        }

        .vip-card .vip-video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #0a0a1a;
        }

        .vip-card .vip-video-container .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }

        .vip-card .vip-video-container:hover .video-overlay {
            opacity: 1;
        }

        .vip-card .vip-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: #ffd700;
        }

        .vip-card .vip-description {
            color: #94a3b8;
            font-size: 0.85rem;
            line-height: 1.6;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .vip-card .vip-requirements {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        .vip-card .vip-requirements .req-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
        }

        .vip-card .vip-requirements .req-item:last-child {
            border-bottom: none;
        }

        .vip-card .vip-requirements .req-item .req-label {
            color: #94a3b8;
        }

        .vip-card .vip-requirements .req-item .req-value {
            color: #fff;
            font-weight: bold;
        }

        .vip-card .vip-status-text {
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .vip-card .vip-status-text.active {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .vip-card .vip-status-text.owned {
            background: rgba(255, 215, 0, 0.1);
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .vip-card .vip-status-text.special {
            background: rgba(255, 215, 0, 0.15);
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.3);
            font-size: 1rem;
        }

        .vip-card .vip-status-text.inactive {
            background: rgba(107, 114, 128, 0.1);
            color: #94a3b8;
            border: 1px solid rgba(107, 114, 128, 0.2);
        }

        .vip-card .vip-status-text.locked {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .vip-card .vip-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .vip-card .vip-actions button {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            min-width: 100px;
            font-size: 0.9rem;
        }

        .vip-card .vip-actions .btn-buy {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
        }

        .vip-card .vip-actions .btn-buy:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }

        .vip-card .vip-actions .btn-buy.disabled {
            background: #6b7280;
            cursor: not-allowed;
        }

        .vip-card .vip-actions .btn-buy.disabled:hover {
            transform: none;
            box-shadow: none;
        }

        .vip-card .vip-actions .btn-activate {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .vip-card .vip-actions .btn-activate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
        }

        .vip-card .vip-actions .btn-deactivate {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .vip-card .vip-actions .btn-deactivate:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: translateY(-2px);
        }

        .vip-card .vip-actions .btn-deactivate.active {
            background: #ef4444;
            color: white;
            border: none;
        }

        .vip-card .vip-actions .btn-deactivate.active:hover {
            background: #dc2626;
        }

        .chatstyles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }

        .chatstyle-card {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 400px;
        }

        .chatstyle-card:hover {
            transform: translateY(-8px);
            border-color: #ffd700;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.1);
        }

        .chatstyle-card .style-preview {
            width: 100%;
            max-width: 280px;
            border-radius: 16px;
            overflow: hidden;
            background: #0a0a1a;
            margin-bottom: 15px;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .chatstyle-card .style-preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px;
            background: transparent;
        }

        .chatstyle-card .style-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 5px;
        }

        .chatstyle-card .style-price {
            font-size: 1.1rem;
            color: #10b981;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .chatstyle-card .style-duration {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 15px;
        }

        .chatstyle-card .style-status {
            padding: 6px 16px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .chatstyle-card .style-status.active {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .chatstyle-card .style-status.owned {
            background: rgba(255, 215, 0, 0.15);
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .chatstyle-card .style-status.inactive {
            background: rgba(107, 114, 128, 0.15);
            color: #94a3b8;
            border: 1px solid rgba(107, 114, 128, 0.2);
        }

        .chatstyle-card .style-status.expired {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .chatstyle-card .style-actions {
            display: flex;
            gap: 10px;
            width: 100%;
            flex-wrap: wrap;
        }

        .chatstyle-card .style-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            min-width: 80px;
            font-size: 0.85rem;
        }

        .chatstyle-card .style-actions .btn-buy {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
        }

        .chatstyle-card .style-actions .btn-buy:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }

        .chatstyle-card .style-actions .btn-buy.disabled {
            background: #6b7280;
            cursor: not-allowed;
        }

        .chatstyle-card .style-actions .btn-buy.disabled:hover {
            transform: none;
            box-shadow: none;
        }

        .chatstyle-card .style-actions .btn-activate {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .chatstyle-card .style-actions .btn-activate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
        }

        .chatstyle-card .style-actions .btn-deactivate {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .chatstyle-card .style-actions .btn-deactivate:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: translateY(-2px);
        }

        .chatstyle-card .style-actions .btn-deactivate.active {
            background: #ef4444;
            color: white;
            border: none;
        }

        .chatstyle-card .style-actions .btn-deactivate.active:hover {
            background: #dc2626;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 9999;
            animation: slideDown 0.3s ease;
            max-width: 90vw;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        .toast.warning { background: #f59e0b; }
        .toast.info { background: #3b82f6; }

        @keyframes slideDown {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .vip-grid { grid-template-columns: 1fr; }
            .chatstyles-grid { grid-template-columns: 1fr; }
            .user-info { flex-direction: column; align-items: flex-start; }
            .header .logo { font-size: 1.3rem; }
            .vip-card { min-height: 500px; }
            .vip-card .vip-video-container { min-height: 280px; }
            .tabs .tab-btn { padding: 10px 15px; font-size: 0.8rem; }
            .chatstyle-card { min-height: 350px; }
            .header .back-btn { padding: 8px 15px; font-size: 0.8rem; }
        }

        @media (max-width: 480px) {
            .vip-card { padding: 18px; min-height: 450px; }
            .vip-card .vip-title { font-size: 1.1rem; }
            .vip-card .vip-actions button { font-size: 0.8rem; padding: 10px; }
            .vip-card .vip-video-container { min-height: 220px; }
            .user-info .user-details { flex-direction: column; align-items: flex-start; gap: 10px; }
            .chatstyle-card { padding: 18px; min-height: 320px; }
            .chatstyle-card .style-preview { max-width: 200px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-crown"></i>
                نظام VIP
            </div>
            <div>
                <a href="settings1.html" class="back-btn btn-admin" style="margin-right: 10px;">
                    <i class="fas fa-chart-bar"></i> بيانات الحساب
                </a>
                <a href="chat.html" class="back-btn">
                    <i class="fas fa-arrow-right"></i> العودة للغرف
                </a>
                <a href="chat.html" class="back-btn" style="background: linear-gradient(135deg, #ef4444, #dc2626); margin-right: 10px;">
                    <i class="fas fa-home"></i> الرئيسية
                </a>
                <a href="login4.html" class="back-btn login-btn" id="loginBtn" style="margin-right: 10px;">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </a>
                <button class="back-btn logout-btn" id="logoutBtn" style="display: none; margin-right: 10px;" onclick="logoutUser()">
                    <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                </button>
            </div>
        </div>

        <!-- User Info -->
        <div class="user-info" id="userInfo">
            <div class="user-details">
                <div class="user-avatar" id="userAvatar">
                    <i class="fas fa-user"></i>
                </div>
                <div>
                    <div class="user-name" id="userName">تحميل...</div>
                    <div class="user-id" id="userId">🆔 ---</div>
                </div>
            </div>
            <div class="user-vip">
                <div>
                    <div class="vip-level" id="vipLevel">VIP 0</div>
                    <div class="vip-status" id="vipStatus">غير مفعل</div>
                </div>
                <div style="font-size:2rem;">
                    <i class="fas fa-crown" style="color: #ffd700;"></i>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('vip')" id="tabVip">
                <i class="fas fa-crown"></i> الدخلات المميزة
            </button>
            <button class="tab-btn" onclick="switchTab('frames')" id="tabFrames">

                return null;

        function saveUserToStorage(userData, firebaseKey) {
            const userToStore = {
                numericId: userData.numericId,
                username: userData.username,
                nickname: userData.nickname || userData.username,
                firebaseKey: firebaseKey,
                balanceEGP: userData.balanceEGP || 0,
                balanceUSD: userData.balanceUSD || 0,
                vip: userData.vip || null,
                vipPurchased: userData.vipPurchased || {},
                frames: userData.frames || {},
                activeFrame: userData.activeFrame || null,
                chatStyles: userData.chatStyles || {},
                activeChatStyle: userData.activeChatStyle || null
            };
            localStorage.setItem('currentUser', JSON.stringify(userToStore));
            currentUser = userToStore;
        }

        function clearUserFromStorage() {
            localStorage.removeItem('currentUser');
            currentUser = null;

        async function loadUserFromFirebase() {
            const stored = getStoredUser();
            if (!stored) {
                console.log('⚠️ لا يوجد مستخدم مسجل');
                document.getElementById('userName').textContent = 'زائر';
                document.getElementById('userId').textContent = '🆔 ---';
                updateLoginButtons(false);
                return false;
            }

            try {
                const snapshot = await database.ref('users')
                    .orderByChild('numericId')
                    .equalTo(stored.numericId)
                    .once('value');

                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    const firebaseKey = Object.keys(userData)[0];
                    const fullUser = userData[firebaseKey];
                    
                    saveUserToStorage(fullUser, firebaseKey);
                    currentFirebaseUserId = firebaseKey;
                    
                    console.log('✅ تم تحميل المستخدم:', fullUser.username);
                    updateLoginButtons(true);
                    return fullUser;
                } else {
                    console.warn('⚠️ المستخدم غير موجود في Firebase');
                    clearUserFromStorage();
                    return false;
                }
            } catch (error) {
                console.error('❌ Error loading user:', error);
                showToast('❌ حدث خطأ في تحميل البيانات', 'error');
                return false;
            }

                const isActive = activeChatStyle === style.id;
                const expiresAt = styleData?.expiresAt ? new Date(styleData.expiresAt) : null;
                const isExpired = expiresAt && expiresAt < new Date();
                const isValid = isOwned && !isExpired;

                let statusText = 'غير مملوك';
                let statusClass = 'inactive';
                
                if (isActive && isValid) {
                    statusText = '✅ مفعل حالياً';
                    statusClass = 'active';
                } else if (isValid) {
                    statusText = '📦 مملوك';
                    statusClass = 'owned';
                } else if (isOwned && isExpired) {
                    statusText = '⏳ منتهي الصلاحية';
                    statusClass = 'expired';
                }

                const canAfford = user.balanceEGP >= style.price;

                let actionsHTML = '';

                if (isActive) {
                    actionsHTML = `
                        <button class="btn-deactivate active" onclick="deactivateChatStyle('${style.id}')">
                            <i class="fas fa-times"></i> إلغاء التفعيل

                    actionsHTML = `
                        <button class="btn-activate" onclick="activateChatStyle('${style.id}')">
                            <i class="fas fa-play"></i> تفعيل
                        </button>
                    `;
                } else if (isOwned && isExpired) {

                        <button class="btn-buy" onclick="buyChatStyle('${style.id}', ${style.price}, '${style.name}')">
                            <i class="fas fa-sync"></i> شراء مجدد (${style.price} ج.م)
                        </button>
                    `;
                } else {
                    actionsHTML = `
                        <button class="btn-buy ${!canAfford ? 'disabled' : ''}" 
                            onclick="buyChatStyle('${style.id}', ${style.price}, '${style.name}')"
                            ${!canAfford ? 'disabled' : ''}>
                            ${canAfford ? '<i class="fas fa-shopping-cart"></i> شراء' : '❌ رصيد غير كافٍ'}
                        </button>

                return `
                    <div class="chatstyle-card">
                        <div class="style-preview">
                            <img src="${style.image}" alt="${style.name}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%23333%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-size=%2216%22%3E${style.name}%3C/text%3E%3C/svg%3E'">

        async function buyVIP(level) {
            if (!currentUser || !currentFirebaseUserId) {
                showToast('⚠️ يرجى تسجيل الدخول أولاً', 'warning');
                return;
            }

            const config = VIP_CONFIG[level];
            if (!config) {
                showToast('❌ مستوى VIP غير صحيح', 'error');
                return;
            }

            try {
                const snapshot = await database.ref('users/' + currentFirebaseUserId).once('value');
                const user = snapshot.val();

                if (!user) {
                    showToast('❌ المستخدم غير موجود', 'error');
                    return;
                }

                const currentVIP = user.vip || { active: null, expiresAt: null };
                if (currentVIP.active === level) {

                    if (expiresAt && expiresAt > new Date()) {
                        showToast(`⚠️ ${config.name} مفعل بالفعل`, 'warning');
                        return;
                    }
                }

                if (user.balanceEGP < config.price) {
                    showToast(`❌ رصيد غير كافٍ (مطلوب ${config.price} ج.م)`, 'error');
                    return;
                }

                if (!confirm(`تأكيد شراء ${config.name} (${config.title}) مقابل ${config.price} ج.م؟`)) return;

                const newBalance = (user.balanceEGP || 0) - config.price;
                const now = new Date();
                const expiresAt = new Date(now);
                expiresAt.setDate(expiresAt.getDate() + config.duration);

                const vipPurchased = user.vipPurchased || {};
                vipPurchased[level] = true;

                const updateData = {
                    balanceEGP: newBalance,
                    'vip/active': level,
                    'vip/expiresAt': expiresAt.toISOString(),
                    'vip/activatedAt': now.toISOString(),
                    'vip/amount': config.price,

                // تفعيل الإطار المرتبط بـ VIP تلقائياً
                if (config.frame) {

                    updateData.frames = frames;
                    updateData.activeFrame = frameId;

                        videoUrl: config.proFrame,

                    updateData.frames = frames;
                    updateData.activeVIPProFrame = proFrameId;

                await database.ref('users/' + currentFirebaseUserId).update(updateData);

                const updatedUser = { ...user, ...updateData };
                saveUserToStorage(updatedUser, currentFirebaseUserId);

                // تسجيل العملية
                await logPurchaseToAdmin({
                    type: 'vip_purchase',
                    itemName: `${config.name} - ${config.title}`,
                    itemId: `vip${level}`,
                    price: config.price,
                    currency: 'EGP',
                    userId: user.numericId,
                    username: user.nickname || user.username,
                    userFirebaseKey: currentFirebaseUserId,
                    duration: config.duration,
                    startDate: now.toISOString(),
                    expiryDate: expiresAt.toISOString(),
                    note: `شراء ${config.name}`

                const notification = {

        // ============================================================
        // 🖼️ VIP FRAMES HANDLER
        // ============================================================
        function handleVIPFrames(user) {
            if (!user) return;
            
            const vipData = user.vip || { active: null, expiresAt: null };
            const activeVIP = vipData.active;
            const expiresAt = vipData.expiresAt ? new Date(vipData.expiresAt) : null;
            const isExpired = expiresAt && expiresAt < new Date();
            const isActive = activeVIP && !isExpired;

            if (isActive && activeVIP >= 1 && activeVIP <= 10) {
                const config = VIP_CONFIG[activeVIP];
                if (config && config.frame) {
                    const frameId = `vipframe_${activeVIP}`;
                    const frames = user.frames || {};
                    if (!frames[frameId]) {
                        const now = new Date();
                        frames[frameId] = {
                            owned: true,
                            purchasedAt: now.toISOString(),
                            expiresAt: expiresAt.toISOString(),
                            type: 'vipframe',
                            vipLevel: activeVIP,
                            videoUrl: config.frame
                        };
                        database.ref('users/' + currentFirebaseUserId + '/frames').set(frames);
                        database.ref('users/' + currentFirebaseUserId + '/activeFrame').set(frameId);
                    }
                    
                    if (activeVIP === 6 && config.proFrame) {
                        const proFrameId = `vipframe_6pro`;
                        if (!frames[proFrameId]) {
                            const now = new Date();
                            frames[proFrameId] = {
                                owned: true,
                                purchasedAt: now.toISOString(),
                                expiresAt: expiresAt.toISOString(),
                                type: 'vipframe',
                                vipLevel: 6,
                                videoUrl: config.proFrame,
                                isPro: true
                            };
                            database.ref('users/' + currentFirebaseUserId + '/frames').set(frames);
                            database.ref('users/' + currentFirebaseUserId + '/activeVIPProFrame').set(proFrameId);
                        }
                    }
                }
            }
        }

                const updatedUser = { ...user, activeChatStyle: styleId };
                saveUserToStorage(updatedUser, currentFirebaseUserId);

                showToast(`✅ تم تفعيل أسلوب الكتابة بنجاح`, 'success');
                await ensureUserData();

            } catch (error) {
                console.error('Error activating chat style:', error);
                showToast('❌ حدث خطأ', 'error');
            }
        }

        async function deactivateChatStyle(styleId) {
            if (!currentUser || !currentFirebaseUserId) {
                showToast('⚠️ يرجى تسجيل الدخول أولاً', 'warning');
                return;
            }

            if (!confirm(`⚠️ هل أنت متأكد من إلغاء تفعيل هذا الأسلوب؟`)) return;

            try {
                await database.ref('users/' + currentFirebaseUserId + '/activeChatStyle').set(null);

                const snapshot = await database.ref('users/' + currentFirebaseUserId).once('value');
                const user = snapshot.val();
                if (user) {
                    saveUserToStorage(user, currentFirebaseUserId);
                }

                showToast('✅ تم إلغاء تفعيل أسلوب الكتابة', 'success');
                await ensureUserData();

            } catch (error) {
                console.error('Error deactivating chat style:', error);
                showToast('❌ حدث خطأ', 'error');
            }
        }

        // ============================================================
        // 📝 LOG PURCHASE TO ADMIN
        // ============================================================
        async function logPurchaseToAdmin(data) {
            try {
                if (!database) return;
                
                const purchaseLog = {
                    type: data.type || 'purchase',
                    itemName: data.itemName || 'غير معروف',
                    itemId: data.itemId || '---',
                    price: data.price || 0,
                    currency: data.currency || 'EGP',
                    userId: data.userId || '---',
                    username: data.username || 'مستخدم',
                    userFirebaseKey: data.userFirebaseKey || '',
                    duration: data.duration || 0,
                    startDate: data.startDate || new Date().toISOString(),
                    expiryDate: data.expiryDate || new Date().toISOString(),
                    note: data.note || '',
                    timestamp: new Date().toISOString(),
                    timestampMs: new Date().getTime()
                };

                await database.ref('adminLogs').push(purchaseLog);
                console.log('✅ تم تسجيل العملية في adminLogs:', purchaseLog);
            } catch (error) {
                console.error('❌ خطأ في تسجيل العملية:', error);
            }
        }

        // ============================================================
        // 📑 TABS
        // ============================================================
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            const tabMap = {
                'vip': 'Vip',
                'frames': 'Frames',
                'chatstyles': 'ChatStyles'
            };
            
            const contentEl = document.getElementById(`tabContent${tabMap[tab]}`);
            const btnEl = document.getElementById(`tab${tabMap[tab]}`);
            
            if (contentEl) contentEl.classList.add('active');
            if (btnEl) btnEl.classList.add('active');
            
            if (tab === 'frames') {
                renderFrames(currentUser);
            } else if (tab === 'chatstyles') {
                renderChatStyles(currentUser);
            } else if (tab === 'vip') {
                renderVIPCards(currentUser);
            }
        }

        // ============================================================
        // 🍞 TOAST
        // ============================================================
        function showToast(message, type = 'info') {
            const oldToast = document.querySelector('.toast');
            if (oldToast) oldToast.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(30px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // ============================================================
        // 🚀 INIT
        // ============================================================
        window.onload = function() {
            initializeFirebase();
            
            ensureUserData().then(() => {
                console.log('👑 VIP System loaded successfully');
                console.log('📊 Current user:', currentUser);
            });
            
            const stored = getStoredUser();
            if (stored) {
                updateLoginButtons(true);
            } else {
                updateLoginButtons(false);
            }
        };
    </script>
</body>
</html>
