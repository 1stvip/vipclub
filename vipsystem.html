<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="images/videoslogo/vip.png">
    <title>👑 VipClub - نظام VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        /* ===== الأساسيات ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        /* ===== شريط التنقل ===== */
        .navbar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 0.6rem 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 60px;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffd700;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .logo i { font-size: 1.3rem; }

        .nav-icons {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-btn {
            font-size: 1.2rem;
            color: #f8fafc;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            transition: 0.3s;
            background: rgba(255,255,255,0.05);
            border: none;
            text-decoration: none;
        }
        .icon-btn:hover {
            background: #8b5cf6;
            color: white;
            transform: translateY(-2px);
        }

        /* ===== الهيرو ===== */
        .hero {
            padding: 40px 20px 25px;
            text-align: center;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.15), transparent 70%);
        }
        .hero h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            color: #94a3b8;
            max-width: 600px;
            margin: 10px auto;
            font-size: 1.1rem;
        }

        /* ===== معلومات المستخدم ===== */
        .user-info-bar {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            padding: 15px 20px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        .user-info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        .user-info-item .label {
            color: #94a3b8;
        }

        .user-info-item .value {
            font-weight: 600;
            color: #ffd700;
        }

        .user-info-item .value.egp { color: #10b981; }
        .user-info-item .value.usd { color: #60a5fa; }
        .user-info-item .value.vip { color: #ffd700; }

        /* ===== مستويات VIP ===== */
        .vip-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px 20px 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .vip-card {
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 25px 20px 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            min-height: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .vip-card:hover {
            transform: translateY(-10px);
            border-color: var(--vip-color, #8b5cf6);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .vip-card.current {
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.15);
        }

        .vip-card.locked {
            opacity: 0.6;
        }

        .vip-card.locked:hover {
            transform: translateY(-5px);
        }

        /* ===== خلفيات VIP ===== */
        .vip-card .vip-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.6;
            pointer-events: none;
            background-size: cover;
            background-position: center;
            transition: opacity 0.5s ease;
            overflow: hidden;
        }

        .vip-card .vip-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            transition: opacity 0.5s ease;
        }

        .vip-card:hover .vip-bg video {
            opacity: 1;
        }

        .vip-card .vip-bg .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1;
        }

        .vip-card .vip-content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* الأيقونة */
        .vip-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 15px;
            position: relative;
            transition: all 0.5s ease;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255,255,255,0.1);
        }

        .vip-card:hover .vip-icon {
            transform: scale(1.1) rotate(-5deg);
        }

        /* الإطار المتحرك */
        .vip-frame {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            position: relative;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vip-frame .frame-ring {
            position: absolute;
            border-radius: 50%;
            animation: spinFrame 8s linear infinite;
        }

        .vip-frame .frame-ring:nth-child(1) {
            width: 100%;
            height: 100%;
            border: 3px solid var(--vip-color, #8b5cf6);
            opacity: 0.6;
        }

        .vip-frame .frame-ring:nth-child(2) {
            width: 85%;
            height: 85%;
            border: 2px dashed var(--vip-color, #8b5cf6);
            animation-duration: 6s;
            animation-direction: reverse;
            opacity: 0.4;
        }

        .vip-frame .frame-ring:nth-child(3) {
            width: 70%;
            height: 70%;
            border: 2px dotted var(--vip-color, #8b5cf6);
            animation-duration: 4s;
            opacity: 0.3;
        }

        @keyframes spinFrame {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* العنوان */
        .vip-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 5px 0;
            color: var(--vip-color, #8b5cf6);
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .vip-subtitle {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .vip-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffd700;
            margin: 10px 0;
        }

        .vip-price span {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 400;
        }

        /* التارجيت - الهدف */
        .vip-target {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 12px 15px;
            margin: 10px 0;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .vip-target .target-label {
            font-size: 0.7rem;
            color: #94a3b8;
            display: block;
            margin-bottom: 3px;
        }

        .vip-target .target-value {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
        }

        .vip-target .target-progress {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .vip-target .target-progress .progress-bar {
            height: 100%;
            border-radius: 3px;
            transition: width 1s ease;
            background: linear-gradient(90deg, var(--vip-color, #8b5cf6), #ffd700);
        }

        /* المزايا */
        .vip-features {
            list-style: none;
            text-align: right;
            width: 100%;
            margin: 10px 0;
            padding: 0;
        }

        .vip-features li {
            padding: 5px 0;
            font-size: 0.85rem;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: flex-start;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .vip-features li i {
            color: var(--vip-color, #8b5cf6);
            font-size: 0.8rem;
            min-width: 20px;
        }

        /* الحالة */
        .vip-status {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-top: 5px;
        }

        .vip-status.unlocked {
            background: #10b981;
            color: white;
        }

        .vip-status.current {
            background: #ffd700;
            color: #1a1a2e;
        }

        .vip-status.locked {
            background: #334155;
            color: #94a3b8;
        }

        /* الزر */
        .vip-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: auto;
            width: 100%;
            background: linear-gradient(135deg, var(--vip-color, #8b5cf6), var(--vip-color-dark, #7c3aed));
            color: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            position: relative;
            z-index: 3;
        }

        .vip-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .vip-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .vip-btn .btn-badge {
            background: rgba(255,255,255,0.2);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-right: 8px;
        }

        /* ===== خلفيات الصور ===== */
        .bg-desert {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><rect fill="%23f4a460" width="800" height="600"/><circle cx="400" cy="200" r="80" fill="%23ffd700" opacity="0.3"/><path d="M0 400 Q200 350 400 400 Q600 450 800 400 L800 600 L0 600 Z" fill="%23d4a373"/><path d="M0 450 Q100 420 200 450 Q300 480 400 450 Q500 420 600 450 Q700 480 800 450 L800 600 L0 600 Z" fill="%23b8860b" opacity="0.5"/></svg>');
        }

        .bg-ocean {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><rect fill="%23006582" width="800" height="600"/><path d="M0 350 Q100 280 200 340 Q300 400 400 350 Q500 300 600 350 Q700 400 800 350 L800 600 L0 600 Z" fill="%2300a8cc" opacity="0.4"/><path d="M0 400 Q150 350 300 400 Q450 450 600 400 Q750 350 800 400 L800 600 L0 600 Z" fill="%2300b4d8" opacity="0.3"/></svg>');
        }

        .bg-forest {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><rect fill="%231b4d1b" width="800" height="600"/><path d="M200 300 L150 200 L250 200 Z" fill="%232d6b2d" opacity="0.4"/><path d="M300 320 L240 180 L360 180 Z" fill="%233a7a3a" opacity="0.3"/><path d="M500 280 L450 160 L550 160 Z" fill="%232d6b2d" opacity="0.35"/></svg>');
        }

        /* ===== فيديو الأسد ===== */
        .lion-video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .lion-video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
            transition: opacity 0.5s ease;
        }

        .vip-card:hover .lion-video-bg video {
            opacity: 0.8;
        }

        .lion-video-bg .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1;
        }

        /* ===== الأنماط حسب المستوى ===== */
        .vip-1 { --vip-color: #8b5cf6; --vip-color-dark: #7c3aed; }
        .vip-1 .vip-icon { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }

        .vip-2 { --vip-color: #f59e0b; --vip-color-dark: #d97706; }
        .vip-2 .vip-icon { background: linear-gradient(135deg, #f59e0b, #d97706); }

        .vip-3 { --vip-color: #10b981; --vip-color-dark: #059669; }
        .vip-3 .vip-icon { background: linear-gradient(135deg, #10b981, #059669); }

        .vip-4 { --vip-color: #3b82f6; --vip-color-dark: #2563eb; }
        .vip-4 .vip-icon { background: linear-gradient(135deg, #3b82f6, #2563eb); }

        /* ===== المودال ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            z-index: 9998;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1a1a2e;
            border-radius: 28px;
            padding: 35px;
            max-width: 500px;
            width: 95%;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes modalPop {
            from { transform: scale(0.8) translateY(30px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .modal .modal-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .modal h2 {
            color: #ffd700;
            margin-bottom: 10px;
        }

        .modal p {
            color: #94a3b8;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .modal .modal-features {
            text-align: right;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin: 15px 0;
        }

        .modal .modal-features li {
            list-style: none;
            padding: 5px 0;
            color: #cbd5e1;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal .modal-features li i {
            color: #ffd700;
        }

        .modal .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal .modal-btns button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .modal .modal-btns .btn-confirm {
            background: linear-gradient(135deg, var(--vip-color, #8b5cf6), var(--vip-color-dark, #7c3aed));
            color: white;
        }

        .modal .modal-btns .btn-confirm:hover {
            transform: scale(1.05);
        }

        .modal .modal-btns .btn-confirm:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .modal .modal-btns .btn-cancel {
            background: rgba(255,255,255,0.05);
            color: #94a3b8;
        }

        .modal .modal-btns .btn-cancel:hover {
            background: rgba(255,255,255,0.1);
        }

        /* ===== التوست ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 14px;
            z-index: 10000;
            animation: slideUp 0.4s ease;
            max-width: 380px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toast-success { background: rgba(16, 185, 129, 0.95); color: white; }
        .toast-error { background: rgba(239, 68, 68, 0.95); color: white; }
        .toast-warning { background: rgba(245, 158, 11, 0.95); color: white; }
        .toast-info { background: rgba(59, 130, 246, 0.95); color: white; }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* ===== زر الأدمن ===== */
        .admin-btn {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            z-index: 50;
            box-shadow: 0 5px 20px rgba(239, 68, 68, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .admin-btn:hover {
            transform: scale(1.1) rotate(-10deg);
            box-shadow: 0 8px 30px rgba(239, 68, 68, 0.6);
        }

        /* ===== التوافق ===== */
        @media (max-width: 768px) {
            .hero h1 { font-size: 1.8rem; }
            .vip-container { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; padding: 10px; }
            .vip-card { min-height: 380px; padding: 20px 15px; }
            .vip-frame { width: 90px; height: 90px; }
            .vip-icon { width: 60px; height: 60px; font-size: 1.8rem; }
            .modal { padding: 25px; margin: 10px; }
            .modal .modal-btns { flex-direction: column; }
            .user-info-bar { gap: 12px; font-size: 0.8rem; flex-wrap: wrap; justify-content: center; }
            .admin-btn { bottom: 90px; right: 15px; width: 45px; height: 45px; font-size: 1.2rem; }
        }

        @media (max-width: 480px) {
            .vip-container { grid-template-columns: 1fr; }
            .vip-card { min-height: 350px; }
            .hero h1 { font-size: 1.4rem; }
            .user-info-bar { flex-direction: column; align-items: center; gap: 6px; padding: 10px; }
        }
    </style>
</head>
<body>

<!-- ===== شريط التنقل ===== -->
<nav class="navbar">
    <div class="logo" onclick="window.location.href='chat.html'">
        <i class="fas fa-crown"></i> VipClub
    </div>
    <div class="nav-icons">
        <a href="chat.html" class="icon-btn" title="الغرفة الصوتية">
            <i class="fas fa-microphone-alt"></i>
        </a>
        <a href="Store.html" class="icon-btn" title="المتجر">
            <i class="fas fa-store"></i>
        </a>
        <a href="Profile.html" class="icon-btn" title="الملف الشخصي">
            <i class="fas fa-user-circle"></i>
        </a>
        <a href="Wallet.html" class="icon-btn" title="المحفظة">
            <i class="fas fa-wallet"></i>
        </a>
        <button class="icon-btn" onclick="logout()" title="تسجيل الخروج">
            <i class="fas fa-sign-out-alt"></i>
        </button>
    </div>
</nav>

<!-- ===== الهيرو ===== -->
<section class="hero">
    <h1>👑 نظام VIP المتكامل</h1>
    <p>ارتقِ بتجربتك مع مستويات VIP الحصرية واستمتع بمزايا لا مثيل لها</p>
</section>

<!-- ===== معلومات المستخدم ===== -->
<div class="user-info-bar" id="userInfoBar">
    <div class="user-info-item">
        <span class="label">👤 المستخدم:</span>
        <span class="value" id="userName">تحميل...</span>
    </div>
    <div class="user-info-item">
        <span class="label">🆔 المعرف:</span>
        <span class="value" id="userId">000000</span>
    </div>
    <div class="user-info-item">
        <span class="label">⭐ المستوى:</span>
        <span class="value vip" id="userVip">لا يوجد</span>
    </div>
    <div class="user-info-item">
        <span class="label">🇪🇬 الرصيد:</span>
        <span class="value egp" id="userBalanceEgp">0 ج.م</span>
    </div>
    <div class="user-info-item">
        <span class="label">🇺🇸 الرصيد:</span>
        <span class="value usd" id="userBalanceUsd">0 $</span>
    </div>

    // ============================================================
    // 🔥 تهيئة Firebase
    // ============================================================
    function initializeFirebase() {
        try {
            if (firebase.apps.length > 0) {
                firebase.app().delete();
            }
            firebase.initializeApp(firebaseConfig);
            database = firebase.database();
            auth = firebase.auth();
            console.log('✅ Firebase initialized');

            auth.onAuthStateChanged((user) => {
                if (user) {
                    console.log('👤 User logged in:', user.uid);
                    getUserData();
                } else {
                    console.log('👤 No user logged in');
                    currentUser = null;
                    renderUserInfo();
                    renderVIPCards();
                }
            });
        } catch (error) {
            console.error('❌ Firebase error:', error);
        }
    }

    // ============================================================
    // 👤 بيانات المستخدم
    // ============================================================
    function getCurrentUserFromStorage() {
        try {
            return JSON.parse(localStorage.getItem('currentUser'));
        } catch {
            return null;
        }
    }

    function generateNumericId() {
        return Math.floor(100000 + Math.random() * 900000);
    }

    function getOrCreateNumericId() {
        let user = getCurrentUserFromStorage();
        if (!user) return generateNumericId();
        if (user.numericId) return user.numericId;
        const newId = generateNumericId();
        user.numericId = newId;
        localStorage.setItem('currentUser', JSON.stringify(user));
        return newId;
    }

    function formatNumericId(id) {
        if (!id) return "000000";
        const numId = parseInt(id);
        if (isNaN(numId)) return "000000";
        return numId.toString().padStart(6, '0');
    }

    async function getUserData() {
        try {
            const localUser = getCurrentUserFromStorage();
            if (!localUser) {
                currentUser = null;
                renderUserInfo();
                renderVIPCards();
                return;
            }

            currentUser = localUser;
            
            if (database) {
                const numericId = getOrCreateNumericId();
                const userRef = database.ref('users').orderByChild('numericId').equalTo(numericId);
                const snapshot = await userRef.once('value');
                if (snapshot.exists()) {
                    const users = snapshot.val();
                    const userId = Object.keys(users)[0];
                    const userData = users[userId];
                    currentUser = { ...localUser, ...userData, firebaseKey: userId };
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                }
            }
            
            renderUserInfo();
            renderVIPCards();
            
        } catch (error) {
            console.error('Error getting user data:', error);
            renderUserInfo();
            renderVIPCards();
        }
    }

    // ============================================================
    // 📊 عرض معلومات المستخدم
    // ============================================================
    function renderUserInfo() {
        if (!currentUser) {
            document.getElementById('userName').textContent = 'زائر';
            document.getElementById('userId').textContent = '000000';
            document.getElementById('userVip').textContent = 'لا يوجد';
            document.getElementById('userBalanceEgp').textContent = '0 ج.م';
            document.getElementById('userBalanceUsd').textContent = '0 $';
            document.getElementById('userTotalSpent').textContent = '0 ج.م';
            return;
        }

        const vipLevel = currentUser.vipLevel || 0;
        const vipName = VIP_DATA[vipLevel]?.name || 'لا يوجد';
        const vipIcon = VIP_DATA[vipLevel]?.icon || '';

        document.getElementById('userName').textContent = currentUser.nickname || currentUser.username || 'مستخدم';
        document.getElementById('userId').textContent = formatNumericId(currentUser.numericId);
        document.getElementById('userVip').textContent = vipIcon + ' ' + vipName;
        document.getElementById('userBalanceEgp').textContent = (currentUser.balanceEGP || 0) + ' ج.م';
        document.getElementById('userBalanceUsd').textContent = (currentUser.balanceUSD || 0) + ' $';
        document.getElementById('userTotalSpent').textContent = (currentUser.totalSpent || 0) + ' ج.م';
    }

    // ============================================================

    function renderVIPCards() {

        const userBalance = currentUser?.balanceEGP || 0;
        const totalSpent = currentUser?.totalSpent || 0;

        for (const key in VIP_DATA) {
            const vip = VIP_DATA[key];
            const isUnlocked = userVipLevel >= vip.id;
            const isCurrent = userVipLevel === vip.id;
            const canAfford = userBalance >= vip.price;
            const progress = Math.min(totalSpent / vip.targetAmount * 100, 100);

            // حالة البطاقة
            let cardStatus = '';
            if (isCurrent) cardStatus = 'current';
            else if (!isUnlocked) cardStatus = 'locked';

            // خلفية خاصة لـ VIP 2 (فيديو)
            let bgHtml = '';
            if (vip.id === 2 && vip.videoSrc) {
                bgHtml = `
                    <div class="lion-video-bg">
                        <video autoplay loop muted playsinline>
                            <source src="${vip.videoSrc}" type="video/mp4">
                        </video>
                        <div class="video-overlay"></div>
                    </div>
                `;
            } else {
                bgHtml = `<div class="vip-bg ${vip.bgClass}"></div>`;
            }

            // حالة الزر
            let btnText = '🔓 فتح المستوى';
            let btnDisabled = false;
            let btnBadge = `<span class="btn-badge">${vip.price} ${vip.currency}</span>`;

            if (isCurrent) {
                btnText = '✅ المستوى الحالي';
                btnDisabled = true;
                btnBadge = '';
            } else if (isUnlocked) {
                btnText = '✅ تم فتحه';
                btnDisabled = true;
                btnBadge = '';
            } else if (!canAfford) {
                btnText = '💰 رصيد غير كافٍ';
                btnDisabled = true;
                btnBadge = `<span class="btn-badge">${vip.price} ${vip.currency}</span>`;
            }

            // حالة VIP
            let statusHtml = '';
            if (isCurrent) {
                statusHtml = `<span class="vip-status current">✅ مستوى حالي</span>`;
            } else if (isUnlocked) {
                statusHtml = `<span class="vip-status unlocked">✅ مفتوح</span>`;
            } else {

            html += `

                        <div class="vip-price">${vip.price} <span>${vip.currency}</span></div>
                        ${statusHtml}
                        
                        <div class="vip-target">
                            <span class="target-label">🎯 الهدف المطلوب</span>
                            <span class="target-value">${vip.target}</span>
                            <div class="target-progress">
                                <div class="progress-bar" style="width: ${Math.min(progress, 100)}%;"></div>
                            </div>
                            <span style="font-size: 0.7rem; color: #94a3b8; display: block; margin-top: 4px;">
                                ${Math.round(Math.min(progress, 100))}% مكتمل
                            </span>
                        </div>

                        <ul class="vip-features">
                            ${vip.features.slice(0, 3).map(f => `<li><i class="fas fa-check-circle"></i> ${f}</li>`).join('')}
                            ${vip.features.length > 3 ? `<li style="color:#94a3b8;font-size:0.75rem;">+${vip.features.length - 3} مزايا أخرى</li>` : ''}

        container.innerHTML = html;

    // ============================================================
    // 📋 مودال التفاصيل
    // ============================================================
    function openVipModal(vipId) {
        const vip = VIP_DATA[vipId];
        if (!vip) return;

        selectedVip = vip;
        const userVipLevel = currentUser?.vipLevel || 0;
        const userBalance = currentUser?.balanceEGP || 0;
        const isUnlocked = userVipLevel >= vip.id;
        const isCurrent = userVipLevel === vip.id;
        const canAfford = userBalance >= vip.price;

        document.getElementById('modalIcon').textContent = vip.icon;
        document.getElementById('modalTitle').textContent = `${vip.name} - ${vip.description}`;
        document.getElementById('modalDesc').innerHTML = `
            🎯 الهدف: ${vip.target}<br>
            💰 السعر: ${vip.price} ${vip.currency}<br>
            ${isCurrent ? '✅ هذا مستواك الحالي' : isUnlocked ? '✅ تم فتح هذا المستوى' : ''}
        `;

        const featuresHtml = vip.features.map(f => `<li><i class="fas fa-star"></i> ${f}</li>`).join('');
        document.getElementById('modalFeatures').innerHTML = `<ul style="list-style:none;padding:0;">${featuresHtml}</ul>`;

        const confirmBtn = document.getElementById('modalConfirmBtn');
        
        // تعيين لون الزر حسب مستوى VIP
        const cardElement = document.querySelector(`.${vip.cardClass}`);
        if (cardElement) {
            const style = getComputedStyle(cardElement);
            confirmBtn.style.setProperty('--vip-color', style.getPropertyValue('--vip-color'));
            confirmBtn.style.setProperty('--vip-color-dark', style.getPropertyValue('--vip-color-dark'));
        }
        
        if (isCurrent) {
            confirmBtn.textContent = '✅ هذا مستواك الحالي';
            confirmBtn.disabled = true;
        } else if (isUnlocked) {
            confirmBtn.textContent = '✅ تم فتح هذا المستوى بالفعل';
            confirmBtn.disabled = true;
        } else if (!canAfford) {
            confirmBtn.textContent = `💰 رصيد غير كافٍ (تحتاج ${vip.price} ${vip.currency})`;
            confirmBtn.disabled = true;
        } else {
            confirmBtn.textContent = `🔓 ترقية إلى ${vip.name} (${vip.price} ${vip.currency})`;
            confirmBtn.disabled = false;
        }

        document.getElementById('modalOverlay').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal(event) {
        if (event && event.target !== event.currentTarget) return;
        document.getElementById('modalOverlay').classList.remove('active');
        document.body.style.overflow = 'auto';
        selectedVip = null;
    }

    // ============================================================
    // 💰 تأكيد الترقية
    // ============================================================
    async function confirmUpgrade() {
        if (!selectedVip) return;
        if (!currentUser) {
            showToast('⚠️ يرجى تسجيل الدخول أولاً', 'warning');
            window.location.href = 'Login2.html';
            return;
        }

        const vip = selectedVip;
        const userBalance = currentUser.balanceEGP || 0;

        if (userBalance < vip.price) {
            showToast(`❌ رصيدك غير كافٍ! تحتاج إلى ${vip.price} جنيه`, 'error');
            closeModal();
            return;
        }

        try {
            const newBalance = userBalance - vip.price;
            const newVipLevel = vip.id;

            // تحديث في Firebase
            await database.ref('users/' + currentUser.firebaseKey).update({
                balanceEGP: newBalance,
                vipLevel: newVipLevel,
                totalSpent: (currentUser.totalSpent || 0) + vip.price,
                updatedAt: new Date().toISOString(),
                // تسجيل الإنجاز
                [`achievements/vip_${vip.id}`]: new Date().toISOString(),
                // تحديث المقتنيات
                activeFrame: `frame_vip${vip.id}`,
                activeEntrance: `entrance_${vip.id}`,
                activeTitle: `title_vip${vip.id}`
            });

            // تحديث محلياً
            currentUser.balanceEGP = newBalance;
            currentUser.vipLevel = newVipLevel;
            currentUser.totalSpent = (currentUser.totalSpent || 0) + vip.price;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));

            // تحديث واجهة المستخدم
            renderUserInfo();
            renderVIPCards();

            showToast(`🎉 تهانينا! تمت ترقيتك إلى ${vip.name} بنجاح!`, 'success');
            closeModal();

            // إرسال إشعار
            await database.ref('users/' + currentUser.firebaseKey + '/notifications').push({
                id: Date.now(),
                text: `🎉 تمت ترقيتك إلى ${vip.name}! استمتع بالمزايا الجديدة ✨`,
                read: false,
                date: new Date().toLocaleString('ar-EG'),
                type: 'vip_upgrade',
                createdAt: new Date().toISOString()
            });

            // تحديث إنجازات المستخدم في لوحة الأدمن
            await updateAdminAchievements(currentUser.firebaseKey, vip.id);

        } catch (error) {
            console.error('Upgrade error:', error);
            showToast('❌ حدث خطأ أثناء الترقية', 'error');
        }
    }

    // ============================================================
    // 📊 تحديث إنجازات الأدمن
    // ============================================================
    async function updateAdminAchievements(userKey, vipLevel) {
        try {
            if (!database) return;

            // تحديث إنجازات المستخدم في قاعدة بيانات الأدمن
            await database.ref('users/' + userKey + '/achievements').update({
                [`vip_${vipLevel}`]: new Date().toISOString(),
                lastUpgrade: new Date().toISOString()
            });

            // تسجيل في سجل الترقيات
            await database.ref('vip_upgrades').push({
                userId: currentUser.numericId,
                username: currentUser.username,
                vipLevel: vipLevel,
                amount: VIP_DATA[vipLevel].price,
                date: new Date().toISOString()
            });

        } catch (error) {
            console.error('Error updating admin achievements:', error);
        }
    }

    // ============================================================
    // 🍞 التوست
    // ============================================================
    function showToast(message, type = 'info') {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();

        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        const icons = {
            success: '✅',
            error: '❌',
            warning: '⚠️',
            info: 'ℹ️'
        };
        toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span> ${message}`;
        document.body.appendChild(toast);

        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(20px)';
            toast.style.transition = 'all 0.3s ease';
            setTimeout(() => toast.remove(), 300);
        }, 4000);
    }

    // ============================================================
    // 🚪 تسجيل الخروج
    // ============================================================
    function logout() {
        localStorage.removeItem('currentUser');
        window.location.href = 'Login2.html';

    // ============================================================

    // ============================================================
    window.onload = function() {
        initializeFirebase();
        
        // تحديث البيانات كل 30 ثانية
        setInterval(() => {
            getUserData();
        }, 30000);
    };
