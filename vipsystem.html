<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👑 نظام VIP - VipSystem</title>
    <link rel="shortcut icon" href="images/videoslogo/vip.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        /* ===== TABS ===== */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255,255,255,0.05);
            color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.05);
            white-space: nowrap;
        }
        .tab-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            border-color: #8b5cf6;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
            gap: 15px;
        }
        .header .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header .logo i { color: #ffd700; }
        .header .back-btn {
            padding: 10px 25px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .header .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }
        .header .btn-admin { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .header .btn-admin:hover { box-shadow: 0 5px 20px rgba(245, 158, 11, 0.4); }
        .header .login-btn { background: linear-gradient(135deg, #10b981, #059669); }
        .header .login-btn:hover { box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4); }
        .header .logout-btn { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .header .logout-btn:hover { box-shadow: 0 5px 20px rgba(239, 68, 68, 0.4); }
        /* ===== USER INFO ===== */
        .user-info {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .user-info .user-details { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .user-info .user-avatar {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f46e5, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: white; overflow: hidden;
            flex-shrink: 0;
        }
        .user-info .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-info .user-name { font-size: 1.2rem; font-weight: bold; word-break: break-word; }
        .user-info .user-id { color: #94a3b8; font-family: monospace; font-size: 0.9rem; word-break: break-all; }
        .user-info .user-vip {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 20px; border-radius: 12px;
            background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.2);
            flex-shrink: 0;
        }
        .user-info .user-vip .vip-level { font-size: 1.5rem; font-weight: bold; color: #ffd700; }
        .user-info .user-vip .vip-status { font-size: 0.8rem; color: #94a3b8; }
        /* ===== VIP GRID (cards) ===== */
        .vip-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }
        .vip-card {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 580px;
        }
        .vip-card:hover {
            transform: translateY(-8px);
            border-color: #ffd700;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.1);
        }
        .vip-card .vip-badge {
            position: absolute;
            top: 15px; right: 15px;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            z-index: 2;
        }
        .vip-card .vip-badge.vip1 { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .vip-card .vip-badge.vip2 { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        .vip-card .vip-badge.vip3 { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; }
        .vip-card .vip-badge.vip4 { background: linear-gradient(135deg, #06b6d4, #0891b2); color: white; }
        .vip-card .vip-badge.vip5 { background: linear-gradient(135deg, #ec4899, #db2777); color: white; }
        .vip-card .vip-badge.vip6 { background: linear-gradient(135deg, #f59e0b, #b45309); color: white; }
        .vip-card .vip-badge.vip7 { background: linear-gradient(135deg, #14b8a6, #0d9488); color: white; }
        .vip-card .vip-badge.vip8 { background: linear-gradient(135deg, #8b5cf6, #4c1d95); color: white; }
        .vip-card .vip-badge.vip9 { background: linear-gradient(135deg, #f472b6, #be185d); color: white; }
        .vip-card .vip-badge.vip10 { background: linear-gradient(135deg, #ffd700, #f59e0b); color: #1a1a2e; }
        .vip-card .vip-badge.owned { background: #10b981; color: white; }
        .vip-card .vip-badge.expired { background: #6b7280; color: white; }
        .vip-card .vip-badge.active { background: #3b82f6; color: white; }
        .vip-card .vip-badge.special { background: linear-gradient(135deg, #ffd700, #f59e0b); color: #1a1a2e; }
        .vip-card .vip-badge.king { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; }
        .vip-card .vip-badge.elite { background: linear-gradient(135deg, #06b6d4, #0891b2); color: white; }
        
        /* ===== VIDEO CONTAINER مع صورة مصغرة ===== */
        .vip-card .vip-video-container {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 18px;
            position: relative;
            background: #0a0a1a;
            aspect-ratio: 9/16;
            min-height: 350px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .vip-card .vip-video-container video {
            width: 100%; height: 100%;
            object-fit: cover;
            background: #0a0a1a;
            display: none; /* مخفي حتى يتم الضغط */
        }
        .vip-card .vip-video-container video.playing {
            display: block;
        }
        .vip-card .vip-video-container .video-thumbnail {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }
        .vip-card .vip-video-container .video-thumbnail.hidden {
            display: none;
        }
        .vip-card .vip-video-container .video-play-btn {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            font-size: 4rem;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 0 30px rgba(0,0,0,0.8);
            pointer-events: none;
            transition: 0.3s;
        }
        .vip-card .vip-video-container:hover .video-play-btn {
            transform: translate(-50%, -50%) scale(1.1);
            color: #ffd700;
        }
        .vip-card .vip-video-container .video-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; color: white;
            opacity: 0; transition: 0.3s; pointer-events: none;
            z-index: 3;
        }
        .vip-card .vip-video-container:hover .video-overlay { opacity: 1; }
        
        .vip-card .vip-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 8px; color: #ffd700; }
        .vip-card .vip-description { color: #94a3b8; font-size: 0.85rem; line-height: 1.6; margin-bottom: 15px; flex-grow: 1; }
        .vip-card .vip-requirements {
            background: rgba(255,255,255,0.03);
            padding: 15px; border-radius: 12px; margin-bottom: 15px; flex-shrink: 0;
        }
        .vip-card .vip-requirements .req-item {
            display: flex; justify-content: space-between;
            padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
        }
        .vip-card .vip-requirements .req-item:last-child { border-bottom: none; }
        .vip-card .vip-requirements .req-item .req-label { color: #94a3b8; }
        .vip-card .vip-requirements .req-item .req-value { color: #fff; font-weight: bold; }
        .vip-card .vip-status-text {
            text-align: center; padding: 10px; border-radius: 10px;
            margin-bottom: 15px; font-weight: bold; font-size: 0.9rem; flex-shrink: 0;
        }
        .vip-card .vip-status-text.active { background: rgba(59,130,246,0.1); color: #3b82f6; border: 1px solid rgba(59,130,246,0.2); }
        .vip-card .vip-status-text.owned { background: rgba(255,215,0,0.1); color: #ffd700; border: 1px solid rgba(255,215,0,0.2); }
        .vip-card .vip-status-text.special { background: rgba(255,215,0,0.15); color: #ffd700; border: 1px solid rgba(255,215,0,0.3); font-size: 1rem; }
        .vip-card .vip-status-text.inactive { background: rgba(107,114,128,0.1); color: #94a3b8; border: 1px solid rgba(107,114,128,0.2); }
        .vip-card .vip-status-text.locked { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
        .vip-card .vip-actions { display: flex; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
        .vip-card .vip-actions button {
            flex: 1; padding: 12px 16px; border: none; border-radius: 10px;
            cursor: pointer; font-weight: bold; transition: 0.3s; min-width: 100px; font-size: 0.9rem;
        }
        .vip-card .vip-actions .btn-buy { background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: white; }
        .vip-card .vip-actions .btn-buy:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(139,92,246,0.4); }
        .vip-card .vip-actions .btn-buy.disabled { background: #6b7280; cursor: not-allowed; }
        .vip-card .vip-actions .btn-buy.disabled:hover { transform: none; box-shadow: none; }
        .vip-card .vip-actions .btn-activate { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .vip-card .vip-actions .btn-activate:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(16,185,129,0.4); }
        .vip-card .vip-actions .btn-deactivate { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
        .vip-card .vip-actions .btn-deactivate:hover { background: rgba(239,68,68,0.2); transform: translateY(-2px); }
        .vip-card .vip-actions .btn-deactivate.active { background: #ef4444; color: white; border: none; }
        .vip-card .vip-actions .btn-deactivate.active:hover { background: #dc2626; }
        /* ===== CHAT STYLES ===== */
        .chatstyles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }
        .chatstyle-card {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 400px;
        }
        .chatstyle-card:hover {
            transform: translateY(-8px);
            border-color: #ffd700;
            box-shadow: 0 20px 60px rgba(255,215,0,0.1);
        }
        .chatstyle-card .style-preview {
            width: 100%; max-width: 280px;
            border-radius: 16px;
            overflow: hidden;
            background: #0a0a1a;
            margin-bottom: 15px;
            aspect-ratio: 1/1;
            display: flex; align-items: center; justify-content: center;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .chatstyle-card .style-preview img {
            width: 100%; height: 100%;
            object-fit: contain;
            border-radius: 12px;
            background: transparent;
        }
        .chatstyle-card .style-name { font-size: 1.2rem; font-weight: bold; color: #ffd700; margin-bottom: 5px; }
        .chatstyle-card .style-price { font-size: 1.1rem; color: #10b981; font-weight: bold; margin-bottom: 10px; }
        .chatstyle-card .style-duration { font-size: 0.85rem; color: #94a3b8; margin-bottom: 15px; }
        .chatstyle-card .style-status {
            padding: 6px 16px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; margin-bottom: 12px;
        }
        .chatstyle-card .style-status.active { background: rgba(59,130,246,0.15); color: #3b82f6; border: 1px solid rgba(59,130,246,0.2); }
        .chatstyle-card .style-status.owned { background: rgba(255,215,0,0.15); color: #ffd700; border: 1px solid rgba(255,215,0,0.2); }
        .chatstyle-card .style-status.inactive { background: rgba(107,114,128,0.15); color: #94a3b8; border: 1px solid rgba(107,114,128,0.2); }
        .chatstyle-card .style-status.expired { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
        .chatstyle-card .style-actions { display: flex; gap: 10px; width: 100%; flex-wrap: wrap; }
        .chatstyle-card .style-actions button {
            flex: 1; padding: 10px; border: none; border-radius: 10px;
            cursor: pointer; font-weight: bold; transition: 0.3s; min-width: 80px; font-size: 0.85rem;
        }
        .chatstyle-card .style-actions .btn-buy { background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: white; }
        .chatstyle-card .style-actions .btn-buy:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(139,92,246,0.4); }
        .chatstyle-card .style-actions .btn-buy.disabled { background: #6b7280; cursor: not-allowed; }
        .chatstyle-card .style-actions .btn-buy.disabled:hover { transform: none; box-shadow: none; }
        .chatstyle-card .style-actions .btn-activate { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .chatstyle-card .style-actions .btn-activate:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(16,185,129,0.4); }
        .chatstyle-card .style-actions .btn-deactivate { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
        .chatstyle-card .style-actions .btn-deactivate:hover { background: rgba(239,68,68,0.2); transform: translateY(-2px); }
        .chatstyle-card .style-actions .btn-deactivate.active { background: #ef4444; color: white; border: none; }
        .chatstyle-card .style-actions .btn-deactivate.active:hover { background: #dc2626; }
        /* ===== TOAST ===== */
        .toast {
            position: fixed; top: 20px; right: 20px;
            padding: 14px 24px; border-radius: 12px;
            color: white; font-weight: 600; z-index: 9999;
            animation: slideDown 0.3s ease; max-width: 90vw;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        .toast.warning { background: #f59e0b; }
        .toast.info { background: #3b82f6; }
        @keyframes slideDown {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            body { padding: 12px; }
            .vip-grid { grid-template-columns: 1fr; gap: 20px; }
            .chatstyles-grid { grid-template-columns: 1fr; }
            .user-info { flex-direction: column; align-items: flex-start; }
            .header .logo { font-size: 1.3rem; }
            .vip-card { min-height: 480px; padding: 18px; }
            .vip-card .vip-video-container { min-height: 250px; }
            .tabs .tab-btn { padding: 10px 15px; font-size: 0.8rem; }
            .chatstyle-card { min-height: 350px; }
            .header .back-btn { padding: 8px 15px; font-size: 0.8rem; }
            .header { padding: 15px; }
            .vip-card .vip-video-container .video-play-btn { font-size: 3rem; }
        }
        @media (max-width: 480px) {
            body { padding: 8px; }
            .vip-card { padding: 14px; min-height: 420px; }
            .vip-card .vip-title { font-size: 1.1rem; }
            .vip-card .vip-actions button { font-size: 0.8rem; padding: 10px; }
            .vip-card .vip-video-container { min-height: 200px; }
            .user-info .user-details { flex-direction: column; align-items: flex-start; gap: 10px; }
            .chatstyle-card { padding: 16px; min-height: 300px; }
            .chatstyle-card .style-preview { max-width: 180px; }
            .header .logo { font-size: 1.1rem; }
            .header .back-btn { padding: 6px 12px; font-size: 0.7rem; }
            .tabs .tab-btn { padding: 8px 12px; font-size: 0.7rem; }
            .vip-card .vip-video-container .video-play-btn { font-size: 2.5rem; }
        }
        /* ===== جمعية المقتنيات (new section) ===== */
        .collectibles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }
        .collectible-card {
            background: rgba(255,255,255,0.05);

            padding: 25px;

        }
        .collectible-card:hover {
            transform: translateY(-8px);

            box-shadow: 0 20px 60px rgba(255,215,0,0.1);
        }
        .collectible-card .collectible-video {
            width: 100%; max-width: 280px;
            border-radius: 16px;
            overflow: hidden;
            background: #0a0a1a;
            margin-bottom: 15px;
            aspect-ratio: 1/1;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            cursor: pointer;
        }
        .collectible-card .collectible-video video {
            width: 100%; height: 100%;
            object-fit: cover;
            display: none;
        }
        .collectible-card .collectible-video video.playing {
            display: block;
        }
        .collectible-card .collectible-video .collectible-thumbnail {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }
        .collectible-card .collectible-video .collectible-thumbnail.hidden {
            display: none;
        }
        .collectible-card .collectible-video .video-play-btn {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            font-size: 4rem;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 0 30px rgba(0,0,0,0.8);
            pointer-events: none;
            transition: 0.3s;
        }
        .collectible-card .collectible-video:hover .video-play-btn {
            transform: translate(-50%, -50%) scale(1.1);
            color: #ffd700;

    async function loadUserFromFirebase() {
        const stored = getStoredUser();
        if (!stored) { document.getElementById('userName').textContent = 'زائر'; document.getElementById('userId').textContent = '🆔 ---'; updateLoginButtons(false); return false; }
        try {
            const snapshot = await database.ref('users').orderByChild('numericId').equalTo(stored.numericId).once('value');
            if (snapshot.exists()) {
                const userData = snapshot.val();
                const firebaseKey = Object.keys(userData)[0];
                const fullUser = userData[firebaseKey];
                saveUserToStorage(fullUser, firebaseKey);
                currentFirebaseUserId = firebaseKey;
                updateLoginButtons(true);

    function playVideoOnClick(container) {
        const video = container.querySelector('video');
        const thumbnail = container.querySelector('.video-thumbnail') || container.querySelector('.collectible-thumbnail');
        const playBtn = container.querySelector('.video-play-btn');
        
        if (!video) return;
        
        container.addEventListener('click', function(e) {
            // منع التشغيل إذا تم الضغط على زر أو رابط داخل البطاقة
            if (e.target.closest('button') || e.target.closest('a')) return;
            
            if (video.classList.contains('playing')) {
                // إذا كان الفيديو يعمل، نوقفه ونعرض الصورة
                video.pause();
                video.classList.remove('playing');
                if (thumbnail) thumbnail.classList.remove('hidden');
                if (playBtn) playBtn.style.display = 'block';
                video.currentTime = 0;
            } else {
                // تشغيل الفيديو
                video.classList.add('playing');
                if (thumbnail) thumbnail.classList.add('hidden');
                if (playBtn) playBtn.style.display = 'none';
                video.play().catch(() => {});
            }
        });
        
        // عند انتهاء الفيديو نعود للصورة
        video.addEventListener('ended', function() {
            video.classList.remove('playing');
            if (thumbnail) thumbnail.classList.remove('hidden');
            if (playBtn) playBtn.style.display = 'block';
        });
    }

            html += `
                <div class="vip-card">
                    <span class="${badgeClass}">${badgeText}</span>
                    <div class="vip-video-container" data-video>
                        <img class="video-thumbnail" src="${cfg.thumbnail}" alt="${cfg.name}" loading="lazy">

    // ===== VIP ACTIONS =====
    async function buyVIP(level) {
        if (!currentUser || !currentFirebaseUserId) { showToast('⚠️ يرجى تسجيل الدخول أولاً', 'warning'); return; }
        const cfg = VIP_CONFIG[level];
        if (!cfg) { showToast('❌ مستوى VIP غير صحيح', 'error'); return; }
        try {
            const snapshot = await database.ref('users/' + currentFirebaseUserId).once('value');
            const user = snapshot.val();
            if (!user) { showToast('❌ المستخدم غير موجود', 'error'); return; }
            const currentVIP = user.vip || { active: null, expiresAt: null };
            if (currentVIP.active === level) {
                const exp = currentVIP.expiresAt ? new Date(currentVIP.expiresAt) : null;
                if (exp && exp > new Date()) { showToast(`⚠️ VIP ${level} مفعل بالفعل`, 'warning'); return; }
            }
            if (user.balanceEGP < cfg.reqEGP) { showToast(`❌ رصيد غير كافٍ (مطلوب ${cfg.reqEGP} ج.م)`, 'error'); return; }
            if (!confirm(`تأكيد شراء VIP ${level} (${cfg.title}) مقابل ${cfg.reqEGP} ج.م؟`)) return;

            const newBalance = (user.balanceEGP || 0) - cfg.reqEGP;
            const now = new Date();
            const expiresAt = new Date(now); expiresAt.setDate(expiresAt.getDate() + cfg.duration);

            const updateData = { balanceEGP: newBalance, updatedAt: now.toISOString() };
            const vipPurchased = user.vipPurchased || {};
            vipPurchased[level] = true;
            updateData['vip/active'] = level;
            updateData['vip/expiresAt'] = expiresAt.toISOString();
            updateData['vip/activatedAt'] = now.toISOString();
            updateData['vip/amount'] = cfg.reqEGP;
            updateData.vipPurchased = vipPurchased;

            await database.ref('users/' + currentFirebaseUserId).update(updateData);
            const updatedUser = { ...user, ...updateData };
            saveUserToStorage(updatedUser, currentFirebaseUserId);

            await logPurchaseToAdmin({ type:'vip_purchase', itemName:`VIP ${level}`, itemId:`vip${level}`, price:cfg.reqEGP, currency:'EGP', userId:user.numericId, username:user.nickname||user.username, userFirebaseKey:currentFirebaseUserId, duration:cfg.duration, startDate:now.toISOString(), expiryDate:expiresAt.toISOString(), note:`شراء VIP ${level}` });

            await grantCollectiblesForVIP(level, user, now, expiresAt);

            showToast(`✅ تم شراء VIP ${level} بنجاح!`, 'success');
            await ensureUserData();
        } catch(e) { console.error(e); showToast('❌ حدث خطأ', 'error'); }
    }

    // ============================================================
    // 🎁 منح أطارات المقتنيات تلقائياً عند شراء VIP
    // ============================================================
    async function grantCollectiblesForVIP(level, user, startDate, expiryDate) {
        try {
            const collectiblesToGrant = COLLECTIBLES.filter(c => {
                if (level === 6) return c.source === 'VIP 6';
                return c.source === `VIP ${level}`;
            });
            if (collectiblesToGrant.length === 0) return;

            const userCollectibles = user.collectibles || {};
            let updated = false;
            collectiblesToGrant.forEach(c => {
                if (!userCollectibles[c.id]) {
                    userCollectibles[c.id] = { owned: true, purchasedAt: startDate.toISOString(), expiresAt: expiryDate.toISOString() };
                    updated = true;
                }
            });
            if (updated) {
                await database.ref('users/' + currentFirebaseUserId + '/collectibles').set(userCollectibles);
                const snap = await database.ref('users/' + currentFirebaseUserId).once('value');
                const fresh = snap.val();
                if (fresh) { saveUserToStorage(fresh, currentFirebaseUserId); }
                showToast(`🎁 تم منح أطارات المقتنيات الخاصة بـ VIP ${level}`, 'success');
            }
        } catch(e) { console.error('خطأ في منح المقتنيات:', e); }
    }

    function renderFrames(user) {
        const grid = document.getElementById('framesGrid');
        if (!grid) return;

        const activeFrame = user ? (user.activeFrame || null) : null;
        const activeCollectible = user ? (user.activeCollectible || null) : null;

        grid.innerHTML = FRAMES.map(frame => {
            const frameData = userFrames[frame.id] || null;
            const isOwned = frameData && frameData.owned === true;
            const isActive = activeFrame === frame.id;
            const expiresAt = frameData?.expiresAt ? new Date(frameData.expiresAt) : null;
            const isExpired = expiresAt && expiresAt < new Date();
            const isValid = isOwned && !isExpired;
            
            const hasActiveCollectible = activeCollectible !== null;

            let statusText = 'غير مملوك', statusClass = 'inactive';
            if (isActive && isValid) { statusText = '✅ مفعل حالياً'; statusClass = 'active'; }
            else if (isValid) { statusText = '📦 مملوك'; statusClass = 'owned'; }
            else if (isOwned && isExpired) { statusText = '⏳ منتهي الصلاحية'; statusClass = 'expired'; }
            else if (frame.isSpecial) { statusText = '🎁 خاص - للإهداء فقط'; statusClass = 'special'; }

            const canAfford = user ? (user.balanceEGP >= frame.price) : false;
            let badgeClass = 'vip-badge';
            let badgeText = '🖼️ إطار';
            if (frame.isSpecial) { badgeClass += ' special'; badgeText = '🎁 خاص'; }
            else if (frame.badgeClass) { badgeClass += ' ' + frame.badgeClass; badgeText = frame.badgeText || '🖼️ إطار'; }
            else { badgeClass += ' owned'; }

            let actionsHTML = '';
            
            if (hasActiveCollectible && !isActive) {
                actionsHTML = `<button class="btn-buy disabled" disabled style="width:100%; background:#f59e0b; color:#1a1a2e;">⚠️ إطار مقتنيات مفعل حالياً</button>`;
            } else if (!user) {
                actionsHTML = `<button class="btn-buy disabled" disabled style="width:100%;">🔒 يرجى تسجيل الدخول</button>`;
            } else if (frame.isSpecial) {
                actionsHTML = `<button class="btn-buy disabled" disabled style="background:#ffd700;color:#1a1a2e;cursor:default;">🎁 لا يمكن الشراء</button>`;
            } else if (isActive) {
                actionsHTML = `<button class="btn-deactivate active" onclick="deactivateFrame('${frame.id}')"><i class="fas fa-times"></i> إلغاء التفعيل</button>`;
            } else if (isValid) {
                actionsHTML = `<button class="btn-activate" onclick="activateFrame('${frame.id}')"><i class="fas fa-play"></i> تفعيل</button>`;
            } else if (isOwned && isExpired) {
                actionsHTML = `<button class="btn-buy" onclick="buyFrame('${frame.id}', ${frame.price}, '${frame.name}')"><i class="fas fa-sync"></i> شراء مجدد (${frame.price} ج.م)</button>`;
            } else {
                actionsHTML = `<button class="btn-buy ${!canAfford?'disabled':''}" onclick="buyFrame('${frame.id}', ${frame.price}, '${frame.name}')" ${!canAfford?'disabled':''}>${canAfford ? '<i class="fas fa-shopping-cart"></i> شراء' : '❌ رصيد غير كافٍ'}</button>`;
            }

            let warningHTML = '';
            if (hasActiveCollectible && !isActive) {
                warningHTML = `<div class="frame-active-warning">⚠️ إطار مقتنيات مفعل حالياً. قم بإلغائه أولاً لتفعيل هذا الإطار.</div>`;

            let previewHTML = `
                <div class="vip-video-container" data-video>
                    <img class="video-thumbnail" src="${frame.thumbnail || frame.embedUrl.replace('.mp4', '.jpg')}" alt="${frame.name}" loading="lazy">

                        <source src="${frame.embedUrl}" type="video/mp4">

                    <div class="video-overlay"><i class="fas fa-play-circle"></i></div>

            return `

                    <div class="vip-description">${frame.isSpecial ? '🎁 هذا الإطار خاص ولا يمكن شراؤه' : frame.id==='frame_legend'?'⚡ إطار الأسطورة - أظهر قوتك':frame.id==='frame_support'?'🛡️ إطار الدعم - هدية من الإدارة':'إطار مميز للغرف الصوتية'}</div>
                    <div class="vip-requirements">

    // ===== FRAMES ACTIONS =====
    async function buyFrame(frameId, price, name) {
        if (!currentUser || !currentFirebaseUserId) { showToast('⚠️ يرجى تسجيل الدخول', 'warning'); return; }
        const frame = FRAMES.find(f => f.id === frameId);
        if (frame?.isSpecial) { showToast('⚠️ هذا الإطار خاص', 'warning'); return; }
        try {
            const snap = await database.ref('users/' + currentFirebaseUserId).once('value');
            const user = snap.val();
            if (!user) { showToast('❌ المستخدم غير موجود', 'error'); return; }
            if (user.balanceEGP < price) { showToast(`⚠️ رصيد غير كافٍ`, 'warning'); return; }
            if (!confirm(`تأكيد شراء "${name}" مقابل ${price} ج.م؟`)) return;
            const newBalance = (user.balanceEGP || 0) - price;
            const now = new Date();
            const expiresAt = new Date(now); expiresAt.setDate(expiresAt.getDate() + 30);
            const frames = user.frames || {};
            frames[frameId] = { owned: true, purchasedAt: now.toISOString(), expiresAt: expiresAt.toISOString() };
            await database.ref('users/' + currentFirebaseUserId).update({ balanceEGP: newBalance, frames: frames, updatedAt: now.toISOString() });
            const updatedUser = { ...user, balanceEGP: newBalance, frames: frames };
            saveUserToStorage(updatedUser, currentFirebaseUserId);
            await logPurchaseToAdmin({ type:'frame_purchase', itemName:name, itemId:frameId, price, currency:'EGP', userId:user.numericId, username:user.nickname||user.username, userFirebaseKey:currentFirebaseUserId, duration:30, startDate:now.toISOString(), expiryDate:expiresAt.toISOString(), note:`شراء إطار ${name}` });
            showToast(`✅ تم شراء "${name}"`, 'success');
            await ensureUserData();
        } catch(e) { console.error(e); showToast('❌ حدث خطأ', 'error'); }
    }

    async function activateFrame(frameId) {
        if (!currentUser || !currentFirebaseUserId) { showToast('⚠️ يرجى تسجيل الدخول', 'warning'); return; }
        try {
            const snap = await database.ref('users/' + currentFirebaseUserId).once('value');
            const user = snap.val();
            if (!user) { showToast('❌ المستخدم غير موجود', 'error'); return; }
            
            const activeCollectible = user.activeCollectible || null;
            if (activeCollectible) {
                if (!confirm(`⚠️ يوجد إطار مقتنيات مفعل حالياً (${activeCollectible}). سيتم إلغاء تفعيله تلقائياً. هل تريد المتابعة؟`)) {
                    return;
                }
                await database.ref('users/' + currentFirebaseUserId + '/activeCollectible').set(null);
            }
            
            const frames = user.frames || {};
            const frame = frames[frameId];
            if (!frame || !frame.owned) { showToast('⚠️ هذا الإطار غير مملوك', 'warning'); return; }
            const exp = frame.expiresAt ? new Date(frame.expiresAt) : null;
            if (exp && exp < new Date()) { showToast('⏳ صلاحية منتهية', 'warning'); return; }
            
            await database.ref('users/' + currentFirebaseUserId + '/activeFrame').set(frameId);
            const updatedUser = { ...user, activeFrame: frameId, activeCollectible: null };
            saveUserToStorage(updatedUser, currentFirebaseUserId);
            
            showToast('✅ تم تفعيل إطار المقاعد (تم إلغاء تفعيل إطار المقتنيات)', 'success');
            await ensureUserData();
            renderFrames(currentUser);
            renderCollectibles(currentUser);
        } catch(e) { console.error(e); showToast('❌ حدث خطأ', 'error'); }
    }

    async function deactivateFrame(frameId) {
        if (!currentUser || !currentFirebaseUserId) { showToast('⚠️ يرجى تسجيل الدخول', 'warning'); return; }
        if (!confirm('⚠️ إلغاء تفعيل هذا الإطار؟')) return;
        try {
            await database.ref('users/' + currentFirebaseUserId + '/activeFrame').set(null);

            if (user) {

            showToast('✅ تم إلغاء تفعيل إطار المقاعد', 'success');
            await ensureUserData();
            renderFrames(currentUser);
        } catch(e) { console.error(e); showToast('❌ حدث خطأ', 'error'); }
    }

            await database.ref('users/' + currentFirebaseUserId + '/activeChatStyle').set(null);
            const snap = await database.ref('users/' + currentFirebaseUserId).once('value');
            const user = snap.val();
            if (user) saveUserToStorage(user, currentFirebaseUserId);
            showToast('✅ تم إلغاء التفعيل', 'success');
            await ensureUserData();
        } catch(e) { console.error(e); showToast('❌ حدث خطأ', 'error'); }
    }

    // ============================================================
    // 🎁 COLLECTIBLES
    // ============================================================
    function renderCollectibles(user) {
        const grid = document.getElementById('collectiblesGrid');
        if (!grid) return;
        const userCollectibles = user ? (user.collectibles || {}) : {};
        const activeCollectible = user ? (user.activeCollectible || null) : null;
        const activeFrame = user ? (user.activeFrame || null) : null;

        grid.innerHTML = COLLECTIBLES.map(c => {
            const data = userCollectibles[c.id] || null;
            const isOwned = data && data.owned === true;
            const isActive = activeCollectible === c.id;
            const expiresAt = data?.expiresAt ? new Date(data.expiresAt) : null;
            const isExpired = expiresAt && expiresAt < new Date();
            const isValid = isOwned && !isExpired;
            
            const hasActiveFrame = activeFrame !== null;

            let statusText = '🔒 مقفل', statusClass = 'locked';
            if (isActive && isValid) { statusText = '✅ مفعل حالياً'; statusClass = 'active'; }
            else if (isValid) { statusText = '🔓 مفتوح'; statusClass = 'unlocked'; }
            else if (isOwned && isExpired) { statusText = '⏳ منتهي'; statusClass = 'locked'; }

            let actionsHTML = '';
            let warningHTML = '';

            if (hasActiveFrame && !isActive && isOwned) {
                warningHTML = `<div class="frame-active-warning">⚠️ إطار مقاعد مفعل حالياً. قم بإلغائه أولاً لتفعيل هذا الإطار.</div>`;
            }

            if (!user) {
                actionsHTML = `<button class="btn-disabled" disabled>🔒 يرجى تسجيل الدخول</button>`;
            } else if (!isValid) {
                actionsHTML = `<button class="btn-disabled" disabled>${isOwned && isExpired ? '⏳ منتهي' : '🔒 مقفل'}</button>`;
            } else if (isActive) {
                actionsHTML = `<button class="btn-deactivate active" onclick="deactivateCollectible('${c.id}')"><i class="fas fa-times"></i> إلغاء التفعيل</button>`;
            } else if (hasActiveFrame) {
                actionsHTML = `<button class="btn-disabled" disabled>⚠️ إطار مقاعد مفعل</button>`;
            } else {
                actionsHTML = `<button class="btn-activate" onclick="activateCollectible('${c.id}')"><i class="fas fa-play"></i> تفعيل</button>`;
            }

            return `
                <div class="collectible-card">
                    <div class="collectible-video" data-video>
                        <img class="collectible-thumbnail" src="${c.thumbnail || c.video.replace('.mp4', '.jpg')}" alt="${c.name}" loading="lazy">
                        <video preload="none" muted playsinline>
                            <source src="${c.video}" type="video/mp4">
                        </video>
                        <div class="video-play-btn"><i class="fas fa-play-circle"></i></div>
                    </div>
                    <div class="collectible-name">${c.name}</div>
                    <div class="collectible-source">📌 مصدر: ${c.source}</div>
                    ${warningHTML}
                    <div class="collectible-status ${statusClass}">${statusText}</div>
                    <div class="collectible-actions">${actionsHTML}</div>
                </div>
            `;
        }).join('');
        
        setTimeout(() => {
            document.querySelectorAll('#collectiblesGrid .collectible-video[data-video]').forEach(container => {
                playVideoOnClick(container);
            });
        }, 300);
    }

    async function activateCollectible(collectId) {
        if (!currentUser || !currentFirebaseUserId) { showToast('⚠️ يرجى تسجيل الدخول', 'warning'); return; }
        try {
            const snap = await database.ref('users/' + currentFirebaseUserId).once('value');
            const user = snap.val();
            if (!user) { showToast('❌ المستخدم غير موجود', 'error'); return; }
            
            const activeFrame = user.activeFrame || null;
            if (activeFrame) {
                if (!confirm(`⚠️ يوجد إطار مقاعد مفعل حالياً (${activeFrame}). سيتم إلغاء تفعيله تلقائياً. هل تريد المتابعة؟`)) {
                    return;
                }
                await database.ref('users/' + currentFirebaseUserId + '/activeFrame').set(null);
            }
            
            const collectibles = user.collectibles || {};
            const data = collectibles[collectId];
            if (!data || !data.owned) { showToast('⚠️ هذا الإطار غير مملوك', 'warning'); return; }
            const exp = data.expiresAt ? new Date(data.expiresAt) : null;
            if (exp && exp < new Date()) { showToast('⏳ صلاحية منتهية', 'warning'); return; }
            
            await database.ref('users/' + currentFirebaseUserId + '/activeCollectible').set(collectId);
            const updatedUser = { ...user, activeCollectible: collectId, activeFrame: null };
            saveUserToStorage(updatedUser, currentFirebaseUserId);
            
            showToast('✅ تم تفعيل إطار المقتنيات (تم إلغاء تفعيل إطار المقاعد)', 'success');
            await ensureUserData();
            renderCollectibles(currentUser);
            renderFrames(currentUser);
        } catch(e) { console.error(e); showToast('❌ حدث خطأ', 'error'); }
    }

    async function deactivateCollectible(collectId) {
        if (!currentUser || !currentFirebaseUserId) { showToast('⚠️ يرجى تسجيل الدخول', 'warning'); return; }
        if (!confirm('⚠️ إلغاء تفعيل هذا الإطار؟')) return;
        try {
            await database.ref('users/' + currentFirebaseUserId + '/activeCollectible').set(null);
            const snap = await database.ref('users/' + currentFirebaseUserId).once('value');
            const user = snap.val();
            if (user) {
                saveUserToStorage({ ...user, activeCollectible: null }, currentFirebaseUserId);
            }
            showToast('✅ تم إلغاء تفعيل إطار المقتنيات', 'success');
            await ensureUserData();
            renderCollectibles(currentUser);
            renderFrames(currentUser);
        } catch(e) { console.error(e); showToast('❌ حدث خطأ', 'error'); }
    }

    // ============================================================
    // 📝 LOG
    // ============================================================
    async function logPurchaseToAdmin(data) {
        try {
            if (!database) return;
            await database.ref('adminLogs').push({
                ...data,
                timestamp: new Date().toISOString(),
                timestampMs: new Date().getTime()
            });
        } catch(e) { console.error('❌ خطأ في التسجيل:', e); }
    }

    // ============================================================
    // 📑 TABS
    // ============================================================
    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        const map = { 'vip':'Vip', 'frames':'Frames', 'chatstyles':'ChatStyles', 'collectibles':'Collectibles' };
        const contentEl = document.getElementById(`tabContent${map[tab]}`);
        const btnEl = document.getElementById(`tab${map[tab]}`);
        if (contentEl) contentEl.classList.add('active');
        if (btnEl) btnEl.classList.add('active');
        if (tab === 'frames') renderFrames(currentUser);
        else if (tab === 'chatstyles') renderChatStyles(currentUser);
        else if (tab === 'collectibles') renderCollectibles(currentUser);
        else if (tab === 'vip') renderVIPGrid(currentUser);
    }

    // ============================================================
    // 🍞 TOAST
    // ============================================================
    function showToast(message, type = 'info') {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(30px)'; toast.style.transition = 'all 0.3s ease'; setTimeout(() => toast.remove(), 300); }, 4000);
    }

    // ============================================================
    // 🚀 INIT
    // ============================================================
    async function ensureUserData() {
        if (!database) { if (!initializeFirebase()) { showToast('❌ فشل الاتصال بقاعدة البيانات', 'error'); return null; } }
        const user = await loadUserFromFirebase();
        if (!user) {
            document.getElementById('userName').textContent = 'زائر';
            document.getElementById('userId').textContent = '🆔 ---';
            document.getElementById('vipLevel').textContent = 'VIP 0';
            document.getElementById('vipStatus').textContent = 'غير مفعل';
            document.getElementById('vipGrid').innerHTML = `
                <div style="grid-column:1/-1;text-align:center;padding:60px 20px;">
                    <div style="font-size:80px;margin-bottom:20px;">👋</div>
                    <h2 style="color:#ffd700;margin-bottom:15px;">مرحباً بك في نظام VIP</h2>
                    <p style="color:#94a3b8;font-size:1.1rem;max-width:500px;margin:0 auto 30px;">
                        يرجى <a href="login4.html" style="color:#8b5cf6;text-decoration:none;font-weight:bold;">تسجيل الدخول</a> لعرض محتوى VIP.
                    </p>
                    <a href="login4.html" class="back-btn login-btn" style="font-size:1.2rem;padding:15px 40px;text-decoration:none;"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</a>
                </div>
            `;
            renderFrames(null);
            renderChatStyles(null);
            renderCollectibles(null);
            return null;
        }
        updateUI(user);
        renderVIPGrid(user);
        renderFrames(user);
        renderChatStyles(user);
        renderCollectibles(user);
        return user;
    }

    window.onload = function() {
        initializeFirebase();
        ensureUserData().then(() => console.log('👑 VIP System loaded'));
        const stored = getStoredUser();
        updateLoginButtons(!!stored);
        window.addEventListener('resize', () => { isMobile = window.innerWidth <= 768; });
    };
</script>
</body>
