        .toast {

        // ============================================================

        async function buyVIP(level) {
            if (!isAuthenticated || !currentUser) {
                showToast('⚠️ يرجى تسجيل الدخول أولاً', 'warning');
                return;
            }

            const vipConfig = VIP_CONFIG[level];
            if (!vipConfig) {
                showToast('❌ مستوى VIP غير صحيح', 'error');
                return;
            }

            try {
                const userRef = database.ref('users/' + currentUser.firebaseKey);
                const snapshot = await userRef.once('value');
                const dbUser = snapshot.val();

                const currentVIP = dbUser.vip || { active: null, expiresAt: null };
                if (currentVIP.active === level) {
                    const expiresAt = currentVIP.expiresAt ? new Date(currentVIP.expiresAt) : null;
                    if (expiresAt && expiresAt > new Date()) {
                        showToast(`⚠️ VIP ${level} مفعل بالفعل`, 'warning');
                        return;
                    }
                }

                let costEGP = vipConfig.requirements.EGP || 0;
                let costUSD = vipConfig.requirements.USD || 0;
                let useUSD = false;

                if (costUSD > 0 && (dbUser.balanceUSD || 0) >= costUSD) {
                    useUSD = true;
                } else if (costEGP > 0 && (dbUser.balanceEGP || 0) >= costEGP) {
                    useUSD = false;
                } else {
                    showToast(`❌ رصيد غير كافٍ (مطلوب ${costEGP} ج.م أو ${costUSD} دولار)`, 'error');
                    return;
                }

                if (!confirm(`تأكيد شراء VIP ${level} (${vipConfig.title}) مقابل ${useUSD ? costUSD + ' دولار' : costEGP + ' ج.م'}؟`)) return;

                const newBalance = useUSD ? 
                    (dbUser.balanceUSD || 0) - costUSD : 
                    (dbUser.balanceEGP || 0) - costEGP;

                const updateData = {};
                if (useUSD) {
                    updateData.balanceUSD = newBalance;
                } else {
                    updateData.balanceEGP = newBalance;
                }

                const now = new Date();
                const expiresAt = new Date(now);
                expiresAt.setDate(expiresAt.getDate() + vipConfig.duration);

                const vipPurchased = dbUser.vipPurchased || {};
                vipPurchased[level] = true;

                updateData['vip/active'] = level;
                updateData['vip/expiresAt'] = expiresAt.toISOString();
                updateData['vip/activatedAt'] = now.toISOString();
                updateData['vip/activatedWith'] = useUSD ? 'USD' : 'EGP';
                updateData['vip/amount'] = useUSD ? costUSD : costEGP;
                updateData.vipPurchased = vipPurchased;
                updateData.updatedAt = now.toISOString();

                await userRef.update(updateData);

                // تحديث currentUser
                currentUser = { ...currentUser, ...updateData };
                currentUser.balanceEGP = newBalance;

                const notification = {
                    id: Date.now(),
                    text: `👑 تم شراء VIP ${level} (${vipConfig.title}) بنجاح! صلاحية ${vipConfig.duration} يوم.`,
                    read: false,
                    date: new Date().toLocaleString('ar-EG'),
                    type: 'vip_purchased',
                    createdAt: now.toISOString()
                };
                await database.ref('users/' + currentUser.firebaseKey + '/notifications').push(notification);

                showToast(`✅ تم شراء VIP ${level} بنجاح!`, 'success');
                
                // إعادة تحميل البيانات
                renderVIPCards(currentUser);
                updateUI(currentUser);

            } catch (error) {
                console.error('Error buying VIP:', error);
                showToast('❌ حدث خطأ في الشراء', 'error');
            }
        }

            if (!isAuthenticated || !currentUser) {
                showToast('⚠️ يرجى تسجيل الدخول أولاً', 'warning');
                return;
            }

            const frame = FRAMES.find(f => f.id === frameId);
            if (frame?.isSpecial) {
                showToast('⚠️ هذا الإطار خاص ولا يمكن شراؤه', 'warning');
                return;
            }

            try {
                const userRef = database.ref('users/' + currentUser.firebaseKey);
                const snapshot = await userRef.once('value');
                const dbUser = snapshot.val();

                if ((dbUser.balanceEGP || 0) < price) {
                    showToast(`⚠️ رصيد غير كافٍ (تحتاج ${price} ج.م)`, 'warning');
                    return;
                }

                if (!confirm(`تأكيد شراء "${name}" مقابل ${price} ج.م؟`)) return;

                const newBalance = (dbUser.balanceEGP || 0) - price;
                const now = new Date();
                const expiresAt = new Date(now);
                expiresAt.setDate(expiresAt.getDate() + 30);

                const frames = dbUser.frames || {};
                frames[frameId] = {
                    owned: true,
                    purchasedAt: now.toISOString(),
                    expiresAt: expiresAt.toISOString(),
                    type: 'frame'
                };

                await userRef.update({
                    balanceEGP: newBalance,
                    frames: frames,
                    updatedAt: now.toISOString()
                });

                const notification = {
                    id: Date.now(),
                    text: `🖼️ تم شراء "${name}" بنجاح! صلاحية 30 يوم.`,
                    read: false,
                    date: new Date().toLocaleString('ar-EG'),
                    type: 'frame_purchased',
                    createdAt: now.toISOString()

                showToast(`✅ تم شراء "${name}" بنجاح!`, 'success');
                
                currentUser.frames = frames;
                currentUser.balanceEGP = newBalance;
                renderFrames(currentUser);

            } catch (error) {
                console.error('Error buying frame:', error);
                showToast('❌ حدث خطأ في الشراء', 'error');
            }
        }

        // ============================================================
        // 📑 TABS
        // ============================================================
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            const tabMap = {
                'vip': 'Vip',
                'frames': 'Frames',
                'chatstyles': 'ChatStyles'
            };
            
            document.getElementById(`tabContent${tabMap[tab]}`).classList.add('active');
            document.getElementById(`tab${tabMap[tab]}`).classList.add('active');
        }

        // ============================================================
        // 🍞 TOAST
        // ============================================================
        function showToast(message, type = 'info') {
            const colors = {
                success: '#10b981',
                error: '#ef4444',
                warning: '#f59e0b',
                info: '#3b82f6'
            };
            
            const oldToast = document.querySelector('.toast');
            if (oldToast) oldToast.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(30px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // ============================================================
        // 🚀 AUTH STATE LISTENER
        // ============================================================
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // مستخدم مسجل الدخول
                console.log('✅ مستخدم مسجل:', user.uid);
                isAuthenticated = true;
                currentFirebaseUser = user;
                document.getElementById('authBtn').innerHTML = '<i class="fas fa-sign-out-alt"></i> تسجيل الخروج';
                
                // تحميل بيانات المستخدم من Firebase Database
                await loadUserData(user.uid);
                
            } else {
                // مستخدم غير مسجل
                console.log('👤 لا يوجد مستخدم مسجل');
                isAuthenticated = false;
                currentUser = null;
                currentFirebaseUser = null;
                document.getElementById('authBtn').innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
                updateUIForGuest();
            }
        });
